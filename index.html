<body>

  <script type="module">

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const formatNumber = (num) => Number(num || 0).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 1 });
    const formatMoney = (num) => Number(num || 0).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    const getDaysAgo = (days) => { const d = new Date(); d.setDate(d.getDate() - days); return d.toISOString().split('T')[0]; };
    const getTodayFormatted = () => new Date().toISOString().split('T')[0];
    const parseDDMMYYYY = (str) => { 
      if(!str || typeof str !== 'string') return new Date(); 
      if(str.includes('-')) { 
        const parts = str.split('-'); 
        if (parts[0].length === 4) { let y = Number(parts[0]); if(y > 2500) y -= 543; return new Date(y, parts[1] - 1, parts[2]); }
        else { let y = Number(parts[2]); if(y > 2500) y -= 543; return new Date(y, parts[1] - 1, parts[0]); }
      }
      let [d, m, y] = str.split('/'); y = Number(y); if(y > 2500) y -= 543; return new Date(y, m - 1, d); 
    };
    const formatDDMMYYYY = (dateObj) => `${String(dateObj.getDate()).padStart(2, '0')}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${dateObj.getFullYear()}`;
    const pctValue = (val, base) => base > 0 ? ((val / base) * 100).toFixed(1) : 0;

    const compressData = (dataObj) => {
      try { 
        const uint8array = window.pako.deflate(new TextEncoder().encode(JSON.stringify(dataObj)));
        let binaryStr = "";
        for (let i = 0; i < uint8array.length; i++) {
          binaryStr += String.fromCharCode(uint8array[i]);
        }
        return window.btoa(binaryStr);
      } catch (e) { return null; }
    };
    const decompressData = (base64Str) => {
      try {
        const bin = window.atob(base64Str); const bytes = new Uint8Array(bin.length);
        for(let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
        return JSON.parse(new TextDecoder().decode(window.pako.inflate(bytes)));
      } catch (e) { return null; }
    };

    function SearchableDropdown({ items, selectedItem, onSelect, onAdd, onEdit, onDelete, placeholder, isVendor = false }) {
      const [isOpen, setIsOpen] = useState(false); const [search, setSearch] = useState('');
      const filtered = items.filter(item => (isVendor ? item : item.name).toLowerCase().includes(search.toLowerCase()));
      return (
        <>
          <div onClick={() => setIsOpen(true)} className="w-full p-3 bg-white border border-gray-300 rounded-lg text-sm font-bold text-blue-700 flex justify-between items-center cursor-pointer shadow-sm hover:border-blue-400 transition-colors">
            <span className="truncate">{selectedItem ? (isVendor ? selectedItem : items.find(i=>i.id===selectedItem)?.name) : placeholder}</span>
            <svg className="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
          </div>
          {isOpen && (
            <div className="fixed inset-0 z-[100] flex flex-col justify-end bg-gray-900/60 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-white w-full h-[75vh] sm:h-[85vh] rounded-t-2xl shadow-2xl flex flex-col overflow-hidden animate-in slide-in-from-bottom-full duration-200">
                <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                  <h3 className="font-bold text-gray-800">{placeholder}</h3>
                  <button onClick={() => setIsOpen(false)} className="w-8 h-8 bg-gray-200 hover:bg-gray-300 rounded-full flex items-center justify-center font-bold text-gray-600 transition-colors">&times;</button>
                </div>
                <div className="p-3 border-b bg-white shrink-0">
                  <div className="relative">
                    <input type="text" autoFocus placeholder="พิมพ์ค้นหา หรือ เพิ่มรายการใหม่..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full pl-9 pr-3 py-3 bg-gray-100 border-none rounded-xl text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    <svg className="w-5 h-5 absolute left-3 top-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                  </div>
                </div>
                <div className="overflow-y-auto flex-1 smooth-scroll pb-20 bg-white px-2">
                  {filtered.map(item => {
                    const id = isVendor ? item : item.id; const name = isVendor ? item : (item.isActive === false ? `${item.name} (ไม่ใช้แล้ว)` : item.name);
                    return (
                      <div key={id} className={`flex justify-between items-center p-3 border-b border-gray-100 cursor-pointer rounded-lg mx-1 mt-1 transition-all ${!isVendor && item.isActive === false ? 'bg-gray-100 opacity-75' : 'active:bg-blue-50'}`}>
                        <div className="flex-1 min-w-0 py-1" onClick={() => { onSelect(id); setIsOpen(false); setSearch(''); }}>
                          <div className={`font-bold text-sm truncate ${!isVendor && item.isActive === false ? 'text-gray-500' : 'text-gray-800'}`}>{name}</div>
                          {!isVendor && <div className="text-[10px] text-gray-500 mt-1">{item.lastPrice} บ./{item.purchaseUnit || item.unit} | มี: <span className="text-blue-600 font-bold">{item.currentStock}</span> {item.unit}</div>}
                        </div>
                        <div className="flex space-x-2 shrink-0 ml-2">
                          <button onClick={(e) => { e.stopPropagation(); onEdit(isVendor ? name : item); if(!isVendor) setIsOpen(false); }} className="w-8 h-8 flex items-center justify-center text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg text-sm transition-colors">✏️</button>
                          <button onClick={(e) => { e.stopPropagation(); onDelete(id); }} className="w-8 h-8 flex items-center justify-center text-red-600 bg-red-50 hover:bg-red-100 rounded-lg text-sm transition-colors">🗑️</button>
                        </div>
                      </div>
                    );
                  })}
                  {search && !items.find(i => (isVendor ? i : i.name).toLowerCase() === search.toLowerCase()) && (
                    <div onClick={() => { onAdd(search); if(isVendor) onSelect(search); setIsOpen(false); setSearch(''); }} className="p-4 mt-2 bg-green-50 text-green-700 font-bold text-sm text-center rounded-xl mx-3 cursor-pointer hover:bg-green-100 transition-colors">+ เพิ่ม "{search}" เป็นของใหม่</div>
                  )}
                  {filtered.length === 0 && !search && <div className="p-8 text-center text-gray-400 text-sm">ไม่มีข้อมูล...</div>}
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    function App() {
      const firebaseConfig = { apiKey: "AIzaSyCak5RHaVkjqN02MeWjvQ6HWA1EESEdeok", authDomain: "restaurant-stock-81615.firebaseapp.com", projectId: "restaurant-stock-81615" };
      const [db, setDb] = useState(null); const [isDataLoaded, setIsDataLoaded] = useState(false); const [isSyncActive, setIsSyncActive] = useState(false);
      const [dbSizeInfo, setDbSizeInfo] = useState({ kbLength: 0, percentUsed: 0, estDaysLeft: 'N/A', isCompressed: false });
      const lastSavedPayload = useRef(null); 

      const [auth, setAuth] = useState({ loggedIn: false, role: '', name: '' });
      const [loginPin, setLoginPin] = useState(''); const [activeTab, setActiveTab] = useState('dashboard');
      const branches = [{ id: 'branch1', name: 'ครัวแสนสุข' }, { id: 'branch2', name: 'ครัวบ้านแม่' }, { id: 'demo', name: 'Demo (ทดลองใช้งาน)' }];
      const [selectedBranch, setSelectedBranch] = useState('branch1');
      
      const [categoryOrder, setCategoryOrder] = useState([]); const [vendors, setVendors] = useState([]); const [expCats, setExpCats] = useState([]);
      const [newCategoryInput, setNewCategoryInput] = useState(''); const [newVendorInput, setNewVendorInput] = useState(''); const [newExpCat, setNewExpCat] = useState('');
      
      const [inventory, setInventory] = useState([]); const [dailyHistory, setDailyHistory] = useState([]);
      const [receipts, setReceipts] = useState([]); const [pendingPOs, setPendingPOs] = useState([]); 
      const [dailyExpenses, setDailyExpenses] = useState([]); const [monthlyOverheads, setMonthlyOverheads] = useState({});
      
      const [pendingSalesInputs, setPendingSalesInputs] = useState({}); const [expenseInput, setExpenseInput] = useState({ name: '', amount: '', payMethod: 'เงินสด' });

      const getOverheadList = (monthKey) => { const data = monthlyOverheads[monthKey]; return data ? (Array.isArray(data) ? data : [{ id: `lgc-${monthKey}`, name: 'ค่าใช้จ่ายรวม', estimate: data.estimate || 0, actual: data.actual === null ? '' : data.actual }]) : []; };

      const injectDemoData = () => {
        setCategoryOrder(['เนื้อสัตว์', 'อาหารทะเล', 'ผักสด', 'ของแห้ง', 'เครื่องดื่ม']); setVendors(['ตลาดสด', 'Makro', 'ร้านเจ๊หมวย', 'เฮียซ้งทะเล', 'โลตัส']); setExpCats(['ค่าแก๊ส', 'น้ำแข็ง', 'ซื้อของจุกจิก', 'ค่าซ่อมบำรุง']);
        const baseItems = [
          { id: 1, name: 'หมูบด', category: 'เนื้อสัตว์', unit: 'กก.', purchaseUnit: 'กก.', conversionRate: 1, lastPrice: 120, vendor: 'ร้านเจ๊หมวย', startQty: 15 },
          { id: 2, name: 'อกไก่', category: 'เนื้อสัตว์', unit: 'กก.', purchaseUnit: 'ถุง', conversionRate: 2, lastPrice: 70, vendor: 'Makro', startQty: 20 },
          { id: 6, name: 'กุ้งขาว', category: 'อาหารทะเล', unit: 'กก.', purchaseUnit: 'กล่อง', conversionRate: 5, lastPrice: 220, vendor: 'เฮียซ้งทะเล', startQty: 20 },
          { id: 11, name: 'ผักบุ้ง', category: 'ผักสด', unit: 'กำ', purchaseUnit: 'มัดใหญ่', conversionRate: 10, lastPrice: 10, vendor: 'ตลาดสด', startQty: 50 },
          { id: 16, name: 'น้ำมันพืช', category: 'ของแห้ง', unit: 'ขวด', purchaseUnit: 'ลัง', conversionRate: 12, lastPrice: 55, vendor: 'Makro', startQty: 48 },
          { id: 21, name: 'โค้ก', category: 'เครื่องดื่ม', unit: 'ขวด', purchaseUnit: 'แพ็ค', conversionRate: 12, lastPrice: 15, vendor: 'Makro', startQty: 240 }
        ];
        let currentInvState = baseItems.map(item => ({ ...item, currentStock: item.startQty, initialStock: item.startQty, initialStockType: 'base', initialStockPrice: item.lastPrice, isActive: true, showWhenInactive: false, createdAt: getDaysAgo(10) }));
        const demoHistory = []; const demoExpenses = []; const demoReceipts = []; const today = new Date();

        for(let i = 10; i >= 1; i--) {
          const d = new Date(today); d.setDate(d.getDate() - i); const dStr = formatDDMMYYYY(d);
          let tO = 0, tB = 0, tU = 0, tW = 0, tC = 0; const dayDetails = []; let billItems = []; let billTotal = 0;
          const isSkipped = (i === 8 || i === 4); // วันเว้นตรวจสต๊อกสมมติ

          currentInvState.forEach(item => {
            const openQty = item.currentStock; let boughtQty = 0;
            if (Math.random() > 0.7) {
              const buyPacks = Math.floor(Math.random() * 2) + 1; boughtQty = buyPacks * item.conversionRate; const buyPricePerPack = item.lastPrice * item.conversionRate; const cost = buyPacks * buyPricePerPack;
              billTotal += cost; tB += (boughtQty * item.lastPrice); billItems.push({ cartId: Math.random(), item: item, qty: buyPacks, price: buyPricePerPack, total: cost, oldPrice: buyPricePerPack, priceNote: '' });
            }
            const available = openQty + boughtQty; const usedQty = Math.floor(available * (Math.random() * 0.2 + 0.1)); const wasteQty = Math.random() > 0.8 ? 1 : 0; const closeQty = available - usedQty - wasteQty;
            tO += openQty * item.lastPrice; tU += usedQty * item.lastPrice; tW += wasteQty * item.lastPrice; tC += closeQty * item.lastPrice;
            dayDetails.push({ id: item.id, name: item.name, category: item.category, unit: item.unit, costPerUnit: item.lastPrice, open: openQty, bought: boughtQty, used: usedQty, waste: wasteQty, wasteReason: wasteQty > 0 ? 'ชำรุด' : '', close: closeQty });
            item.currentStock = closeQty; item.lastMoved = dStr;
          });

          if (billItems.length > 0) demoReceipts.push({ id: Date.now() + i, date: dStr, vendor: billItems[0].item.vendor || 'ตลาดสด', method: 'เงินสด', total: billTotal, items: billItems });
          if (isSkipped) {
            demoHistory.push({ id: `mock-${i}`, date: dStr, startDate: dStr, endDate: dStr, days: 1, type: 'skipped', sales: null, totalOpeningVal: tO, totalBoughtVal: tB, totalUsedVal: 0, totalWasteVal: 0, totalClosingVal: tO + tB, details: [] });
          } else {
            const salesAmt = Math.floor(tU * (Math.random() * 1.0 + 2.5)); let daysDiff = 1; let startDStr = dStr; let lookBackD = new Date(d); lookBackD.setDate(lookBackD.getDate() - 1); let checkCount = 1;
            while(checkCount <= 5) { const checkStr = formatDDMMYYYY(lookBackD); const prevH = demoHistory.find(h => h.date === checkStr); if(!prevH || prevH.type === 'checked') break; daysDiff++; startDStr = checkStr; lookBackD.setDate(lookBackD.getDate() - 1); checkCount++; }
            demoHistory.push({ id: `mock-${i}`, date: dStr, startDate: startDStr, endDate: dStr, days: daysDiff, type: 'checked', sales: salesAmt, totalOpeningVal: tO, totalBoughtVal: tB, totalUsedVal: tU, totalWasteVal: tW, totalClosingVal: tC, details: dayDetails });
          }
          if(Math.random() > 0.4) demoExpenses.push({ id: `exp-${i}-1`, date: dStr, name: 'น้ำแข็ง', amount: 150 });
          if(Math.random() > 0.8) demoExpenses.push({ id: `exp2-${i}-2`, date: dStr, name: 'ซื้อของจุกจิก', amount: 300 });
        }
        setInventory(currentInvState); setDailyHistory(demoHistory.reverse()); setReceipts(demoReceipts.reverse()); setDailyExpenses(demoExpenses);
        const curMonthKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
        setMonthlyOverheads({ [curMonthKey]: [{ id: `oh-${Date.now()}-1`, name: 'ค่าเช่าร้าน', estimate: 15000, actual: '' }, { id: `oh-${Date.now()}-2`, name: 'เงินเดือนพนักงาน', estimate: 18000, actual: '' }] });
        alert(`โหลดข้อมูลจำลองสำเร็จ!\n(จำลองวันที่ ${getDaysAgo(10)} ถึง ${getTodayFormatted()})`);
      };

      useEffect(() => {
        let unsubscribeSnapshot = null; let isMounted = true;
        const initFirebase = async () => {
          try {
            while (!window.FirebaseAPI) { await new Promise(r => setTimeout(r, 100)); }
            const { initializeApp, initializeFirestore, memoryLocalCache, doc, onSnapshot, getAuth, signInAnonymously, onAuthStateChanged } = window.FirebaseAPI;
            if (!window.firebaseAppInst) { window.firebaseAppInst = initializeApp(firebaseConfig); window.firebaseAuthInst = getAuth(window.firebaseAppInst); window.firestoreInst = initializeFirestore(window.firebaseAppInst, { localCache: memoryLocalCache(), experimentalForceLongPolling: true }); }
            setDb(window.firestoreInst); setIsSyncActive(false); 
            const user = await new Promise((resolve) => { const unsubAuth = onAuthStateChanged(window.firebaseAuthInst, async (u) => { unsubAuth(); if (u) resolve(u); else { try { const cred = await signInAnonymously(window.firebaseAuthInst); resolve(cred.user); } catch (e) { resolve(null); } } }); });
            if (!user || !isMounted) { setIsDataLoaded(true); return; }
            unsubscribeSnapshot = onSnapshot(doc(window.firestoreInst, "restaurant_data", selectedBranch), (docSnap) => {
              let loadedData = null; let isComp = false;
              if (docSnap.exists()) {
                const raw = docSnap.data();
                if (raw.compressedPayload) { lastSavedPayload.current = raw.compressedPayload; loadedData = decompressData(raw.compressedPayload); isComp = true; } 
                else if (raw.inventory) { loadedData = raw; }
              }
              if (loadedData) {
                const migD = (arr) => Array.isArray(arr) ? arr.filter(x => x).map(x => ({...x, date: (x.date && typeof x.date === 'string') ? formatDDMMYYYY(parseDDMMYYYY(x.date)) : x.date, endDate: (x.endDate && typeof x.endDate === 'string') ? formatDDMMYYYY(parseDDMMYYYY(x.endDate)) : x.endDate, startDate: (x.startDate && typeof x.startDate === 'string') ? formatDDMMYYYY(parseDDMMYYYY(x.startDate)) : x.startDate, lastMoved: (x.lastMoved && typeof x.lastMoved === 'string') ? formatDDMMYYYY(parseDDMMYYYY(x.lastMoved)) : x.lastMoved })) : [];
                setInventory(Array.isArray(loadedData.inventory) ? loadedData.inventory.filter(x => x).map(x => ({...x, lastMoved: (x.lastMoved && typeof x.lastMoved === 'string') ? formatDDMMYYYY(parseDDMMYYYY(x.lastMoved)) : x.lastMoved})) : []); 
                setDailyHistory(migD(loadedData.dailyHistory)); 
                setReceipts(migD(loadedData.receipts));
                if (loadedData.vendors) setVendors(loadedData.vendors); else setVendors(['ตลาดสด', 'Makro', 'ร้านเจ๊หมวย']); 
                if (loadedData.categoryOrder) setCategoryOrder(loadedData.categoryOrder); else setCategoryOrder(['เนื้อสัตว์', 'อาหารทะเล', 'ผักสด', 'ของแห้ง', 'เครื่องปรุง', 'เครื่องดื่ม', 'อื่นๆ']);
                setPendingPOs(migD(loadedData.pendingPOs)); 
                setDailyExpenses(migD(loadedData.dailyExpenses).filter(e => e.date && !isNaN(parseDDMMYYYY(e.date).getTime()))); 
                setMonthlyOverheads(loadedData.monthlyOverheads || {});
                if (loadedData.expenseCategories) setExpCats(loadedData.expenseCategories); else setExpCats(['ค่าแก๊ส', 'น้ำแข็ง', 'ซื้อของจุกจิก', 'ค่าซ่อมบำรุง']);
                setDailySalesRecords(migD(loadedData.dailySalesRecords)); setCashDeposits(migD(loadedData.cashDeposits));
                const bytes = isComp && docSnap.data().compressedPayload ? docSnap.data().compressedPayload.length : new TextEncoder().encode(JSON.stringify(loadedData)).length;
                setDbSizeInfo({ kbLength: (bytes / 1024).toFixed(1), percentUsed: ((bytes / 1048576) * 100).toFixed(2), estDaysLeft: loadedData.dailyHistory?.length > 0 ? Math.floor((1048576 - bytes) / (bytes / loadedData.dailyHistory.length)) : 'N/A', isCompressed: isComp });
              } else {
                if (selectedBranch === 'demo') { injectDemoData(); } 
                else { setInventory([]); setDailyHistory([]); setReceipts([]); setPendingPOs([]); setDailyExpenses([]); setMonthlyOverheads({}); setCategoryOrder(['เนื้อสัตว์', 'อาหารทะเล', 'ผักสด', 'ของแห้ง', 'เครื่องปรุง', 'เครื่องดื่ม', 'อื่นๆ']); setVendors(['ตลาดสด', 'Makro', 'ร้านเจ๊หมวย']); setExpCats(['ค่าแก๊ส', 'น้ำแข็ง', 'ซื้อของจุกจิก', 'ค่าซ่อมบำรุง']); }
                setDbSizeInfo({ kbLength: 0, percentUsed: 0, estDaysLeft: 'N/A', isCompressed: true });
              }
              setIsDataLoaded(true); setIsSyncActive(true);
            }, (error) => { console.error("Firebase error:", error); setIsDataLoaded(true); setIsSyncActive(false); });
          } catch (error) { setIsDataLoaded(true); setIsSyncActive(false); }
        };
        initFirebase();
        return () => { isMounted = false; if (unsubscribeSnapshot) unsubscribeSnapshot(); };
      }, [selectedBranch]);

      useEffect(() => {
        if (!db || !isSyncActive || !isDataLoaded) return;
        const saveToFirebase = async () => {
          try {
            const fullData = { inventory, dailyHistory, receipts, categoryOrder, vendors, pendingPOs, dailyExpenses, monthlyOverheads, expenseCategories: expCats, dailySalesRecords, cashDeposits };
            const compressedBase64 = compressData(fullData);
            if(compressedBase64) {
              if (compressedBase64 !== lastSavedPayload.current) { lastSavedPayload.current = compressedBase64; await window.FirebaseAPI.setDoc(window.FirebaseAPI.doc(db, "restaurant_data", selectedBranch), { compressedPayload: compressedBase64, lastUpdated: new Date().toISOString() }); }
            } else { await window.FirebaseAPI.setDoc(window.FirebaseAPI.doc(db, "restaurant_data", selectedBranch), { ...fullData, lastUpdated: new Date().toISOString() }); }
          } catch(e) {

        const newCashDeposits = cashDeposits.filter(c => { const parts = c.date.split('/'); const monthKey = `${parts[2]}-${parts[1]}`; return !monthsToDelete.includes(monthKey); });
        const newMonthlyOverheads = {};
        Object.keys(monthlyOverheads).forEach(monthKey => { if (!monthsToDelete.includes(monthKey)) newMonthlyOverheads[monthKey] = monthlyOverheads[monthKey]; });
        
        setDailyHistory(newDailyHistory); setReceipts(newReceipts); setDailySalesRecords(newDailySalesRecords); setDailyExpenses(newDailyExpenses); setCashDeposits(newCashDeposits); setMonthlyOverheads(newMonthlyOverheads);
        if (selectEl) selectEl.value = ""; alert(`ลบประวัติสำเร็จ! คืนพื้นที่คลาวด์เรียบร้อยแล้ว`);
      };

      const handleHardReset = () => {
        const pin = window.prompt("⚠️ ล้างข้อมูลทั้งหมด (เหมือนเริ่มใหม่)\nกรุณาใส่รหัสผ่านเจ้าของร้าน (1245) เพื่อยืนยัน:");
        if (pin !== '1245') return alert('รหัสผ่านไม่ถูกต้อง ลบไม่สำเร็จ');
        if (window.confirm('🚨 ยืนยันการล้างข้อมูลทั้งหมดแน่ใจหรือไม่? ข้อมูลจะไม่สามารถกู้คืนได้')) {
          setInventory([]); setDailyHistory([]); setReceipts([]); setCategoryOrder(['เนื้อสัตว์', 'อาหารทะเล', 'ผักสด', 'ของแห้ง', 'เครื่องปรุง', 'เครื่องดื่ม', 'อื่นๆ']); setVendors(['ตลาดสด', 'Makro', 'ร้านเจ๊หมวย (เนื้อสัตว์)']); setPendingPOs([]); setDailyExpenses([]); setMonthlyOverheads({}); alert('ล้างข้อมูลทั้งหมดเรียบร้อยแล้ว ระบบเหมือนใหม่!');
        }
      };

      const handleSoftReset = () => {
        const pin = window.prompt("⚠️ ล้างยอดสต๊อกและประวัติ (เก็บชื่อวัตถุดิบไว้)\nกรุณาใส่รหัสผ่านเจ้าของร้าน (1245) เพื่อยืนยัน:");
        if (pin !== '1245') return alert('รหัสผ่านไม่ถูกต้อง ลบไม่สำเร็จ');
        if (window.confirm('🚨 ยืนยันเซ็ตยอดสต๊อกเป็น 0 และลบประวัติแน่ใจหรือไม่?')) {
          setInventory(inventory.map(i => ({ ...i, currentStock: 0, initialStock: 0, lastPrice: 0 }))); setDailyHistory([]); setReceipts([]); setPendingPOs([]); setDailyExpenses([]); setMonthlyOverheads({}); alert('เซ็ตยอดสต๊อกเป็น 0 และลบประวัติเรียบร้อยแล้ว พร้อมเริ่มนับใหม่!');
        }
      };

      // ปลดล็อกยอดขายของรอบนั้น (ไม่ revert สต๊อก) - สำหรับกรณีที่ต้องการแก้ยอดขายอย่างเดียว
      const revertSalesOnly = (recordId) => {
        if (auth.role !== 'owner') return alert('เฉพาะเจ้าของร้านเท่านั้นที่สามารถแก้ยอดขายได้');
        if (!window.confirm('ยืนยันการปลดล็อกยอดขายรอบนี้? ยอดขายจะถูกลบออก (สต๊อกยังคงเดิม)')) return;
        setDailyHistory(prev => prev.map(h => h.id === recordId ? { ...h, sales: null } : h));
        alert('ปลดล็อกยอดขายเรียบร้อย สามารถระบุยอดขายใหม่ได้ในหน้าภาพรวม');
      };

      const triggerPrint = (data) => setPrintData(data);
      const toggleHistoryRow = (date) => setExpandedHistoryDate(expandedHistoryDate === date ? null : date);

      // ===== DAILY SALES RECORD HELPERS =====

      // คำนวณยอดขายรวมในวันนั้น
      const calcDailySalesTotal = (record) => {
        if (!record || record.closedDay) return 0;
        const grabAmt = (record.grab?.after != null && record.grab?.after !== '') ? Number(record.grab.after) : Number(record.grab?.before || 0);
        const linemanAmt = (record.lineman?.after != null && record.lineman?.after !== '') ? Number(record.lineman.after) : Number(record.lineman?.before || 0);
        const creditTotal = (record.credits || []).reduce((s, c) => s + Number(c.amount || 0), 0);
        return Number(record.cash || 0) + Number(record.transfer || 0) + grabAmt + linemanAmt + creditTotal;
      };

      // ยอดขายรวมของช่วงวัน (สำหรับ pending sales auto-fill)
      const getSalesForRange = (startDateStr, endDateStr) => {
        if (!startDateStr || !endDateStr) return { total: 0, covered: 0, total_days: 0 };
        const startMs = parseDDMMYYYY(startDateStr);
        const endMs = parseDDMMYYYY(endDateStr);
        let dayCount = Math.round((endMs - startMs) / 86400000) + 1;
        let total = 0; let covered = 0;
        dailySalesRecords.forEach(r => {
          const rMs = parseDDMMYYYY(r.date);
          if (rMs >= startMs && rMs <= endMs) { total += calcDailySalesTotal(r); covered++; }
        });
        return { total, covered, total_days: dayCount };
      };

      // คำนวณ % ที่ถูกหักไป (Grab/Line Man commission)
      const calcCommissionPct = (before, after) => {
        const b = Number(before); const a = Number(after);
        if (!b || !a || a >= b) return null;
        return Math.round(((b - a) / b) * 100);
      };

      // รายชื่อ credit ที่เคยใช้ (derived)
      const allCreditNames = useMemo(() => {
        const names = new Set();
        dailySalesRecords.forEach(r => (r.credits || []).forEach(c => { if (c.name?.trim()) names.add(c.name.trim()); }));
        return [...names].sort((a, b) => a.localeCompare(b, 'th'));
      }, [dailySalesRecords]);

      // สร้าง daily cash flow data สำหรับหน้าจัดการเงินสด
      const buildCashFlowData = useMemo(() => {
        const today = formatDDMMYYYY(new Date());
        // รวม dates ทั้งหมด (วันนี้ + วันที่มี dailySalesRecords)
        const dateSet = new Set([today]);
        dailySalesRecords.forEach(r => dateSet.add(formatDDMMYYYY(parseDDMMYYYY(r.date))));
        cashDeposits.forEach(d => dateSet.add(formatDDMMYYYY(parseDDMMYYYY(d.date))));
        dailyExpenses.forEach(e => { if (e.payMethod === 'เงินสด') dateSet.add(formatDDMMYYYY(parseDDMMYYYY(e.date))); });
        // receipts ที่ชำระเป็นเงินสด
        receipts.forEach(r => { 
          if (r.method === 'เงินสด') {
            if (r.paidAt) dateSet.add(formatDDMMYYYY(parseDDMMYYYY(r.paidAt)));
            else dateSet.add(formatDDMMYYYY(parseDDMMYYYY(r.date)));
          }
        });
        Object.keys(monthlyOverheads).forEach(mk => {
          (getOverheadList ? getOverheadList(mk) : []).forEach(oh => {
            if (oh.payDate && oh.payMethod === 'เงินสด') dateSet.add(formatDDMMYYYY(parseDDMMYYYY(oh.payDate)));
          });
        });

        const sortedDates = [...dateSet].filter(d => !d.includes('NaN')).sort((a, b) => parseDDMMYYYY(b) - parseDDMMYYYY(a));

        // ต้องคำนวณ running balance จากเก่าสุดไปใหม่สุด
        const rows = sortedDates.map(date => {
          const sr = dailySalesRecords.find(r => formatDDMMYYYY(parseDDMMYYYY(r.date)) === date);
          const cashIncome = sr ? (Number(sr.cash || 0)) : 0; 
          
          const paidReceiptsTodayList = receipts.filter(r => formatDDMMYYYY(parseDDMMYYYY(r.date)) === date && r.method === 'เงินสด' && !r.paidAt);
          const paidAPTodayList = receipts.filter(r => r.paidAt && formatDDMMYYYY(parseDDMMYYYY(r.paidAt)) === date && r.method === 'เงินสด');
          
          const paidReceiptsToday = paidReceiptsTodayList.reduce((s, r) => s + r.total, 0);
          const paidAPToday = paidAPTodayList.reduce((s, r) => s + r.total, 0);
          
          let apDetails = '';
          if (paidAPToday > 0 || paidReceiptsToday > 0) {
            if (paidReceiptsToday > 0) apDetails += `จ่ายเงินสดวันรับของรวม: ${formatNumber(paidReceiptsToday)} บ.\n`;
            if (paidAPToday > 0) {
              apDetails += `ชำระหนี้ค้างรวม: ${formatNumber(paidAPToday)} บ.\n`;
              paidAPTodayList.forEach(r => apDetails += `- จากบิลวันที่ ${r.date}: ${formatNumber(r.total)} บ.\n`);
            }
          }

          const dailyExpCash = dailyExpenses.filter(e => formatDDMMYYYY(parseDDMMYYYY(e.date)) === date && (e.payMethod === 'เงินสด' || !e.payMethod)).reduce((s, e) => s + Number(e.amount), 0);
          
          let monthlyExpCash = 0;
          Object.keys(monthlyOverheads).forEach(mk => {
            (getOverheadList ? getOverheadList(mk) : []).forEach(oh => { 
              if (oh.payDate && formatDDMMYYYY(parseDDMMYYYY(oh.payDate)) === date && oh.payMethod === 'เงินสด' && oh.actual) monthlyExpCash += Number(oh.actual); 
            });
          });
          const deposit = cashDeposits.filter(d => formatDDMMYYYY(parseDDMMYYYY(d.date)) === date).reduce((s, d) => s + Number(d.amount), 0);
          const netCash = cashIncome - paidReceiptsToday - paidAPToday - dailyExpCash - monthlyExpCash;
          return { date, cashIncome, paidReceiptsToday, paidAPToday, dailyExpCash, monthlyExpCash, deposit, netCash, apDetails };
        }).reverse(); // เรียงจากเก่าสุดก่อน เพื่อคำนวณ cumulative

        let running = 0;
        const withCumulative = rows.map(r => {
          running += r.netCash - r.deposit;
          return { ...r, cumulativeCash: running };
        });

        return withCumulative.reverse(); // กลับมาใหม่สุดบน
      }, [dailySalesRecords, cashDeposits, dailyExpenses, receipts, monthlyOverheads]);

      // โหลดข้อมูล record มาใส่ form เพื่อแก้ไข
      const loadSalesRecordForEdit = (record) => {
        setSrEditId(record.id);
        setSalesRecordDate(record.date);
        setSrCash(record.cash || '');
        setSrTransfer(record.transfer || '');
        setSrGrabBefore(record.grab?.before || '');
        setSrGrabAfter(record.grab?.after != null ? record.grab.after : '');
        setSrLinemanBefore(record.lineman?.before || '');
        setSrLinemanAfter(record.lineman?.after != null ? record.lineman.after : '');
        setSrCredits(record.credits?.length > 0 ? record.credits.map(c => ({name: c.name, amount: String(c.amount)})) : [{ name: '', amount: '' }]);
      };

      const resetSalesRecordForm = () => {
        setSrEditId(null); setSrCash(''); setSrTransfer(''); setSrGrabBefore(''); setSrGrabAfter('');
        setSrLinemanBefore(''); setSrLinemanAfter(''); setSrCredits([{ name: '', amount: '' }]);
      };

      // บันทึก/อัพเดต daily sales record
      const saveDailySalesRecord = (closedDay = false) => {
        const date = salesRecordDate;
        if (!date) return alert('กรุณาเลือกวันที่');
        const filteredCredits = srCredits.filter(c => c.name || Number(c.amount) > 0);
        const record = {
          id: srEditId || `dsr-${Date.now()}`,
          date,
          closedDay,
          cash: Number(srCash) || 0,
          transfer: Number(srTransfer) || 0,
          grab: { before: Number(srGrabBefore) || 0, after: srGrabAfter !== '' ? Number(srGrabAfter) : null },
          lineman: { before: Number(srLinemanBefore) || 0, after: srLinemanAfter !== '' ? Number(srLinemanAfter) : null },
          credits: filteredCredits.map(c => ({ name: c.name.trim(), amount: Number(c.amount) || 0 })),
        };
        if (closedDay) { record.cash = 0; record.transfer = 0; record.grab = { before: 0, after: null }; record.lineman = { before: 0, after: null }; record.credits = []; }
        setDailySalesRecords(prev => {
          const exists = prev.find(r => r.id === record.id);
          if (exists) return prev.map(r => r.id === record.id ? record : r);
          // ตรวจว่าวันนั้นมีอยู่แล้วหรือไม่
          const sameDayIdx = prev.findIndex(r => r.date === date);
          if (sameDayIdx > -1) return prev.map((r, i) => i === sameDayIdx ? record : r);
          return [...prev, record].sort((a, b) => parseDDMMYYYY(b.date) - parseDDMMYYYY(a.date));
        });
        resetSalesRecordForm();
        // Auto-update pending dailyHistory records ที่มีช่วงวันครอบคลุมวันนั้น
        setDailyHistory(prev => prev.map(h => {
          if (h.sales === null && h.type === 'checked') {
            const { total, covered } = getSalesForRange(h.startDate || h.date, h.endDate || h.date);
            if (covered > 0) return { ...h, _autoSales: total };
          }
          return h;
        }));
      };

      const deleteDailySalesRecord = (id) => {
        if (!window.confirm('ลบบันทึกยอดขายวันนี้?')) return;
        setDailySalesRecords(prev => prev.filter(r => r.id !== id));
      };

      // บันทึกยอดฝากเงิน
      const saveDeposit = () => {
        if (!cashMgmtDepositAmt || Number(cashMgmtDepositAmt) <= 0) return alert('กรุณาระบุยอดฝากเงิน');
        const dep = { id: `dep-${Date.now()}`, date: cashMgmtDepositDate || getTodayFormatted(), amount: Number(cashMgmtDepositAmt), note: cashMgmtDepositNote.trim() };
        setCashDeposits(prev => {
          const exists = prev.find(d => d.date === dep.date);
          if (exists) return prev.map(d => d.date === dep.date ? { ...d, amount: d.amount + dep.amount } : d);
          return [...prev, dep];
        });
        setCashMgmtDepositAmt(''); setCashMgmtDepositNote('');
        alert(`บันทึกฝากเงิน ${formatMoney(dep.amount)} บาท เรียบร้อย`);
      };


      const ProfitLabel = ({val, pctVal}) => {
        const isLoss = val < 0;
        return (
          <div className="text-right">
            <p className={`text-xl font-black ${isLoss ? 'text-red-600' : 'text-green-700'}`}>{formatMoney(val)} <span className="text-sm font-normal">฿</span></p>
            <span className={`text-[10px] font-black text-white px-1.5 py-0.5 rounded-full inline-block mt-0.5 shadow-sm ${isLoss ? 'bg-red-600' : 'bg-green-600'}`}>{isLoss ? 'ขาดทุนสุทธิ' : 'กำไรสุทธิ'} {pctVal}%</span>
          </div>
        )
      };

      // ==========================================
      // UI RENDERERS
      // ==========================================
      if (printData) {
        return (
          <div className="min-h-screen bg-gray-100 p-4 print:p-0 print:bg-white z-50">
            <div className="max-w-3xl mx-auto bg-white p-6 shadow-xl print:shadow-none print:w-full print:p-0" id="printable-area">
              <div className="flex justify-between items-center mb-4 border-b pb-4 no-print">
                <h2 className="text-xl font-bold">ตัวอย่างก่อนพิมพ์</h2>
                <div className="space-x-3"><button onClick={() => setPrintData(null)} className="px-4 py-2 bg-gray-200 rounded font-bold">กลับ</button><button onClick={() => window.print()} className="px-4 py-2 bg-blue-600 text-white rounded font-bold">🖨️ ยืนยันการพิมพ์</button></div>
              </div>

              {printData.type === 'dashboard_history' ? (
                <div className="text-black">
                  <h1 className="text-center font-bold text-lg mb-1">รายงานภาพรวมยอดขายและต้นทุนล่าสุด</h1>
                  <p className="text-center text-[10px] mb-4 text-gray-600">วันที่พิมพ์: {formatDDMMYYYY(new Date())} | สาขา: {branches.find(b=>b.id===selectedBranch)?.name}</p>
                  <table className="w-full text-[10px] border-collapse">
                    <thead><tr className="bg-gray-200 border-b border-gray-400"><th className="p-2 text-left border border-gray-300">วันที่/รอบ</th><th className="p-2 text-right border border-gray-300">ยอดขาย</th><th className="p-2 text-right border border-gray-300">ต้นทุนขาย(Food Cost)</th><th className="p-2 text-right border border-gray-300">กำไรขั้นต้น(GP)</th><th className="p-2 text-right border border-gray-300">รายจ่าย/ค่าบริหาร</th><th className="p-2 text-right border border-gray-300">กำไร(ขาดทุน)สุทธิ</th></tr></thead>
                    <tbody>
                      {printData.data.map((item, idx) => {
                        const netProfit = item.grossProfit - item.dailyExp - item.overhead;
                        const costPct = item.sales > 0 ? ((item.cost/item.sales)*100).toFixed(1) : 0;
                        const gpPct = item.sales > 0 ? ((item.grossProfit/item.sales)*100).toFixed(1) : 0;
                        const netPct = item.sales > 0 ? ((netProfit/item.sales)*100).toFixed(1) : 0;
                        return (
                          <tr key={item.id} className="border-b border-gray-300">
                            <td className="p-2 font-bold border border-gray-300">{item.dateLabel}</td>
                            <td className="p-2 text-right border border-gray-300">{formatMoney(item.sales)}</td>
                            <td className="p-2 text-right border border-gray-300">{formatMoney(item.cost)} <span className="text-[8px] text-gray-500">({costPct}%)</span></td>
                            <td className="p-2 text-right font-bold border border-gray-300">{formatMoney(item.grossProfit)} <span className="text-[8px] text-gray-500">({gpPct}%)</span></td>
                            <td className="p-2 text-right border border-gray-300">{formatMoney(item.dailyExp + item.overhead)}</td>
                            <td className={`p-2 text-right font-bold border border-gray-300 ${netProfit < 0 ? 'text-red-700' : 'text-green-700'}`}>{formatMoney(netProfit)} <span className="text-[8px] opacity-80">({netPct}%)</span></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              ) : printData.type === 'monthly_summary' ? (
                <div className="text-black">
                  <h1 className="text-center font-bold text-lg mb-1">รายงานงบกำไรขาดทุนรายเดือน</h1>
                  <p className="text-center text-[10px] mb-4 text-gray-600">ประจำเดือน: {printData.monthLabel} | พิมพ์: {formatDDMMYYYY(new Date())} | สาขา: {branches.find(b=>b.id===selectedBranch)?.name}</p>
                  
                  <div className="space-y-4 text-sm">
                    {/* ยอดขายและต้นทุนวัตถุดิบ */}
                    <div>
                      <h3 className="font-bold border-b-2 border-gray-800 pb-1 mb-2 text-base">รายได้และต้นทุนขาย</h3>
                      <div className="flex justify-between font-bold mb-1"><span>ยอดขายรวมสุทธิ</span><span>{formatMoney(printData.sales)} บาท (100%)</span></div>
                      <div className="flex justify-between text-gray-700 ml-4 mb-1 border-b border-gray-200 pb-1"><span>หัก ต้นทุนวัตถุดิบใช้ไป</span><span>{formatMoney(printData.costUsed)} บาท ({pctValue(printData.costUsed, printData.sales)}%)</span></div>
                      <div className="flex justify-between text-red-600 ml-4 mb-1 border-b border-gray-200 pb-1"><span>หัก ต้นทุนของเสีย</span><span>{formatMoney(printData.costWaste)} บาท ({pctValue(printData.costWaste, printData.sales)}%)</span></div>
                      <div className="flex justify-between font-bold text-blue-700 mt-2 bg-blue-50 p-2"><span>กำไรขั้นต้น (Gross Profit)</span><span>{formatMoney(printData.grossProfit)} บาท ({pctValue(printData.grossProfit, printData.sales)}%)</span></div>
                    </div>

                    {/* ค่าใช้จ่ายดำเนินงาน */}
                    <div>
                      <h3 className="font-bold border-b-2 border-gray-800 pb-1 mb-2 mt-4 text-base">ค่าใช้จ่ายดำเนินงาน (OPEX)</h3>
                      <div className="mb-3">
                        <div className="font-bold text-gray-700 mb-1 flex justify-between"><span>ค่าใช้จ่ายคงที่รายเดือน (Overheads)</span><span>{formatMoney(printData.overhead)} บาท</span></div>
                        {printData.overheadList.length > 0 ? ( printData.overheadList.map(item => ( <div key={item.id} className="flex justify-between text-xs text-gray-600 ml-4 mb-0.5"><span>- {item.name} {item.actual === '' || item.actual === null ? '(ประเมิน)' : ''}</span><span>{formatMoney(item.actual !== '' && item.actual !== null ? item.actual : item.estimate)} บาท</span></div> )) ) : <div className="text-xs text-gray-400 ml-4 italic">- ไม่มีรายการ -</div>}
                      </div>
                      <div className="mb-3">
                        <div className="font-bold text-gray-700 mb-1 flex justify-between"><span>ค่าใช้จ่ายจุกจิกรายวัน (Daily Expenses)</span><span>{formatMoney(printData.dailyExp)} บาท</span></div>
                        {printData.expensesList.length > 0 ? ( printData.expensesList.map(item => ( <div key={item.name} className="flex justify-between text-xs text-gray-600 ml-4 mb-0.5"><span>- {item.name}</span><span>{formatMoney(item.amount)} บาท</span></div> )) ) : <div className="text-xs text-gray-400 ml-4 italic">- ไม่มีรายการ -</div>}
                      </div>
                      <div className="flex justify-between font-bold text-red-700 mt-2 border-t border-gray-300 pt-2"><span>รวมค่าใช้จ่ายดำเนินงานทั้งสิ้น</span><span>{formatMoney(printData.overhead + printData.dailyExp)} บาท ({pctValue(printData.overhead + printData.dailyExp, printData.sales)}%)</span></div>
                    </div>

                  })();
                  return (
                    <div className="bg-white rounded-xl shadow-sm border border-blue-100 overflow-hidden">
                      <div className="bg-gradient-to-r from-blue-600 to-indigo-600 px-4 py-3 flex justify-between items-center">
                        <h3 className="font-bold text-white text-sm">💰 บันทึกยอดขายรายวัน</h3>
                        <span className="text-[9px] text-blue-100 bg-blue-700 px-2 py-0.5 rounded">⚠️ ยังไม่บันทึก Firebase</span>
                      </div>
                      <div className="p-4 space-y-3">
                        {/* วันที่ + ปุ่มวันร้านปิด */}
                        <div className="flex gap-2 items-center">
                          <label className="text-xs font-bold text-gray-600 shrink-0">📅 วันที่:</label>
                          <input type="date" value={salesRecordDate.split('/').length===3 ? `${salesRecordDate.split('/')[2]}-${salesRecordDate.split('/')[1]}-${salesRecordDate.split('/')[0]}` : salesRecordDate}
                            onChange={e => { const d = e.target.value; if(d) { const p=d.split('-'); setSalesRecordDate(`${p[2]}/${p[1]}/${p[0]}`); const ex=dailySalesRecords.find(r=>r.date===`${p[2]}/${p[1]}/${p[0]}`); if(ex) loadSalesRecordForEdit(ex); else resetSalesRecordForm(); } }}
                            className="flex-1 p-2 text-xs border border-blue-200 rounded-lg outline-none focus:border-blue-500 font-bold" />
                          {existingRec && !srEditId && <button onClick={()=>loadSalesRecordForEdit(existingRec)} className="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold hover:bg-blue-200">✏️ แก้ไข</button>}
                          {srEditId && <button onClick={resetSalesRecordForm} className="text-[10px] bg-gray-100 text-gray-600 px-2 py-1 rounded font-bold hover:bg-gray-200">✕ ยกเลิก</button>}
                        </div>
                        {existingRec && !srEditId ? (
                          /* แสดงข้อมูลที่บันทึกไว้ */
                          <div className="bg-blue-50 border border-blue-100 rounded-lg p-3">
                            {existingRec.closedDay ? (
                              <div className="text-center text-gray-500 font-bold text-sm">🔒 วันร้านปิด (ยอดขาย 0)</div>
                            ) : (
                              <div className="space-y-1 text-xs">
                                {existingRec.cash > 0 && <div className="flex justify-between"><span className="text-gray-600">💵 เงินสด</span><span className="font-bold">{formatMoney(existingRec.cash)} บ.</span></div>}
                                {existingRec.transfer > 0 && <div className="flex justify-between"><span className="text-gray-600">🏦 โอน</span><span className="font-bold">{formatMoney(existingRec.transfer)} บ.</span></div>}
                                {existingRec.grab?.before > 0 && <div className="flex justify-between"><span className="text-gray-600">🛵 Grab{calcCommissionPct(existingRec.grab?.before, existingRec.grab?.after) ? `(${calcCommissionPct(existingRec.grab?.before, existingRec.grab?.after)}%)` : '(%)'}</span><span className="font-bold">{formatMoney(existingRec.grab?.after ?? existingRec.grab?.before)} บ.</span></div>}
                                {existingRec.lineman?.before > 0 && <div className="flex justify-between"><span className="text-gray-600">🛵 LINE MAN{calcCommissionPct(existingRec.lineman?.before, existingRec.lineman?.after) ? `(${calcCommissionPct(existingRec.lineman?.before, existingRec.lineman?.after)}%)` : '(%)'}</span><span className="font-bold">{formatMoney(existingRec.lineman?.after ?? existingRec.lineman?.before)} บ.</span></div>}
                                {(existingRec.credits||[]).map((c,i) => c.amount > 0 && <div key={i} className="flex justify-between"><span className="text-gray-600">💳 Credit: {c.name}</span><span className="font-bold text-orange-600">{formatMoney(c.amount)} บ.</span></div>)}
                                <div className="border-t border-blue-200 pt-1 flex justify-between font-black text-blue-800"><span>ยอดรวม</span><span>{formatMoney(calcDailySalesTotal(existingRec))} บ.</span></div>
                              </div>
                            )}
                          </div>
                        ) : (
                          /* ฟอร์มกรอกข้อมูล */
                          <div className="space-y-2">
                            <div className="grid grid-cols-2 gap-2">
                              <div className="bg-gray-50 p-2 rounded-lg border"><label className="text-[9px] font-bold text-gray-500 block mb-1">💵 เงินสด</label><input type="number" placeholder="0" value={srCash} onChange={e=>setSrCash(e.target.value)} className="w-full p-1.5 text-xs border rounded outline-none focus:border-blue-400 font-bold text-center" /></div>
                              <div className="bg-gray-50 p-2 rounded-lg border"><label className="text-[9px] font-bold text-gray-500 block mb-1">🏦 โอน</label><input type="number" placeholder="0" value={srTransfer} onChange={e=>setSrTransfer(e.target.value)} className="w-full p-1.5 text-xs border rounded outline-none focus:border-blue-400 font-bold text-center" /></div>
                            </div>
                            {/* Grab */}
                            <div className="bg-green-50 p-2 rounded-lg border border-green-100">
                              <div className="flex items-center gap-1 mb-1">
                                <span className="text-[10px] font-bold text-green-800">🛵 Grab{srGrabPct ? `(${srGrabPct}%)` : '(%)'}</span>
                                {srGrabPct && <span className="text-[8px] text-green-600 ml-auto">หักไป {srGrabPct}%</span>}
                              </div>
                              <div className="grid grid-cols-2 gap-2">
                                <div><label className="text-[8px] text-gray-500">ก่อนหัก%คอม</label><input type="number" placeholder="0" value={srGrabBefore} onChange={e=>setSrGrabBefore(e.target.value)} className="w-full p-1.5 text-xs border rounded outline-none focus:border-green-400 font-bold text-center" /></div>
                                <div><label className="text-[8px] text-gray-500">หลังหัก%คอม (ยอดรับจริง)</label><input type="number" placeholder="ยังไม่ได้รับ" value={srGrabAfter} onChange={e=>setSrGrabAfter(e.target.value)} className="w-full p-1.5 text-xs border rounded outline-none focus:border-green-400 font-bold text-center" /></div>
                              </div>
                            </div>
                            {/* LINE MAN */}
                            <div className="bg-lime-50 p-2 rounded-lg border border-lime-100">
                              <div className="flex items-center gap-1 mb-1">
                                <span className="text-[10px] font-bold text-lime-800">🛵 LINE MAN{srLinemanPct ? `(${srLinemanPct}%)` : '(%)'}</span>
                                {srLinemanPct && <span className="text-[8px] text-lime-600 ml-auto">หักไป {srLinemanPct}%</span>}
                              </div>
                              <div className="grid grid-cols-2 gap-2">
                                <div><label className="text-[8px] text-gray-500">ก่อนหัก%คอม</label><input type="number" placeholder="0" value={srLinemanBefore} onChange={e=>setSrLinemanBefore(e.target.value)} className="w-full p-1.5 text-xs border rounded outline-none focus:border-lime-400 font-bold text-center" /></div>
                                <div><label className="text-[8px] text-gray-500">หลังหัก%คอม (ยอดรับจริง)</label><input type="number" placeholder="ยังไม่ได้รับ" value={srLinemanAfter} onChange={e=>setSrLinemanAfter(e.target.value)} className="w-full p-1.5 text-xs border rounded outline-none focus:border-lime-400 font-bold text-center" /></div>
                              </div>
                            </div>
                            {/* Credits */}
                            <div className="bg-orange-50 p-2 rounded-lg border border-orange-100">
                              <div className="flex items-center justify-between mb-1">
                                <span className="text-[10px] font-bold text-orange-800">💳 Credit (ยังไม่ได้รับเงิน)</span>
                                {srCredits.length < 3 && <button onClick={()=>setSrCredits([...srCredits, {name:'',amount:''}])} className="text-[9px] text-orange-600 font-bold hover:text-orange-800">+ เพิ่ม</button>}
                              </div>
                              {srCredits.map((cr, ci) => (
                                <div key={ci} className="flex gap-2 mb-1 items-center">
                                  <input type="text" list="credit-name-list" placeholder={`ชื่อ credit ${ci+1}`} value={cr.name} onChange={e=>setSrCredits(srCredits.map((c,i)=>i===ci?{...c,name:e.target.value}:c))} className="flex-1 p-1.5 text-xs border rounded outline-none focus:border-orange-400 font-medium" />
                                  <datalist id="credit-name-list">{allCreditNames.map(n=><option key={n} value={n}/>)}</datalist>
                                  <input type="number" placeholder="ยอด" value={cr.amount} onChange={e=>setSrCredits(srCredits.map((c,i)=>i===ci?{...c,amount:e.target.value}:c))} className="w-20 p-1.5 text-xs border rounded outline-none focus:border-orange-400 font-bold text-center" />
                                  {srCredits.length > 1 && <button onClick={()=>setSrCredits(srCredits.filter((_,i)=>i!==ci))} className="text-red-400 font-bold text-sm">✕</button>}
                                </div>
                              ))}
                            </div>
                            {/* Total + Buttons */}
                            <div className="bg-blue-600 rounded-lg p-3 flex justify-between items-center">
                              <div><p className="text-[9px] text-blue-200">ยอดขายรวมวันนี้</p><p className="font-black text-white text-lg">{formatMoney(currentTotal)} บ.</p></div>
                              <div className="flex gap-2">
                                <button onClick={()=>saveDailySalesRecord(true)} className="bg-gray-600 hover:bg-gray-700 text-white text-[10px] font-bold px-3 py-1.5 rounded">🔒 ร้านปิด</button>
                                <button onClick={()=>saveDailySalesRecord(false)} className="bg-white text-blue-700 hover:bg-blue-50 font-bold px-4 py-1.5 rounded text-xs shadow-sm">💾 บันทึก</button>
                              </div>
                            </div>
                          </div>
                        )}
                        {/* ประวัติ 7 วันล่าสุด */}
                        {dailySalesRecords.length > 0 && (
                          <div>
                            <p className="text-[10px] font-bold text-gray-500 mb-1">📋 ประวัติ 7 วันล่าสุด</p>
                            <div className="space-y-1 max-h-40 overflow-y-auto">
                              {dailySalesRecords.slice(0,7).map(r => (
                                <div key={r.id} className="flex items-center gap-2 text-xs bg-gray-50 rounded px-2 py-1 border border-gray-100">
                                  <span className="font-bold text-gray-700 shrink-0 w-20">{r.date}</span>
                                  {r.closedDay ? <span className="text-gray-400 flex-1">ร้านปิด</span> : (
                                    <span className="text-blue-700 font-bold flex-1">{formatMoney(calcDailySalesTotal(r))} บ.
                                      {r.grab?.before > 0 && <span className="ml-1 text-green-600 text-[9px]">Grab{calcCommissionPct(r.grab?.before, r.grab?.after) ? `(${calcCommissionPct(r.grab?.before, r.grab?.after)}%)` : '(%)'}</span>}
                                      {r.lineman?.before > 0 && <span className="ml-1 text-lime-600 text-[9px]">LINE{calcCommissionPct(r.lineman?.before, r.lineman?.after) ? `(${calcCommissionPct(r.lineman?.before, r.lineman?.after)}%)` : '(%)'}</span>}
                                      {(r.credits||[]).filter(c=>c.amount>0).map((c,i)=><span key={i} className="ml-1 text-orange-500 text-[9px]">💳{c.name}</span>)}
                                    </span>
                                  )}
                                  <button onClick={()=>{ setSalesRecordDate(r.date); loadSalesRecordForEdit(r); }} className="text-blue-500 text-[9px] shrink-0 hover:text-blue-700">✏️</button>
                                  <button onClick={()=>deleteDailySalesRecord(r.id)} className="text-red-400 text-[9px] shrink-0 hover:text-red-600">🗑</button>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })()}

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                    <div className="flex justify-between items-start mb-4 border-b border-gray-100 pb-2">
                      <h2 className="font-bold text-gray-700 flex items-center text-lg"><span className="w-2 h-6 bg-orange-500 rounded-full mr-2"></span>บันทึกค่าใช้จ่ายรายวัน</h2>
                      <div className="flex items-center gap-2"><input type="date" value={countDate} onChange={(e)=>setCountDate(e.target.value)} className="text-[11px] font-bold text-blue-700 bg-blue-50 border border-blue-200 rounded px-2 py-1 outline-none shadow-sm cursor-pointer" /></div>
                    </div>
                    <div className="bg-orange-50 p-3 rounded-xl border border-orange-100">
                       <h3 className="text-xs font-bold text-orange-800 mb-2">💸 เพิ่มรายจ่ายจุกจิก (เช่น ค่าแก๊ส, ซื้อของเพิ่ม)</h3>
                       <div className="flex flex-wrap sm:flex-nowrap gap-2 mb-2">
                         <div className="flex-1 min-w-[140px]">
                           <input type="text" list="exp-cat-list" placeholder="ค่าอะไร..." value={expenseInput.name} onChange={e=>setExpenseInput({...expenseInput, name: e.target.value})} className="w-full p-2 text-xs border rounded-lg outline-none focus:border-orange-500 font-medium bg-white" />
                           <datalist id="exp-cat-list">{expCats.map(c=><option key={c} value={c}/>)}</datalist>
                         </div>
                         <div className="flex gap-2 flex-1 sm:flex-none">
                           <input type="number" placeholder="ยอดเงิน" value={expenseInput.amount} onChange={e=>setExpenseInput({...expenseInput, amount: e.target.value})} className="w-full sm:w-24 p-2 text-xs border rounded-lg outline-none focus:border-orange-500 font-bold text-center" />
                           <select value={expenseInput.payMethod || 'เงินสด'} onChange={e=>setExpenseInput({...expenseInput, payMethod: e.target.value})} className="p-2 text-xs border rounded-lg outline-none bg-white font-bold text-gray-700 shrink-0">
                             <option value="เงินสด">💵 สด</option>
                             <option value="โอน">🏦 โอน</option>
                           </select>
                           <button onClick={() => handleAddExpense()} className="bg-orange-500 hover:bg-orange-600 text-white px-4 rounded-lg font-bold text-lg shadow-sm active:scale-95 transition-transform shrink-0">+</button>
                         </div>
                       </div>
                       <p className="text-[9px] text-orange-600 mt-2">* ค่าใช้จ่ายที่บันทึกตรงนี้ จะถูกนำไปหักออกจากกำไรขั้นต้น (Gross Profit) ของวันนั้นๆ อัตโนมัติ หากกรอกผิดสามารถแก้ไขหรือลบในประวัติด้านล่างได้ทันที</p>
                    </div>
                    {(() => {
                      const tenDaysAgoObj = new Date(); tenDaysAgoObj.setDate(tenDaysAgoObj.getDate() - 10);
                      const recentExp = dailyExpenses.filter(e => parseDDMMYYYY(e.date) >= tenDaysAgoObj).sort((a,b) => parseDDMMYYYY(b.date) - parseDDMMYYYY(a.date));
                      return recentExp.length > 0 ? (
                        <div className="mt-3 border-t border-gray-100 pt-3">
                          <p className="text-[10px] font-bold text-gray-500 mb-2">📋 ประวัติค่าใช้จ่าย 10 วันล่าสุด</p>
                          <div className="space-y-1 max-h-40 overflow-y-auto pr-1">
                            {recentExp.map(e => (
                              <div key={e.id} className="flex items-center gap-2 text-xs bg-gray-50 rounded px-2 py-1.5 border border-gray-100 hover:bg-gray-100 transition-colors">
                                <span className="font-bold text-gray-700 shrink-0 w-20">{e.date}</span>
                                <span className="text-gray-700 flex-1 truncate">{e.name}</span>
                                <span className="text-orange-600 font-bold">{formatMoney(e.amount)} บ.</span>
                                <span className="text-[9px] text-gray-500 bg-white px-1 rounded border shadow-sm">{e.payMethod || 'เงินสด'}</span>
                                <button onClick={(ev) => { ev.stopPropagation(); setExpenseInput({ id: e.id, name: e.name, amount: e.amount, payMethod: e.payMethod || 'เงินสด' }); const dp = parseDDMMYYYY(e.date); setCountDate(`${dp.getFullYear()}-${String(dp.getMonth()+1).padStart(2,'0')}-${String(dp.getDate()).padStart(2,'0')}`); }} className="text-[10px] text-blue-600 hover:text-blue-800 bg-white border rounded px-1.5 py-0.5 shadow-sm ml-1">✏️ แก้ไข</button>
                                <button onClick={(ev) => { ev.stopPropagation(); if(window.confirm(`ยืนยันการลบ "${e.name}" ยอด ${e.amount} บาท?`)) setDailyExpenses(dailyExpenses.filter(x=>x.id!==e.id)); }} className="text-[10px] text-red-600 hover:text-red-800 bg-white border rounded px-1.5 py-0.5 shadow-sm">🗑️ ลบ</button>
                              </div>
                            ))}
                          </div>
                        </div>
                      ) : <div className="mt-3 border-t border-gray-100 pt-3"><p className="text-[10px] font-bold text-gray-400 italic">ไม่มีประวัติใน 10 วันล่าสุด</p></div>;
                    })()}
                  </div>

                  {auth.role === 'owner' && (
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col relative overflow-hidden">
                      <div className="absolute top-0 right-0 w-32 h-32 bg-purple-50 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
                      <div className="flex justify-between items-center mb-4 border-b border-gray-100 pb-2 relative z-10"><h2 className="font-bold text-gray-700 flex items-center text-lg"><span className="w-2 h-6 bg-purple-500 rounded-full mr-2"></span>สรุปรายเดือน (P&L)</h2>{Object.keys(dynamicMonthlyStats).length > 0 ? (<select value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="p-1.5 text-xs font-bold bg-white border border-gray-300 rounded-lg text-purple-700 outline-none shadow-sm cursor-pointer">{Object.keys(dynamicMonthlyStats).sort().reverse().map(key => (<option key={key} value={key}>{dynamicMonthlyStats[key].label}</option>))}</select>) : <span className="text-[10px] text-gray-400">ยังไม่มีข้อมูล</span>}</div>
                      <div className="bg-gray-800 p-3 rounded-xl shadow-sm mb-3 flex justify-between items-center relative z-10"><div><p className="text-[10px] text-gray-400 font-bold mb-0.5">ยอดขายรวมสุทธิ</p><p className="text-xl font-black text-white">{formatMoney(currentMonthData.sales)} <span className="text-xs font-normal text-gray-400">฿</span></p></div><button onClick={() => { triggerPrint({ type: 'monthly_summary', monthLabel: currentMonthData.label, sales: currentMonthData.sales, costUsed: currentMonthData.costUsed, costWaste: currentMonthData.costWaste, grossProfit: monthlyGrossProfit, overhead: currentMonthData.overhead, dailyExp: currentMonthData.dailyExp, netProfit: monthlyNetProfit, overheadList: currentMonthData.overheadList, expensesList: currentMonthData.expensesList }); }} className="text-[10px] bg-purple-500 hover:bg-purple-400 text-white px-2 py-1.5 rounded font-bold shadow-sm transition-colors flex items-center">🖨️ พิมพ์งบกำไรขาดทุน</button></div>
                      <div className="space-y-2 flex-1 relative z-10">
                        <div className="flex justify-between items-center bg-red-50/50 p-2 rounded-lg border border-red-100">
                          <div><p className="text-[10px] font-bold text-red-700">ต้นทุนขาย (Food Cost)</p><p className="text-[9px] text-red-500 leading-tight">ใช้ {formatMoney(currentMonthData.costUsed)} ({pctValue(currentMonthData.costUsed, currentMonthData.sales)}%) | เสีย {formatMoney(currentMonthData.costWaste)} ({pctValue(currentMonthData.costWaste, currentMonthData.sales)}%)</p></div>
                          <div className="text-right"><p className="font-bold text-red-600 text-sm">-{formatMoney(monthlyTotalFoodCost)}</p><p className="text-[9px] font-bold text-red-800 bg-red-100 px-1 rounded inline-block">{monthlyFoodCostPercent}%</p></div>
                        </div>
                        <div className="flex justify-between items-center bg-blue-50/50 p-2 rounded-lg border border-blue-100">
                          <p className="text-[11px] font-bold text-blue-800">กำไรขั้นต้น (Gross Profit)</p><div className="text-right"><p className="font-bold text-blue-700 text-sm">{formatMoney(monthlyGrossProfit)}</p><p className="text-[9px] font-bold text-blue-800 bg-blue-100 px-1 rounded inline-block">{monthlyGrossPercent}%</p></div>
                        </div>
                        <div className="flex justify-between items-center bg-orange-50/50 p-2 rounded-lg border border-orange-100 cursor-pointer hover:bg-orange-100 transition-colors" onClick={() => setExpandedMonthlyDetails(!expandedMonthlyDetails)}>
                          <div><p className="text-[10px] font-bold text-orange-700 flex items-center">ต้นทุนบริหาร (Admin Cost) <span className="ml-1 text-[8px] bg-orange-200 px-1 rounded shadow-sm">กดดูรายละเอียด</span></p><p className="text-[9px] text-orange-500 leading-tight">รายเดือน {formatMoney(currentMonthData.overhead)} | รายวัน {formatMoney(currentMonthData.dailyExp)}</p></div>
                          <div className="text-right"><p className="font-bold text-orange-600 text-sm">-{formatMoney(currentMonthData.overhead + currentMonthData.dailyExp)}</p><p className="text-[9px] font-bold text-orange-800 bg-orange-100 px-1 rounded inline-block">{monthlyAdminPercent}%</p></div>
                        </div>
                        {expandedMonthlyDetails && (
                          <div className="p-3 bg-white border border-orange-200 rounded-lg shadow-inner text-[10px] animate-in slide-in-from-top-2">
                            <div className="grid grid-cols-2 gap-4">
                              <div><p className="font-bold text-gray-700 mb-1 border-b pb-1">รายเดือน {currentMonthData.isEstimate ? '(ประเมิน)' : ''}</p><ul className="space-y-1 text-gray-600">{currentMonthData.overheadList?.length > 0 ? currentMonthData.overheadList.map(o => ( <li key={o.id} className="flex justify-between"><span className="truncate pr-1">{o.name}</span><span className="font-medium text-gray-800 shrink-0">{formatMoney(o.actual || o.estimate)}</span></li> )) : <li className="text-gray-400 italic">ไม่มีรายการ</li>}</ul></div>
                              <div><p className="font-bold text-gray-700 mb-1 border-b pb-1">รายวัน (รวมทั้งเดือน)</p><ul className="space-y-1 text-gray-600">{currentMonthData.expensesList?.map(e => {
                                                return (
                                                  <li key={e.name} className="flex justify-between items-center group">
                                                    <span className="truncate pr-2">- {e.name}</span>
                                                    <div className="flex items-center gap-1 shrink-0">
                                                      <span className="font-bold text-gray-800">{formatMoney(e.amount)} ฿</span>
                                                    </div>
                                                  </li>
                                                );
                                              }) || <li className="text-gray-400 italic">ไม่มีรายการ</li>}</ul></div>
                            </div>
                          </div>
                        )}
                        <div className={`flex justify-between items-center p-2.5 rounded-lg border-2 mt-1 shadow-sm ${monthlyNetProfit < 0 ? 'bg-red-100 border-red-500' : 'bg-green-100 border-green-500'}`}>
                          <p className={`text-sm font-black ${monthlyNetProfit < 0 ? 'text-red-800' : 'text-green-800'}`}>{monthlyNetProfit < 0 ? 'ขาดทุนสุทธิ (Net Loss)' : 'กำไรสุทธิ (Net Profit)'}</p>
                          <ProfitLabel val={monthlyNetProfit} pctVal={monthlyNetPercent} />
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                {auth.role === 'owner' && (
                  <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">

                        <button onClick={() => triggerPrint({ type: 'dashboard_history', data: dashHistoryItems })} className="text-[10px] bg-blue-600 text-white px-2 py-1.5 rounded font-bold shadow hover:bg-blue-700 mr-2 transition-colors flex items-center">🖨️ พิมพ์รายงาน</button>
                        <button onClick={() => setDashPage(Math.max(1, dashPage - 1))} className="bg-gray-700 text-white w-6 h-6 rounded flex items-center justify-center text-xs hover:bg-gray-600 transition-colors">&lt;</button>

                        <button onClick={() => setDashPage(dashPage + 1)} className="bg-gray-700 text-white w-6 h-6 rounded flex items-center justify-center text-xs hover:bg-gray-600 transition-colors">&gt;</button>

                    </div>

                        const netProfit = item.grossProfit - item.dailyExp - item.overhead;

                        const gpPct = item.sales > 0 ? ((item.grossProfit / item.sales) * 100).toFixed(1) : 0;
                        const adminPct = item.sales > 0 ? (((item.dailyExp + item.overhead) / item.sales) * 100).toFixed(1) : 0;
                        const netPercent = item.sales > 0 ? ((netProfit / item.sales) * 100).toFixed(1) : 0;
                        const isExpanded = expandedDashRow === item.id;
                        return (
                          <div key={item.id} className={`flex flex-col transition-colors ${item.days > 1 ? 'bg-orange-50/20' : 'bg-white'}`}>

                              <div className="w-1/4 pr-2">
                                <div className="font-bold text-[11px] sm:text-xs text-gray-800 flex items-center flex-wrap gap-1">{item.isTop3 && <span title="Top 3 กำไรขั้นต้นสูงสุดของเดือน" className="text-xs shrink-0">🏆</span>}{item.isBottom3 && <span title="Bottom 3 กำไรขั้นต้นต่ำสุดของเดือน" className="text-xs shrink-0">⚠️</span>}<span>{item.dateLabel}</span></div>
