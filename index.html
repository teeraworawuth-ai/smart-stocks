                                  if (diff < 0) return <div className="text-[10px] font-bold mt-1 px-1.5 py-0.5 rounded inline-block bg-green-100 text-green-700 border border-green-200">ถูกลง {Math.abs(diff)} บ. ({Math.abs(pct)}%)</div>;
                                  return <div className="text-[10px] font-bold mt-1 px-1.5 py-0.5 rounded inline-block bg-gray-100 text-gray-500 border border-gray-200">ราคาเท่าเดิม</div>;
                                })()
                              )}
                            </div>
                          </div>
                          <button onClick={handleAddToBill} disabled={!purchaseQty || !purchasePrice} className="w-full mt-4 py-3 bg-blue-50 text-blue-700 font-bold rounded-xl border border-blue-200 disabled:opacity-50 hover:bg-blue-100 transition-colors shadow-sm text-sm">เพิ่มลงในบิล</button>
                        </div>
                      </div>
                    </div>

                    {billItems.length > 0 && (
                      <div className="bg-white p-3 rounded-xl shadow-sm border border-gray-200 animate-in slide-in-from-bottom-4">
                        <div className="flex justify-between items-center mb-3 border-b pb-2">
                          <h3 className="font-bold text-gray-800 text-sm">บิลชั่วคราว ({billItems.length})</h3>
                          <select value={paymentMethod} onChange={(e) => setPaymentMethod(e.target.value)} className="p-1 text-xs bg-gray-50 border rounded font-bold outline-none">
                            <option>เงินสด</option><option>โอนเงิน</option><option>เครดิต</option>
                          </select>
                        </div>
                        <div className="space-y-2 mb-4">
                          {billItems.map((bItem) => (
                            <div key={bItem.cartId} className="flex flex-col bg-gray-50 p-2 rounded-lg border border-gray-200">
                              <div className="flex justify-between items-start">
                                <div className="flex-1 min-w-0 pr-2">
                                  <div className="font-bold text-xs">
                                    {getItemName(bItem.item)} 
                                    {bItem.priceNote && (
                                      <span className={`ml-1 text-[9px] px-1 rounded ${bItem.priceNote.includes('แพง') ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-700'}`}>
                                        [{bItem.priceNote}]
                                      </span>
                                    )}
                                  </div>
                                  <div className="text-[10px] text-gray-500 mt-0.5">{formatNumber(bItem.qty)} {bItem.item.purchaseUnit || bItem.item.unit} x {formatNumber(bItem.price)} บ.</div>
                                </div>
                                <div className="flex items-center gap-2">
                                  <div className="font-bold text-sm text-gray-800">{formatMoney(bItem.total)}</div>
                                  <button onClick={() => setBillItems(billItems.filter(item => item.cartId !== bItem.cartId))} className="w-6 h-6 flex items-center justify-center bg-red-100 text-red-600 rounded-md shrink-0 text-xs">🗑️</button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                        <button onClick={handleSaveBill} className="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white text-base font-bold rounded-xl shadow-md active:scale-95 transition-transform">✅ บันทึกรับของเข้าสต๊อก</button>
                      </div>
                    )}
                  </>
                ) : (
                  <div className="bg-white p-3 rounded-xl shadow-sm border border-gray-200">
                    <p className="text-[11px] text-gray-500 mb-3 bg-gray-50 p-2 rounded-lg border border-gray-200">
                      * ประวัติรับของจะถูกจัดกลุ่มตามวันที่ สามารถกดที่วันที่เพื่อดูบิลทั้งหมด และกดพิมพ์สรุปรายวัน หรือ พิมพ์แยกบิลได้
                    </p>
                    {receipts.length === 0 ? (
                      <div className="text-center text-gray-400 py-6 font-bold">ยังไม่มีประวัติการรับของ</div>
                    ) : (
                      Object.entries(receipts.reduce((acc, bill) => {
                        (acc[bill.date] = acc[bill.date] || []).push(bill);
                        return acc;
                      }, {})).map(([date, billsOnDate]) => {
                        const isExpandedDate = expandedReceiptDate === date;
                        const dateTotal = billsOnDate.reduce((sum, b) => sum + b.total, 0);

                        return (
                          <div key={date} className="mb-2 border border-gray-200 rounded-lg overflow-hidden">
                            <div onClick={() => setExpandedReceiptDate(isExpandedDate ? null : date)} className="bg-gray-800 text-white px-3 py-2.5 flex justify-between items-center cursor-pointer hover:bg-gray-700">
                              <div className="font-bold text-sm flex items-center">
                                <span className="w-2 h-2 bg-blue-400 rounded-full mr-2"></span> {date}
                                <span className="ml-2 text-[10px] bg-gray-600 px-1.5 rounded-full">{billsOnDate.length} บิล</span>
                              </div>
                              <div className="flex items-center gap-3">
                                <span className="font-bold text-sm">{formatMoney(dateTotal)} บ.</span>
                                <span className="text-gray-400 text-[10px]">{isExpandedDate ? '▲' : '▼'}</span>
                              </div>
                            </div>

                            {isExpandedDate && (
                              <div className="bg-gray-50 p-2 border-t border-gray-300">
                                <div className="flex justify-end mb-2 gap-2">
                                  <button onClick={() => triggerPrint({ type: 'dailyReceiptSummaryByBill', date: date, bills: billsOnDate })} className="text-[10px] bg-gray-600 text-white px-2 py-1 rounded font-bold shadow hover:bg-gray-700 flex items-center">
                                    🖨️ พิมพ์สรุปรายวัน (แยกบิล)
                                  </button>
                                  <button onClick={() => triggerPrint({ type: 'dailyReceiptSummary', date: date, bills: billsOnDate })} className="text-[10px] bg-blue-600 text-white px-2 py-1 rounded font-bold shadow hover:bg-blue-700 flex items-center">
                                    🖨️ พิมพ์สรุปรายวัน (แยกหมวด)
                                  </button>
                                </div>
                                <div className="space-y-2">
                                  {billsOnDate.map(bill => {
                                    const isExpandedBill = expandedBillId === bill.id;
                                    return (
                                      <div key={bill.id} className="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
                                        <div onClick={() => setExpandedBillId(isExpandedBill ? null : bill.id)} className="px-3 py-2 bg-blue-50/50 hover:bg-blue-100/50 cursor-pointer flex justify-between items-center">
                                          <div>
                                            <div className="font-bold text-xs text-gray-800">{bill.vendor}</div>
                                            <div className="text-[9px] text-gray-500 mt-0.5">ชำระ: {bill.method}</div>
                                          </div>
                                          <div className="flex items-center gap-3">
                                            <span className="font-bold text-blue-700 text-xs">{formatMoney(bill.total)} บ.</span>
                                          </div>
                                        </div>
                                        {isExpandedBill && (
                                          <div className="p-2 border-t border-gray-100">
                                            <div className="flex justify-end mb-2">
                                              <button onClick={() => triggerPrint({ type: 'receipt', data: bill })} className="text-[9px] bg-gray-200 text-gray-700 px-2 py-1 rounded font-bold border border-gray-300">🖨️ พิมพ์บิลนี้</button>
                                            </div>
                                            <table className="w-full text-left text-[10px]">
                                              <thead className="bg-gray-100 text-gray-600">
                                                <tr>
                                                  <th className="p-1 border-b">รายการ</th>
                                                  <th className="p-1 border-b text-center">จำนวน</th>
                                                  <th className="p-1 border-b text-center">ราคา/หน่วย</th>
                                                  <th className="p-1 border-b text-right">รวม</th>
                                                </tr>
                                              </thead>
                                              <tbody>
                                                {bill.items.map((item, idx) => (
                                                  <tr key={idx} className="border-b border-gray-50 border-dashed hover:bg-gray-50 transition-colors">
                                                    <td className="p-1 py-2">
                                                      <div className="font-bold text-gray-800">{getItemName(item.item)}</div>
                                                    </td>
                                                    <td className="p-1 py-2 text-center font-bold text-gray-700">
                                                      {item.qty} <span className="text-[8px] text-gray-500 font-normal">{item.item.purchaseUnit}</span>
                                                    </td>
                                                    <td className="p-1 py-2 text-center">
                                                      <div className="font-bold text-gray-800">{formatNumber(item.price)} <span className="text-[8px] font-normal text-gray-500">บ.</span></div>
                                                      {(item.oldPrice > 0 || item.priceNote) && (
                                                        <div className="text-[8px] leading-tight mt-0.5 whitespace-nowrap">
                                                          {item.priceNote && (
                                                            <span className={`font-bold ${item.priceNote.includes('แพง') ? 'text-red-500' : 'text-green-600'}`}>
                                                              ({item.priceNote})
                                                            </span>
                                                          )}
                                                        </div>
                                                      )}
                                                    </td>
                                                    <td className="p-1 py-2 text-right font-bold text-blue-700">
                                                      {formatMoney(item.total)}
                                                    </td>
                                                  </tr>
                                                ))}
                                              </tbody>
                                            </table>
                                          </div>
                                        )}
                                      </div>
                                    )
                                  })}
                                </div>
                              </div>
                            )}
                          </div>
                        )
                      })
                    )}
                  </div>
                )}
              </div>
            )}

            {/* TAB: DAILY COUNT (เช็คสต๊อก) */}
            {activeTab === 'dailyCount' && (
              <div className="space-y-4 animate-in fade-in pb-10">
                <div className="bg-white border border-gray-200 p-3 rounded-xl flex flex-col justify-between items-start gap-2 shadow-sm">
                  <div className="flex items-center gap-2 w-full">
                    <div className="bg-red-100 p-2 rounded-lg text-red-600 leading-none">📝</div>
                    <div className="flex-1">
                      <h2 className="font-bold text-gray-800 text-sm">นับสต๊อกสิ้นวัน</h2>
                      <div className="flex items-center mt-1">
                        <span className="text-[10px] text-gray-500 mr-2">วันที่นับ:</span>
                        <input type="date" value={countDate} onChange={(e) => setCountDate(e.target.value)} className="text-[11px] font-bold text-blue-700 bg-blue-50 border border-blue-200 rounded px-1.5 py-0.5 outline-none w-full max-w-[120px]"/>
                      </div>
                    </div>
                  </div>
                </div>

                {categoryOrder.map(category => {
                  const itemsInCategory = inventory.filter(i => i.category === category && isItemVisible(i));
                  if (itemsInCategory.length === 0) return null;
                  
                  const isLocked = categoryConfirmStatus[category] === true;

                  return (
                    <div key={category} className="mb-4">
                      <div className="flex justify-between items-center border-b border-gray-300 pb-1 mb-2 px-1">
                        <h3 className="font-bold text-gray-700 text-[13px] flex items-center">
                          <span className={`w-1.5 h-3.5 mr-2 rounded-full ${isLocked ? 'bg-green-500' : 'bg-gray-500'}`}></span>
                          {category}
                        </h3>
                        <button 
                          onClick={() => toggleCategoryLock(category)}
                          className={`text-[10px] px-2 py-1 rounded font-bold border transition-colors ${isLocked ? 'bg-green-100 text-green-700 border-green-300 hover:bg-red-50 hover:text-red-600 hover:border-red-200' : 'bg-gray-100 text-gray-600 border-gray-300 hover:bg-gray-200'}`}
                        >
                          {isLocked ? '✔️ ยืนยันแล้ว (คลิกเพื่อปลด)' : 'ยืนยันหมวดนี้'}
                        </button>
                      </div>
                      
                      <div className={`grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 px-1 w-full overflow-hidden transition-opacity ${isLocked ? 'opacity-50 grayscale-[0.3]' : 'opacity-100'}`}>
                        {itemsInCategory.map((item) => {
                          const countData = dailyCounts[item.id] || { actual: '', waste: 0, reason: '', photo: '' };
                          return (
                            <div key={item.id} className={`border p-2 rounded-lg flex flex-col justify-between shadow-sm w-full ${isLocked ? 'bg-gray-50 border-gray-200' : 'bg-white border-blue-100 hover:border-blue-300'}`}>
                              <div className="flex justify-between items-center gap-2 mb-1.5">
                                <div className="flex-1 overflow-hidden">
                                  <h4 className="font-bold text-gray-800 text-[12px] truncate leading-tight" title={item.name}>{getItemName(item)}</h4>
                                  <p className="text-[9px] text-gray-500 mt-0.5">มี: {item.currentStock} {item.unit}</p>
                                </div>
                                <div className="flex items-center shrink-0">
                                  <input 
                                    type="number" 
                                    placeholder={item.currentStock} 
                                    value={countData.actual} 
                                    onChange={(e) => handleDailyCountChange(item.id, e.target.value)} 
                                    disabled={isLocked}
                                    className="w-12 p-1 border border-blue-300 rounded text-center font-bold text-sm focus:border-blue-600 outline-none disabled:bg-gray-100 disabled:text-gray-500" 
                                  />
                                </div>
                              </div>
                              <div className="mt-auto">
                                {countData.waste > 0 ? (
                                  <div className="bg-red-50 border border-red-200 p-1.5 rounded flex items-center justify-between">
                                    <div className="text-[9px] text-red-800 truncate pr-1">
                                      <strong>เสีย: {countData.waste}</strong> <span className="opacity-70">({countData.reason})</span>
                                      {countData.photo && <span className="ml-1 text-[8px] bg-red-200 px-1 rounded">📸</span>}
                                    </div>
                                    <button disabled={isLocked} onClick={() => setShowWasteModal(item.id)} className="text-[9px] bg-white border border-red-300 text-red-600 px-1.5 py-0.5 rounded font-bold shrink-0 shadow-sm disabled:opacity-50">แก้</button>
                                  </div>
                                ) : (
                                  <button disabled={isLocked} onClick={() => setShowWasteModal(item.id)} className="text-[10px] w-full text-center text-red-400 bg-gray-50 py-1 rounded border border-gray-100 border-dashed hover:bg-red-50 hover:text-red-500 disabled:opacity-50 disabled:hover:bg-gray-50 disabled:hover:text-red-400">
                                    + แจ้งของเสีย
                                  </button>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
                {inventory.length === 0 && <div className="text-center text-gray-400 py-10 font-bold border-2 border-dashed border-gray-200 rounded-xl bg-white">ไม่มีวัตถุดิบให้เช็คสต๊อก กรุณาเพิ่มวัตถุดิบก่อน</div>}

                <div className="bg-white p-3 rounded-xl border border-gray-200 mt-4 shadow-sm sticky bottom-4 z-10 w-full">
                  {auth.role === 'staff' && (
                    <>
                      <label className="block text-[11px] font-bold text-gray-700 mb-1">ลงชื่อผู้ตรวจสอบ <span className="text-red-500">*</span></label>
                      <input type="text" value={staffNameInput} onChange={(e) => setStaffNameInput(e.target.value)} maxLength="30" placeholder="พิมพ์ชื่อ (ไม่เกิน 30 ตัวอักษร)" className="w-full p-2.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 mb-3" />
                    </>
                  )}
                  <button 
                    onClick={submitDailyCount} 
                    disabled={!isAllCategoriesConfirmed}
                    className={`w-full py-3.5 text-white font-bold rounded-xl shadow-md transition-all text-base ${isAllCategoriesConfirmed ? 'bg-red-600 hover:bg-red-700 active:scale-95' : 'bg-gray-400 cursor-not-allowed'}`}
                  >
                    {isAllCategoriesConfirmed ? '✅ ยืนยันส่งยอดสต๊อกทั้งหมด' : '🔒 กรณียืนยันหมวดหมู่ให้ครบก่อน'}
                  </button>
                </div>
              </div>
            )}

            {/* TAB: HISTORY (ประวัติ) */}
            {activeTab === 'history' && auth.role !== 'staff' && (
              <div className="space-y-4 animate-in fade-in">
                <div className="flex bg-gray-200 rounded-lg p-1 overflow-x-auto hide-scrollbar">
                  <button onClick={() => setHistoryMode('daily')} className={`shrink-0 px-4 py-2 text-[11px] sm:text-xs font-bold rounded-md transition-colors ${historyMode === 'daily' ? 'bg-white shadow text-blue-700' : 'text-gray-500 hover:text-gray-700'}`}>📊 สรุปยอด</button>
                  <button onClick={() => setHistoryMode('price')} className={`shrink-0 px-4 py-2 text-[11px] sm:text-xs font-bold rounded-md transition-colors ${historyMode === 'price' ? 'bg-white shadow text-blue-700' : 'text-gray-500 hover:text-gray-700'}`}>📈 ประวัติราคา</button>
                  <button onClick={() => setHistoryMode('stockQty')} className={`shrink-0 px-4 py-2 text-[11px] sm:text-xs font-bold rounded-md transition-colors ${historyMode === 'stockQty' ? 'bg-white shadow text-blue-700' : 'text-gray-500 hover:text-gray-700'}`}>📦 จำนวนสต๊อก</button>
                  <button onClick={() => setHistoryMode('stockValue')} className={`shrink-0 px-4 py-2 text-[11px] sm:text-xs font-bold rounded-md transition-colors ${historyMode === 'stockValue' ? 'bg-white shadow text-blue-700' : 'text-gray-500 hover:text-gray-700'}`}>💰 มูลค่าสต๊อก(FIFO)</button>
                </div>

                {historyMode === 'daily' && (
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 animate-in fade-in">
                    <div className="flex flex-col sm:flex-row justify-between sm:items-center mb-3 gap-2">
                      <h2 className="font-bold text-gray-800 text-base">ประวัติสรุปรายวัน (มูลค่า/บาท)</h2>
                      <div className="flex gap-2">
                         <button onClick={() => triggerPrint({ type: 'history_daily', data: dailyHistory })} className="text-[10px] bg-blue-600 text-white px-2 py-1 rounded font-bold shadow hover:bg-blue-700">🖨️ พิมพ์รายงาน</button>
                      </div>
                    </div>
                    <div className="flex gap-2 text-[9px] font-bold bg-gray-50 px-2 py-1 rounded-full border border-gray-200 w-fit mb-3">
                      <span className="flex items-center"><span className="w-1.5 h-1.5 bg-green-500 rounded-full mr-1.5 shadow-sm"></span> เสร็จสมบูรณ์</span>
                      <span className="flex items-center"><span className="w-1.5 h-1.5 bg-yellow-500 rounded-full mr-1.5 shadow-sm"></span> รอใส่ยอดขาย</span>
                    </div>
                    {dailyHistory.length === 0 ? (
                      <div className="text-center text-gray-400 py-6 font-bold">ยังไม่มีประวัติการเช็คสต๊อก</div>
                    ) : (
                      <div className="overflow-x-auto rounded-lg border border-gray-200">
                        <table className="w-full text-left text-[11px] whitespace-nowrap">
                          <thead className="bg-gray-800 text-white font-bold">
                            <tr>
                              <th className="px-2 py-2 text-left">วันที่/รอบ</th>
                              <th className="px-2 py-2 text-right">ยอดขาย</th>
                              <th className="px-2 py-2 text-right text-blue-300">ทุนใช้งาน</th>
                              <th className="px-2 py-2 text-right text-red-300">ทุนเสีย</th>
                              <th className="px-2 py-2 text-right font-bold text-green-300">กำไร</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-200 bg-white">
                          {dailyHistory.sort((a,b) => parseDDMMYYYY(b.endDate || b.date) - parseDDMMYYYY(a.endDate || a.date)).map((day) => {
                            const isExpanded = expandedHistoryDate === (day.id || day.date);
                            const isPending = day.sales === null;
                            const profit = isPending ? null : ((day.sales || 0) - (day.totalUsedVal + day.totalWasteVal));
                            
                            return (
                              <React.Fragment key={day.id || day.date}>
                                <tr onClick={() => toggleHistoryRow(day.id || day.date)} className={`hover:bg-blue-50 active:bg-blue-100 cursor-pointer ${isExpanded ? 'bg-blue-50 border-l-[3px] border-l-blue-500' : 'border-l-[3px] border-l-transparent'}`}>
                                  <td className="px-2 py-2.5 font-bold flex items-center">
                                    <span className={`w-1.5 h-1.5 rounded-full mr-1.5 ${isPending ? 'bg-yellow-400' : 'bg-green-500 shadow-sm'}`}></span>
                                    {day.days > 1 ? `${day.startDate} - ${day.endDate}` : (day.endDate || day.date)}
                                  </td>
                                  <td className="px-2 py-2.5 text-right font-bold text-gray-800">
                                    {isPending ? <span className="text-[10px] text-yellow-600 bg-yellow-100 px-1.5 py-0.5 rounded border border-yellow-200">รอระบุยอดขาย</span> : formatMoney(day.sales)}
                                  </td>
                                  <td className="px-2 py-2.5 text-right font-bold text-blue-700">{day.totalUsedVal > 0 ? formatMoney(day.totalUsedVal) : '-'}</td>
                                  <td className="px-2 py-2.5 text-right font-bold text-red-600">{day.totalWasteVal > 0 ? formatMoney(day.totalWasteVal) : '-'}</td>
                                  <td className="px-2 py-2.5 text-right font-bold text-green-700 bg-green-50/50">
                                    {isPending ? '-' : formatMoney(profit)}
                                  </td>
                                </tr>
                                {isExpanded && (
                                  <tr>
                                    <td colSpan="5" className="p-0 bg-gray-100/80 border-b-2 border-gray-300">
                                      <div className="p-2 sm:p-3 border-l-4 border-blue-500 overflow-x-auto">
                                        {/* ปุ่มยกเลิก สำหรับรอบที่ยังไม่ได้ใส่ยอดขาย (เฉพาะเจ้าของ) */}
                                        {isPending && auth.role === 'owner' && (
                                          <div className="mb-3 flex justify-end">
                                            <button onClick={() => revertPendingSubmission(day.id)} className="text-[10px] bg-white border border-red-300 text-red-600 px-3 py-1.5 rounded font-bold shadow-sm hover:bg-red-50">
                                              ⚠️ ยกเลิกและดึงรอบนี้กลับไปแก้ไข
                                            </button>
                                          </div>
                                        )}
                                        {categoryOrder.map(cat => {
                                          const catItems = day.details.filter(d => d.category === cat).sort((a, b) => inventory.findIndex(i => i.id === a.id) - inventory.findIndex(i => i.id === b.id));
                                          if (catItems.length === 0) return null;
                                          return (
                                            <div key={cat} className="mb-3 last:mb-1 bg-white rounded border border-gray-300 shadow-sm overflow-hidden w-full max-w-[600px]">
                                              <div className="bg-gray-200 px-2 py-1 text-[10px] font-bold text-gray-700 border-b border-gray-300">{cat}</div>
                                              <table className="w-full text-[10px] text-left border-collapse">
                                                <thead>
                                                  <tr className="bg-gray-50 text-gray-500">
                                                    <th className="px-2 py-1 font-normal border-r">รายการ</th>
                                                    <th className="px-1 py-1 text-center font-normal border-r w-8">มา</th>
                                                    <th className="px-1 py-1 text-center font-normal border-r w-8">รับ</th>
                                                    <th className="px-1 py-1 text-center font-normal border-r w-8">ใช้</th>
                                                    <th className="px-1 py-1 text-center font-normal text-red-600 border-r w-14">เสีย</th>
                                                    <th className="px-1 py-1 text-center font-bold text-gray-700 w-10">เหลือ</th>
                                                  </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100">
                                                  {catItems.map(item => (
                                                    <tr key={item.id} className="hover:bg-gray-50">
                                                      <td className="px-2 py-1.5 font-bold text-gray-800 border-r truncate max-w-[100px]" title={item.name}>{item.name} <span className="text-[8px] font-normal text-gray-400">({item.unit})</span></td>
                                                      <td className="px-1 py-1.5 text-center border-r text-gray-600">{formatNumber(item.open)}</td>
                                                      <td className="px-1 py-1.5 text-center border-r text-green-600 font-medium">{item.bought > 0 ? `+${formatNumber(item.bought)}` : '-'}</td>
                                                      <td className="px-1 py-1.5 text-center border-r text-blue-600 font-bold">{item.used > 0 ? formatNumber(item.used) : '-'}</td>
                                                      <td className="px-1 py-1.5 text-center border-r">
                                                        {item.waste > 0 ? (
                                                          <div onClick={(e) => { e.stopPropagation(); setWasteDetailModal(item); }} className="inline-block bg-red-100 text-red-700 px-1 py-0.5 rounded cursor-pointer hover:bg-red-200 active:scale-95 transition-transform">
                                                            <span className="font-bold">{formatNumber(item.waste)}</span>
                                                            <span className="text-[8px] block leading-none pt-0.5">({(item.waste * item.costPerUnit).toFixed(0)} ฿)</span>
                                                          </div>
                                                        ) : '-'}
                                                      </td>
                                                      <td className="px-1 py-1.5 text-center font-bold text-gray-900 bg-gray-50/50">{formatNumber(item.close)}</td>
                                                    </tr>
                                                  ))}
                                                </tbody>
                                              </table>
                                            </div>
                                          );
                                        })}
                                      </div>
                                    </td>
                                  </tr>
                                )}
                              </React.Fragment>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                    )}
                  </div>
                )}

                {historyMode === 'price' && auth.role !== 'staff' && (
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 animate-in fade-in">
                    <div className="flex flex-col sm:flex-row justify-between sm:items-center mb-4 gap-3">
                      <h2 className="font-bold text-gray-800 text-base">📈 ประวัติราคาวัตถุดิบ</h2>
                      <div className="flex bg-gray-100 p-1 rounded-lg shrink-0">
                        <button onClick={() => setPriceViewMode('matrix')} className={`px-3 py-1.5 text-[11px] sm:text-xs font-bold rounded-md transition-colors ${priceViewMode === 'matrix' ? 'bg-white shadow-sm text-blue-700' : 'text-gray-500 hover:text-gray-700'}`}>ตาราง 10 วัน</button>
                        <button onClick={() => setPriceViewMode('list')} className={`px-3 py-1.5 text-[11px] sm:text-xs font-bold rounded-md transition-colors ${priceViewMode === 'list' ? 'bg-white shadow-sm text-blue-700' : 'text-gray-500 hover:text-gray-700'}`}>แยกตามรายการ</button>
                      </div>
                    </div>
                    
                    {priceViewMode === 'matrix' ? (
                      <div className="space-y-3 animate-in fade-in">
                        <div className="flex overflow-x-auto hide-scrollbar gap-2 pb-1 border-b border-gray-100">
                          {categoryOrder.map(cat => (
                            <button key={cat} onClick={() => setMatrixCategory(cat)} className={`shrink-0 px-3 py-1.5 rounded-full text-[11px] sm:text-xs font-bold border transition-colors ${matrixCategory === cat ? 'bg-gray-800 text-white border-gray-800' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50 shadow-sm'}`}>
                              {cat}
                            </button>
                          ))}
                        </div>
                        <div className="flex justify-between items-center bg-gray-50 p-2 rounded-lg border border-gray-200">
                          <div className="flex gap-1">
                            <button onClick={() => shiftMatrix(10)} disabled={matrixOffset >= maxMatrixOffset} className="px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-xs font-bold text-gray-600 hover:bg-gray-100 shadow-sm active:scale-95 disabled:opacity-50">&lt;&lt;</button>
                            <button onClick={() => shiftMatrix(1)} disabled={matrixOffset >= maxMatrixOffset} className="px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-xs font-bold text-gray-600 hover:bg-gray-100 shadow-sm active:scale-95 disabled:opacity-50">&lt;</button>
                          </div>
                          <div className="text-[11px] sm:text-xs font-bold text-gray-800">
                            {visibleDates.length > 0 ? `${visibleDates[0]} - ${visibleDates[visibleDates.length - 1]}` : 'ไม่มีประวัติ'}
                          </div>
                          <div className="flex gap-1">
                            <button onClick={() => shiftMatrix(-1)} disabled={matrixOffset <= 0} className="px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-xs font-bold text-gray-600 hover:bg-gray-100 shadow-sm active:scale-95 disabled:opacity-50">&gt;</button>
                            <button onClick={() => shiftMatrix(-10)} disabled={matrixOffset <= 0} className="px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-xs font-bold text-gray-600 hover:bg-gray-100 shadow-sm active:scale-95 disabled:opacity-50">&gt;&gt;</button>
                          </div>
                        </div>
                        <div className="overflow-x-auto border border-gray-300 rounded-lg shadow-sm">
                          <table className="w-full text-left text-[11px] whitespace-nowrap bg-white min-w-max border-collapse">
                            <thead className="bg-gray-100 text-gray-700 border-b border-gray-300">
                              <tr>
                                <th className="p-2 sticky left-0 bg-gray-100 border-r border-gray-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] z-10 min-w-[120px]">รายการ</th>
                                {visibleDates.map((dateStr, i) => {
                                  const [d, m] = dateStr.split('/');
                                  return (
                                    <th key={i} className="py-2 px-1 text-center border-r border-gray-200 min-w-[55px]">
                                      <div className="text-[10px] font-bold text-gray-800 leading-none">{parseInt(d)}/{parseInt(m)}</div>
                                    </th>
                                  );
                                })}
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                              {inventory.filter(i => i.category === matrixCategory && isItemVisible(i)).map(item => (
                                <tr key={item.id} className="hover:bg-blue-50/30 transition-colors">
                                  <td className="p-2 sticky left-0 bg-white border-r border-gray-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] z-10 font-bold text-gray-800 text-[11px] truncate max-w-[150px]">
                                    {getItemName(item)} <span className="text-[9px] font-normal text-gray-400 block -mt-0.5">({item.unit})</span>
                                  </td>
                                  {visibleDates.map((dateStr, i) => {
                                      let foundItem = null;
                                      const dayReceipts = receipts.filter(r => r.date === dateStr);
                                      for(let r of dayReceipts) {
                                        const ri = r.items.find(x => x.item.id === item.id);
                                        if(ri) { foundItem = ri; break; }
                                      }
                                      if(foundItem) {
                                        const diff = foundItem.price - foundItem.oldPrice;
                                        return (
                                          <td key={i} className="p-1 text-center border-r border-gray-100 align-middle bg-blue-50/10">
                                            <div className="font-bold text-gray-900 leading-tight">{formatNumber(foundItem.price)}</div>
                                            {foundItem.oldPrice > 0 && diff !== 0 && (
                                              <div className={`text-[9px] font-bold leading-tight mt-0.5 ${diff > 0 ? 'text-red-500' : 'text-green-600'}`}>
                                                {diff > 0 ? '▲' : '▼'}{formatNumber(Math.abs(diff))}
                                              </div>
                                            )}
                                            {foundItem.oldPrice === 0 && <div className="text-[8px] text-gray-400 mt-0.5">เริ่มแรก</div>}

                                        return <td key={i} className="p-1 text-center border-r border-gray-50 align-middle text-gray-300">-</td>;

                            </tbody>
                          </table>
                        </div>
                      </div>

                        </div>
                        {categoryOrder.map(cat => {
                          const catItems = inventory.filter(i => i.category === cat && i.name.toLowerCase().includes(priceSearch.toLowerCase()) && isItemVisible(i));
                          if (catItems.length === 0) return null;
                          return (
                            <div key={cat} className="mb-2">
                              <h3 className="font-bold text-sm bg-gray-800 text-white px-3 py-1.5 rounded-t-lg flex items-center">
                                <span className="w-1.5 h-1.5 bg-blue-400 rounded-full mr-2"></span>{cat}
                              </h3>
                              <div className="border border-gray-200 border-t-0 rounded-b-lg bg-gray-50/30 p-2 space-y-2">
                                {catItems.map(item => {
                                  const itemHistory = [];
                                  receipts.forEach(receipt => {
                                    const found = receipt.items.find(ri => ri.item.id === item.id);
                                    if (found) itemHistory.push({ date: receipt.date, vendor: receipt.vendor, price: found.price, oldPrice: found.oldPrice });
                                  });
                                  const isExpanded = expandedPriceItem === item.id;
                                  return (
                                    <div key={item.id} className="border border-gray-200 rounded-lg overflow-hidden shadow-sm bg-white">
                                      <div onClick={() => setExpandedPriceItem(isExpanded ? null : item.id)} className={`px-3 py-2.5 flex justify-between items-center cursor-pointer hover:bg-blue-50 transition-colors ${isExpanded ? 'bg-blue-50 border-l-[3px] border-l-blue-500' : 'bg-white border-l-[3px] border-l-transparent'}`}>
                                        <div className="font-bold text-sm text-gray-800 flex items-center gap-2">
                                          {getItemName(item)}
                                          {itemHistory.length > 0 && <span className="text-[10px] font-bold bg-blue-100 text-blue-800 px-1.5 py-0.5 rounded">มี {itemHistory.length} บิล</span>}
                                        </div>
                                        <div className="flex items-center gap-4">
                                          <div className="text-right">
                                            <div className="text-[10px] text-gray-500 font-medium">ราคาล่าสุด</div>
                                            <div className="font-bold text-gray-900 text-sm">{formatNumber(item.lastPrice)} <span className="text-[10px] font-normal text-gray-500">บ.</span></div>
                                          </div>
                                          <span className="text-gray-400 text-[12px]">{isExpanded ? '▲' : '▼'}</span>
                                        </div>
                                      </div>
                                      {isExpanded && (
                                        <div className="bg-gray-50 p-2 border-t border-gray-200">
                                          {itemHistory.length > 0 ? (
                                            <table className="w-full text-left text-[11px]">
                                              <thead className="bg-gray-200 text-gray-700 font-bold">
                                                <tr>
                                                  <th className="p-2 border-b border-gray-300">วันที่รับของ</th>
                                                  <th className="p-2 border-b border-gray-300">ร้านค้า</th>
                                                  <th className="p-2 border-b border-gray-300 text-right">ราคา/หน่วย</th>
                                                  <th className="p-2 border-b border-gray-300 text-right">ส่วนต่าง</th>
                                                </tr>
                                              </thead>
                                              <tbody className="divide-y divide-gray-100">
                                                {itemHistory.map((h, idx) => {
                                                  const diff = h.price - h.oldPrice;
                                                  return (
                                                    <tr key={idx} className="bg-white hover:bg-gray-50">
                                                      <td className="p-2 font-medium text-gray-800">{h.date}</td>
                                                      <td className="p-2 text-gray-600">{h.vendor}</td>
                                                      <td className="p-2 text-right font-bold text-gray-900">{formatNumber(h.price)}</td>
                                                      <td className={`p-2 text-right font-bold ${diff > 0 ? 'text-red-600' : (diff < 0 ? 'text-green-600' : 'text-gray-400')}`}>
                                                        {h.oldPrice > 0 ? (diff === 0 ? '-' : (diff > 0 ? `+${formatNumber(diff)}` : formatNumber(diff))) : 'เริ่มแรก'}
                                                      </td>
                                                    </tr>
                                                  )
                                                })}
                                              </tbody>
                                            </table>
                                          ) : (
                                            <div className="text-center py-4 text-gray-400 text-xs font-medium bg-white rounded border border-gray-100">ยังไม่มีประวัติการรับของในระบบ</div>
                                          )}
                                        </div>
                                      )}
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                )}

                {/* --- 📦 ประวัติจำนวนสต๊อก (Matrix) --- */}
                {historyMode === 'stockQty' && auth.role !== 'staff' && (
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 animate-in fade-in">
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="font-bold text-gray-800 text-base flex items-center">
                        <span className="text-lg mr-2">📦</span> ประวัติจำนวนสต๊อกคงเหลือ
                      </h2>
                    </div>
                    
                    <div className="space-y-3">
                      <div className="flex overflow-x-auto hide-scrollbar gap-2 pb-1 border-b border-gray-100">
                        {categoryOrder.map(cat => (
                          <button key={cat} onClick={() => setStockMatrixCategory(cat)} className={`shrink-0 px-3 py-1.5 rounded-full text-[11px] sm:text-xs font-bold border transition-colors ${stockMatrixCategory === cat ? 'bg-gray-800 text-white border-gray-800' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50 shadow-sm'}`}>
                            {cat}
                          </button>
                        ))}
                      </div>

                        <div className="flex gap-1">
                          <button onClick={() => shiftStockMatrix(10)} disabled={stockMatrixOffset >= maxStockMatrixOffset} className="px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-xs font-bold text-gray-600 hover:bg-gray-100 shadow-sm active:scale-95 disabled:opacity-50" title="ย้อนกลับ 10 รายการ">&lt;&lt;</button>
                          <button onClick={() => shiftStockMatrix(1)} disabled={stockMatrixOffset >= maxStockMatrixOffset} className="px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-xs font-bold text-gray-600 hover:bg-gray-100 shadow-sm active:scale-95 disabled:opacity-50" title="ย้อนกลับ 1 รายการ">&lt;</button>

                        <div className="text-[11px] sm:text-xs font-bold text-gray-800">

                          <button onClick={() => shiftStockMatrix(-1)} disabled={stockMatrixOffset <= 0} className="px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-xs font-bold text-gray-600 hover:bg-gray-100 shadow-sm active:scale-95 disabled:opacity-50" title="เดินหน้า 1 รายการ">&gt;</button>
                          <button onClick={() => shiftStockMatrix(-10)} disabled={stockMatrixOffset <= 0} className="px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-xs font-bold text-gray-600 hover:bg-gray-100 shadow-sm active:scale-95 disabled:opacity-50" title="เดินหน้า 10 รายการ">&gt;&gt;</button>
                        </div>
                      </div>

                            <tr>
                              <th className="p-2 sticky left-0 bg-gray-100 border-r border-gray-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] z-10 min-w-[120px]">รายการ <span className="text-[9px] font-normal">(หน่วย)</span></th>

                                const [d, m] = dateStr.split('/');
                                return (
                                  <th key={i} className="py-2 px-1 text-center border-r border-gray-200 min-w-[55px]">
                                    <div className="text-[10px] font-bold text-gray-800 leading-none">{parseInt(d)}/{parseInt(m)}</div>
                                  </th>
                                );
                              })}
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-200">
                            {inventory.filter(i => i.category === stockMatrixCategory && isItemVisible(i)).map(item => (
                              <tr key={item.id} className="hover:bg-blue-50/30 transition-colors">
                                <td className="p-2 sticky left-0 bg-white border-r border-gray-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] z-10 font-bold text-gray-800 text-[11px] truncate max-w-[150px]">
                                  {getItemName(item)} <span className="text-[9px] font-normal text-gray-400">({item.unit})</span>
                                </td>
                                {visibleStockDates.map((dateStr, i) => {
                                    const dayRecord = dailyHistory.find(h => (h.endDate || h.date) === dateStr && h.type === 'checked');
                                    let foundDetail = null;
                                    if(dayRecord) {
                                      foundDetail = dayRecord.details.find(d => d.id === item.id);
                                    }

                                    if(foundDetail) {
                                      return (
                                        <td key={i} className="p-1 text-center border-r border-gray-100 align-middle">
                                          <div className="font-bold text-blue-700">{formatNumber(foundDetail.close)}</div>
                                        </td>
                                      );
                                    } else {
                                      return <td key={i} className="p-1 text-center border-r border-gray-50 align-middle text-gray-300">-</td>;
                                    }
                                })}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}

                {/* --- 💰 ประวัติมูลค่าสต๊อก (Matrix FIFO Value) --- */}
                {historyMode === 'stockValue' && auth.role !== 'staff' && (
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 animate-in fade-in">
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="font-bold text-gray-800 text-base flex items-center">
                        <span className="text-lg mr-2">💰</span> มูลค่าสต๊อกคงเหลือ (บาท)
                      </h2>
                    </div>
                    
                    <div className="space-y-3">
                      <div className="flex overflow-x-auto hide-scrollbar gap-2 pb-1 border-b border-gray-100">
                        {categoryOrder.map(cat => (
                          <button key={cat} onClick={() => setStockMatrixCategory(cat)} className={`shrink-0 px-3 py-1.5 rounded-full text-[11px] sm:text-xs font-bold border transition-colors ${stockMatrixCategory === cat ? 'bg-gray-800 text-white border-gray-800' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50 shadow-sm'}`}>
                            {cat}
                          </button>
                        ))}
                      </div>

                      <div className="flex justify-between items-center bg-gray-50 p-2 rounded-lg border border-gray-200">
                        <div className="flex gap-1">
                          <button onClick={() => shiftStockMatrix(10)} disabled={stockMatrixOffset >= maxStockMatrixOffset} className="px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-xs font-bold text-gray-600 hover:bg-gray-100 shadow-sm active:scale-95 disabled:opacity-50" title="ย้อนกลับ 10 รายการ">&lt;&lt;</button>
                          <button onClick={() => shiftStockMatrix(1)} disabled={stockMatrixOffset >= maxStockMatrixOffset} className="px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-xs font-bold text-gray-600 hover:bg-gray-100 shadow-sm active:scale-95 disabled:opacity-50" title="ย้อนกลับ 1 รายการ">&lt;</button>
                        </div>
                        <div className="text-[11px] sm:text-xs font-bold text-gray-800">
                          {visibleStockDates.length > 0 ? `${visibleStockDates[0]} - ${visibleStockDates[visibleStockDates.length - 1]}` : 'ไม่มีประวัติ'}
                        </div>
                        <div className="flex gap-1">
                          <button onClick={() => shiftStockMatrix(-1)} disabled={stockMatrixOffset <= 0} className="px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-xs font-bold text-gray-600 hover:bg-gray-100 shadow-sm active:scale-95 disabled:opacity-50" title="เดินหน้า 1 รายการ">&gt;</button>
                          <button onClick={() => shiftStockMatrix(-10)} disabled={stockMatrixOffset <= 0} className="px-2 sm:px-3 py-1 bg-white border border-gray-300 rounded text-xs font-bold text-gray-600 hover:bg-gray-100 shadow-sm active:scale-95 disabled:opacity-50" title="เดินหน้า 10 รายการ">&gt;&gt;</button>
                        </div>
                      </div>

                      <div className="overflow-x-auto border border-gray-300 rounded-lg shadow-sm">
                        <table className="w-full text-left text-[11px] whitespace-nowrap bg-white min-w-max border-collapse">
                          <thead className="bg-green-50 text-green-800 border-b border-green-200">
                            <tr>
                              <th className="p-2 sticky left-0 bg-green-50 border-r border-green-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] z-10 min-w-[120px]">รายการ <span className="text-[9px] font-normal">(มูลค่า)</span></th>
                              {visibleStockDates.map((dateStr, i) => {
                                const [d, m] = dateStr.split('/');
                                return (
                                  <th key={i} className="py-2 px-1 text-center border-r border-green-200 min-w-[55px]">
                                    <div className="text-[10px] font-bold leading-none">{parseInt(d)}/{parseInt(m)}</div>
                                  </th>
                                );
                              })}
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-200">
                            {inventory.filter(i => i.category === stockMatrixCategory && isItemVisible(i)).map(item => (
                              <tr key={item.id} className="hover:bg-green-50/30 transition-colors">
                                <td className="p-2 sticky left-0 bg-white border-r border-gray-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] z-10 font-bold text-gray-800 text-[11px] truncate max-w-[150px]">
                                  {getItemName(item)}
                                </td>
                                {visibleStockDates.map((dateStr, i) => {
                                    const dayRecord = dailyHistory.find(h => (h.endDate || h.date) === dateStr && h.type === 'checked');
                                    let foundDetail = null;
                                    if(dayRecord) {
                                      foundDetail = dayRecord.details.find(d => d.id === item.id);
                                    }

                                    if(foundDetail) {
                                      const stockValue = foundDetail.close * foundDetail.costPerUnit;
                                      return (
                                        <td key={i} className="p-1 text-center border-r border-gray-100 align-middle bg-green-50/10">
                                          <div className="font-bold text-green-700">{formatMoney(stockValue)}</div>
                                        </td>
                                      );
                                    } else {
                                      return <td key={i} className="p-1 text-center border-r border-gray-50 align-middle text-gray-300">-</td>;
                                    }
                                })}
                              </tr>
                            ))}
                            {/* Summary Row for the Category */}
                            <tr className="bg-gray-100 font-bold border-t-2 border-gray-300">
                              <td className="p-2 sticky left-0 bg-gray-100 border-r border-gray-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] z-10 text-right text-[11px]">
                                รวมมูลค่า ({stockMatrixCategory}):
                              </td>
                              {visibleStockDates.map((dateStr, i) => {
                                  const dayRecord = dailyHistory.find(h => (h.endDate || h.date) === dateStr && h.type === 'checked');
                                  let totalValue = 0;
                                  if(dayRecord) {
                                    dayRecord.details.forEach(d => {
                                      if(d.category === stockMatrixCategory) {
                                        totalValue += (d.close * d.costPerUnit);
                                      }
                                    });
                                    return <td key={i} className="p-1 text-center border-r border-gray-200 text-gray-800">{formatMoney(totalValue)}</td>;
                                  }
                                  return <td key={i} className="p-1 text-center border-r border-gray-200 text-gray-400">-</td>;
                              })}
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}

              </div>
            )}

          </div>

          {/* ================= MODALS ================= */}
          
          {/* Modal แจ้งของเสีย (มีแนบรูป) */}
          {showWasteModal && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-gray-900/70 backdrop-blur-sm animate-in fade-in">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden animate-in zoom-in-95 duration-200">
                <div className="bg-red-600 p-3 flex justify-between items-center">
                  <h3 className="font-bold text-white text-sm">แจ้งของเสีย: {inventory.find(i=>i.id===showWasteModal)?.name}</h3>
                  <button onClick={() => setShowWasteModal(null)} className="text-white font-bold">&times;</button>
                </div>
                <div className="p-4 space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-gray-700 mb-1">ปริมาณที่เสีย <span className="text-red-500">*</span></label>
                    <div className="flex items-center">
                      <input type="number" id="wasteQty" defaultValue={dailyCounts[showWasteModal]?.waste || ''} className="w-full p-2 border-2 border-gray-200 rounded-lg font-bold text-red-600 outline-none focus:border-red-500 text-lg text-center" placeholder="0" />
                      <span className="ml-2 text-xs font-bold text-gray-500 w-8">{inventory.find(i=>i.id===showWasteModal)?.unit}</span>
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-700 mb-1">สาเหตุ (หมายเหตุ)</label>
                    <input type="text" id="wasteReason" defaultValue={dailyCounts[showWasteModal]?.reason || ''} className="w-full p-2 border border-gray-300 rounded-lg text-sm outline-none focus:border-red-500 bg-gray-50" placeholder="เช่น เน่า, ตกพื้น" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-700 mb-1 flex items-center">📸 แนบรูปภาพ (ถ้ามี)</label>
                    <input type="file" id="wastePhoto" accept="image/*" capture="environment" className="w-full text-[10px] text-gray-500 file:mr-2 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-[10px] file:font-bold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200" />
                  </div>
                </div>
                <div className="p-3 border-t bg-gray-50 flex space-x-2">
                  <button onClick={() => setShowWasteModal(null)} className="flex-1 py-2.5 bg-gray-200 text-gray-700 font-bold rounded-lg text-sm">ยกเลิก</button>
                  <button onClick={saveWasteModal} className="flex-1 py-2.5 bg-red-600 text-white font-bold rounded-lg text-sm shadow-sm active:scale-95">บันทึกของเสีย</button>
                </div>
              </div>
            </div>
          )}

          {/* Modal ดูรายละเอียดของเสียในหน้าประวัติ */}
          {wasteDetailModal && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-gray-900/80 backdrop-blur-sm animate-in fade-in" onClick={() => setWasteDetailModal(null)}>
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-xs overflow-hidden animate-in zoom-in-95" onClick={e=>e.stopPropagation()}>
                <div className="bg-red-50 p-4 border-b border-red-100 text-center relative">
                  <div className="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center text-xl mx-auto mb-2">🗑️</div>
                  <h3 className="font-bold text-gray-800 text-base">{wasteDetailModal.name}</h3>
                  <button onClick={() => setWasteDetailModal(null)} className="absolute top-3 right-3 text-gray-400 hover:text-gray-600">&times;</button>
                </div>
                <div className="p-5 text-center">
                  <p className="text-xs text-gray-500 mb-1">ยอดเสียไปเมื่อสิ้นวัน</p>
                  <p className="text-3xl font-black text-red-600 mb-1">{wasteDetailModal.waste} <span className="text-sm font-bold text-gray-400">{wasteDetailModal.unit}</span></p>
                  <p className="text-xs font-bold text-red-800 bg-red-100 py-1 px-3 rounded-full inline-block mb-4">มูลค่า {(wasteDetailModal.waste * wasteDetailModal.costPerUnit).toFixed(0)} บาท</p>
                  
                  <div className="text-left bg-gray-50 p-3 rounded-lg border border-gray-200">
                    <p className="text-[10px] font-bold text-gray-500 mb-1">สาเหตุ / หมายเหตุ:</p>
                    <p className="text-sm font-medium text-gray-800">{wasteDetailModal.wasteReason || '-'}</p>
                  </div>

                  {wasteDetailModal.wastePhoto && (
                    <div className="mt-4 text-left">
                      <p className="text-[10px] font-bold text-gray-500 mb-1">รูปภาพแนบ:</p>
                      <div className="w-full h-32 bg-gray-200 rounded-lg border border-gray-300 flex items-center justify-center overflow-hidden">
                        <span className="text-4xl text-gray-400">📸</span>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* ITEM MODAL (เพิ่ม/แก้ไข) - ปรับเป็นเต็มจอแบบมีขอบมน (Full-Screen Modal) */}
          {itemModal.isOpen && itemModal.data && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-2 sm:p-4 bg-gray-900/80 backdrop-blur-sm animate-in fade-in">
              <div className="bg-white rounded-2xl shadow-2xl w-full h-auto max-h-[92vh] sm:max-h-[85vh] max-w-2xl flex flex-col overflow-hidden border border-gray-200 animate-in zoom-in-95">
                <div className="bg-blue-600 p-4 flex justify-between items-center shrink-0">
                  <h3 className="font-bold text-white text-lg">✨ รายละเอียดวัตถุดิบและระบบยกมา</h3>
                  <button onClick={() => setItemModal({ isOpen: false, mode: 'add', sourceTab: 'manage', data: null })} className="text-white font-bold text-xl">&times;</button>
                </div>
                
                <div className="p-4 sm:p-6 space-y-4 overflow-y-auto smooth-scroll flex-1 bg-gray-50">
                  
                  {/* สำหรับเพิ่มที่หน้า จัดการข้อมูลสต๊อกแรกเริ่ม/ยอดยกมา เท่านั้น */}
                  {itemModal.sourceTab === 'settings' && (
                    <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 space-y-4 shadow-sm">
                      <h4 className="font-bold text-amber-900 text-xs">📦 บันทึกยอดสต๊อกคลังแรกเริ่ม (เลือกบันทึกรูปแบบใดรูปแบบหนึ่ง)</h4>
                      
                      <div className="grid grid-cols-2 gap-4">
                        <div className={`p-3 rounded-lg border bg-white ${itemModal.data.initialStockType === 'base' ? 'border-blue-500 ring-2 ring-blue-100' : 'border-gray-200 opacity-50'}`}>
                          <label className="flex items-center gap-2 font-bold text-xs text-gray-700 cursor-pointer">
                            <input type="radio" checked={itemModal.data.initialStockType === 'base'} onChange={()=>setItemModal({...itemModal, data: {...itemModal.data, initialStockType: 'base', initialStockPrice: ''}})} />
                            บันทึกตาม "หน่วยนับสต๊อก"
                          </label>
                          <div className="mt-2 space-y-2">
                            <input type="number" placeholder="จำนวนหน่วยนับ" disabled={itemModal.data.initialStockType !== 'base'} value={itemModal.data.initialStockType === 'base' ? itemModal.data.initialStock : ''} onChange={(e)=>setItemModal({...itemModal, data: {...itemModal.data, initialStock: e.target.value}})} className="w-full p-2 border rounded text-xs outline-none focus:border-blue-500" />
                            <input type="number" placeholder="ราคาต่อหน่วยนับ (บาท)" disabled={itemModal.data.initialStockType !== 'base'} value={itemModal.data.initialStockType === 'base' ? itemModal.data.initialStockPrice : ''} onChange={(e)=>setItemModal({...itemModal, data: {...itemModal.data, initialStockPrice: e.target.value}})} className="w-full p-2 border rounded text-xs outline-none focus:border-blue-500" />
                          </div>
                        </div>

                        <div className={`p-3 rounded-lg border bg-white ${itemModal.data.initialStockType === 'purchase' ? 'border-blue-500 ring-2 ring-blue-100' : 'border-gray-200 opacity-50'}`}>
                          <label className="flex items-center gap-2 font-bold text-xs text-gray-700 cursor-pointer">
                            <input type="radio" checked={itemModal.data.initialStockType === 'purchase'} onChange={()=>setItemModal({...itemModal, data: {...itemModal.data, initialStockType: 'purchase', initialStockPrice: ''}})} />
                            บันทึกตาม "หน่วยซื้อเข้า"
                          </label>
                          <div className="mt-2 space-y-2">
                            <input type="number" placeholder="จำนวนหน่วยซื้อ" disabled={itemModal.data.initialStockType !== 'purchase'} value={itemModal.data.initialStockType === 'purchase' ? itemModal.data.initialStock : ''} onChange={(e)=>setItemModal({...itemModal, data: {...itemModal.data, initialStock: e.target.value}})} className="w-full p-2 border rounded text-xs outline-none focus:border-blue-500" />
                            <input type="number" placeholder="ราคาต่อหน่วยซื้อ (บาท)" disabled={itemModal.data.initialStockType !== 'purchase'} value={itemModal.data.initialStockType === 'purchase' ? itemModal.data.initialStockPrice : ''} onChange={(e)=>setItemModal({...itemModal, data: {...itemModal.data, initialStockPrice: e.target.value}})} className="w-full p-2 border rounded text-xs outline-none focus:border-blue-500" />
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* ข้อมูลพื้นฐานวัตถุดิบ */}
                  <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm space-y-4">
                    <div>
                      <label className="block text-xs font-bold text-gray-700 mb-1">ชื่อวัตถุดิบ *</label>
                      <input type="text" value={itemModal.data.name || ''} onChange={(e) => setItemModal({...itemModal, data: {...itemModal.data, name: e.target.value}})} className="w-full p-3 border rounded-xl text-sm font-bold bg-gray-50 focus:bg-white focus:border-blue-500 outline-none transition-all" placeholder="เช่น อกไก่, น้ำปลา" />
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">หมวดหมู่ (พิมพ์เพิ่มสดได้เลย) *</label>
                        <input type="text" list="categories-list" value={itemModal.data.category || ''} onChange={(e) => setItemModal({...itemModal, data: {...itemModal.data, category: e.target.value}})} className="w-full p-3 border rounded-xl text-sm font-bold bg-white focus:border-blue-500 outline-none" placeholder="เลือกหรือพิมพ์ใหม่..." />
                        <datalist id="categories-list">
                          {categoryOrder.map(c => <option key={c} value={c} />)}
                        </datalist>
                      </div>
                      
                      {itemModal.sourceTab !== 'manage' && (
                        <div>
                          <label className="block text-xs font-bold text-gray-700 mb-1">ร้านประจำแรกเริ่ม</label>
                          <input type="text" list="vendors-list-modal" value={itemModal.data.vendor || ''} onChange={(e) => setItemModal({...itemModal, data: {...itemModal.data, vendor: e.target.value}})} className="w-full p-3 border rounded-xl text-sm bg-white outline-none" placeholder="เลือกหรือพิมพ์ใหม่..." />
                          <datalist id="vendors-list-modal">
                            {vendors.map(v => <option key={v} value={v} />)}
                          </datalist>
                        </div>
                      )}
                    </div>

                    <div className="grid grid-cols-3 gap-3">
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">หน่วยนับสต๊อก *</label>
                        <input type="text" value={itemModal.data.unit || ''} onChange={(e) => setItemModal({...itemModal, data: {...itemModal.data, unit: e.target.value}})} className="w-full p-2.5 border rounded-xl text-xs" placeholder="เช่น กก., ขวด" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">หน่วยสั่งซื้อ</label>
                        <input type="text" value={itemModal.data.purchaseUnit || ''} onChange={(e) => setItemModal({...itemModal, data: {...itemModal.data, purchaseUnit: e.target.value}})} className="w-full p-2.5 border rounded-xl text-xs" placeholder="เช่น ลัง, ถุง" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">อัตราแปลงหน่วย</label>
                        <input type="number" value={itemModal.data.conversionRate || ''} onChange={(e) => setItemModal({...itemModal, data: {...itemModal.data, conversionRate: e.target.value}})} className="w-full p-2.5 border rounded-xl text-xs font-bold text-center" placeholder="1" />
                      </div>
                    </div>
                  </div>

                  {/* สวิตช์ปิดใช้งานย้ายมาอยู่ที่นี่ เฉพาะเวลาแก้ไขจากหน้า จัดการวัตถุดิบ เท่านั้น */}
                  {itemModal.sourceTab === 'manage' && itemModal.mode === 'edit' && (
                    <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex justify-between items-center">
                      <div>
                        <span className="font-bold text-sm text-gray-800">สถานะการใช้งานรายการวัตถุดิบ</span>
                        <p className="text-[10px] text-gray-500">ปิดหากเลิกใช้วัตถุดิบนี้ในระบบครัว</p>
                      </div>
                      <div className="flex items-center gap-4">
                        {itemModal.data.isActive === false && (
                          <label className="flex items-center gap-1.5 text-xs text-orange-700 font-bold bg-orange-50 px-2 py-1 rounded border">
                            <input type="checkbox" checked={itemModal.data.showWhenInactive || false} onChange={(e)=>setItemModal({...itemModal, data: {...itemModal.data, showWhenInactive: e.target.checked}})} />
                            ยังแสดงพร้อมคำว่า (ไม่ใช้แล้ว)
                          </label>
                        )}
                        <button onClick={() => setItemModal({...itemModal, data: {...itemModal.data, isActive: !itemModal.data.isActive}})} className={`px-4 py-1.5 rounded-lg text-xs font-bold text-white shadow-sm ${itemModal.data.isActive !== false ? 'bg-green-600' : 'bg-gray-400'}`}>
                          {itemModal.data.isActive !== false ? 'เปิดใช้งานอยู่' : 'ปิดใช้งานแล้ว'}
                        </button>
                      </div>
                    </div>
                  )}

                </div>
                
                <div className="p-4 border-t bg-white shrink-0 shadow-[0_-4px_6px_-1px_rgb(0,0,0,0.05)]">
                  <button onClick={saveItemModal} className="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md transition-transform active:scale-95">✅ ลงบันทึกรายการวัตถุดิบ</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const renderApp = () => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    };

    if (window.isFirebaseLoaded) {
      renderApp();
    } else {
      window.addEventListener('firebase-loaded', renderApp);
    }
  </script>
</body>
</html>
