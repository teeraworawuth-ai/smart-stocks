                              <div className="flex-1 flex justify-between text-right gap-1 sm:gap-2 overflow-hidden">
                                <div className="flex-1 min-w-[40px]"><div className="text-[9px] text-gray-500 font-bold truncate">ยอดขาย</div><div className="text-[11px] sm:text-xs font-bold text-gray-800">{formatMoney(item.sales)}</div></div>
                                <div className="flex-1 min-w-[40px] border-l border-gray-200 pl-1 sm:pl-2"><div className="text-[9px] text-gray-500 font-bold truncate">ทุนขาย <span className={`font-bold ${costPct <= 40 ? 'text-green-600' : 'text-red-500'}`}>({costPct}%)</span></div><div className="text-[11px] sm:text-xs font-bold text-red-600">{formatMoney(item.cost)}</div></div>
                                <div className="flex-1 min-w-[40px] border-l border-gray-200 pl-1 sm:pl-2"><div className="text-[9px] text-gray-500 font-bold truncate">กำไรขั้นต้น <span className="font-bold text-blue-600">({gpPct}%)</span></div><div className="text-[11px] sm:text-xs font-bold text-blue-600">{formatMoney(item.grossProfit)}</div></div>
                                <div className="flex-1 min-w-[40px] border-l border-gray-200 pl-1 sm:pl-2 hidden sm:block"><div className="text-[9px] text-gray-500 font-bold truncate">ทุนบริหาร <span className="font-bold text-orange-600">({adminPct}%)</span></div><div className="text-[11px] sm:text-xs font-bold text-orange-600">{formatMoney(item.dailyExp + item.overhead)}</div></div>
                                <div className={`flex-1 min-w-[40px] border-l border-gray-200 pl-1 sm:pl-2 rounded-r pr-1 ${netProfit < 0 ? 'bg-red-50/50' : 'bg-green-50/50'}`}>
                                  <div className="text-[9px] text-gray-500 font-bold truncate">{netProfit < 0 ? 'ขาดทุนสุทธิ' : 'กำไรสุทธิ'} <span className={`font-bold ${netProfit < 0 ? 'text-red-700' : 'text-green-700'}`}>({netPercent}%)</span></div>
                                  <div className={`text-[11px] sm:text-xs font-black ${netProfit < 0 ? 'text-red-700' : 'text-green-700'}`}>{formatMoney(netProfit)}</div>
                                </div>
                              </div>
                            </div>
                            
                            {isExpanded && (
                              <div className="bg-gray-50 p-3 sm:p-4 border-t border-b border-gray-200 text-xs shadow-inner animate-in slide-in-from-top-2">
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                  <div className="bg-white p-3 rounded-xl border border-gray-200 shadow-sm">
                                    <div className="flex justify-between font-bold border-b-2 border-gray-800 pb-2 mb-2 text-sm text-gray-800"><span>ยอดขายสุทธิ</span><span>{formatMoney(item.sales)} <span className="text-[10px] text-gray-500 font-normal">฿ (100%)</span></span></div>
                                    <div className="space-y-1.5 mb-2">
                                      <div className="flex justify-between text-gray-600 font-medium"><span>- ต้นทุนวัตถุดิบใช้ไป</span><span>{formatMoney(item.costUsed)} <span className="text-[9px] text-gray-400">({item.sales > 0 ? ((item.costUsed/item.sales)*100).toFixed(1) : 0}%)</span></span></div>
                                      <div className="flex justify-between text-red-500 font-medium border-b border-gray-100 pb-2"><span>- ต้นทุนของเสียทิ้ง</span><span>{formatMoney(item.costWaste)} <span className="text-[9px] text-red-300">({item.sales > 0 ? ((item.costWaste/item.sales)*100).toFixed(1) : 0}%)</span></span></div>
                                    </div>
                                    <div className="flex justify-between font-bold text-blue-700 bg-blue-50 p-2 rounded-lg border border-blue-100"><span>กำไรขั้นต้น (Gross)</span><span>{formatMoney(item.grossProfit)} <span className="text-[10px] text-blue-500 font-normal">({gpPct}%)</span></span></div>
                                  </div>

                                  <div className="bg-white p-3 rounded-xl border border-gray-200 shadow-sm">
                                    <div className="font-bold border-b-2 border-gray-800 pb-2 mb-2 text-gray-800 text-sm">หักค่าใช้จ่ายดำเนินการ (OPEX)</div>
                                    <div className="space-y-3">
                                      <div>
                                        <div className="flex justify-between text-orange-700 font-bold mb-1 border-b border-gray-100 pb-1"><span title="ค่าเช่า, เงินเดือน ฯลฯ หารเฉลี่ยตามวัน">รายเดือนเฉลี่ย {item.isEstimate ? '(ประเมิน)' : ''}</span><span>{formatMoney(item.overhead)} <span className="text-[9px] text-orange-400 font-normal">({item.sales > 0 ? ((item.overhead/item.sales)*100).toFixed(1) : 0}%)</span></span></div>
                                        <ul className="text-xs text-orange-600 space-y-1 pl-1">
                                          {item.overheadList && item.overheadList.filter(o => o.amount > 0).map((o, idx) => (
                                            <li key={idx} className="flex justify-between items-center group">
                                              <span className="truncate pr-2">- {o.name}</span>
                                              <span className="font-medium shrink-0">{formatMoney(o.amount)} บ.</span>
                                            </li>
                                          ))}
                                        </ul>
                                      </div>
                                      <div>
                                        <div className="flex justify-between text-orange-700 font-bold mb-1 border-b border-gray-100 pb-1"><span>จ่ายยิบย่อยรายวัน</span><span>{formatMoney(item.dailyExp)} <span className="text-[9px] text-orange-400 font-normal">({item.sales > 0 ? ((item.dailyExp/item.sales)*100).toFixed(1) : 0}%)</span></span></div>
                                        {item.expensesList.length > 0 ? (
                                          <ul className="pl-2 pr-2 py-1.5 bg-orange-50 text-[10px] text-gray-700 rounded-lg border border-orange-100 font-medium space-y-1">
                                            {item.expensesList.map(e => (
                                              <li key={e.name} className="flex justify-between items-center">
                                                <span className="truncate pr-2">- {e.name}</span>
                                                <span className="shrink-0">{formatMoney(e.amount)} ฿</span>
                                              </li>
                                            ))}
                                          </ul>
                                        ) : <div className="text-[9px] text-gray-400 italic pl-2">- ไม่มีรายการ -</div>}
                                      </div>
                                    </div>
                                    <div className={`flex justify-between items-center p-2 rounded-lg border-2 mt-3 shadow-sm ${netProfit < 0 ? 'bg-red-100 border-red-500' : 'bg-green-100 border-green-500'}`}>
                                      <p className={`text-sm font-black ${netProfit < 0 ? 'text-red-800' : 'text-green-800'}`}>{netProfit < 0 ? 'ขาดทุนสุทธิ' : 'กำไรสุทธิ'}</p>
                                      <ProfitLabel val={netProfit} pctVal={netPercent} />
                                    </div>
                                  </div>
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      }) : (
                        <div className="p-6 text-center text-gray-400 text-sm font-bold bg-white">ยังไม่มีประวัติรอบถัดไป</div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* TAB: SETTINGS (ตั้งค่า) */}
            {activeTab === 'settings' && auth.role !== 'staff' && (
              <div className="space-y-4 animate-in fade-in">
                {auth.role === 'owner' && (
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-blue-200 flex flex-col">
                    <div className="flex justify-between items-start mb-3 border-b border-blue-100 pb-3">
                      <h2 className="font-bold text-blue-800 text-lg flex items-center"><span className="text-xl mr-2">💾</span> สถานะพื้นที่คลาวด์</h2>
                      <div className="flex gap-2">
                        {selectedBranch === 'demo' ? (
                          <button onClick={() => { if(window.confirm("รีเซ็ตข้อมูล Demo ทั้งหมดและสร้างข้อมูลจำลองใหม่ 10 วันย้อนหลัง?")) injectDemoData(); }} className="bg-orange-50 hover:bg-orange-100 text-orange-700 px-3 py-1.5 rounded-lg text-xs font-bold border border-orange-200 shadow-sm transition-colors flex items-center"><span className="mr-1">🔄</span> Reset Demo Data</button>
                        ) : (
                          <>
                            <button onClick={handleSoftReset} className="bg-orange-50 hover:bg-orange-100 text-orange-700 px-2 sm:px-3 py-1.5 rounded-lg text-[10px] sm:text-xs font-bold border border-orange-200 shadow-sm transition-colors">ล้างสต๊อก(เริ่ม0)</button>
                            <button onClick={handleHardReset} className="bg-red-50 hover:bg-red-100 text-red-700 px-2 sm:px-3 py-1.5 rounded-lg text-[10px] sm:text-xs font-bold border border-red-200 shadow-sm transition-colors">ล้างระบบใหม่</button>
                          </>
                        )}
                      </div>
                    </div>

                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 text-center">
                      <div className="bg-blue-50 p-2 rounded border border-blue-100"><p className="text-[10px] text-blue-600 font-bold">ใช้ไปแล้ว</p><p className="text-base font-black text-gray-800">{dbSizeInfo.percentUsed}%</p></div>
                      <div className="bg-blue-50 p-2 rounded border border-blue-100"><p className="text-[10px] text-blue-600 font-bold">ขนาดไฟล์</p><p className="text-base font-black text-gray-800">{dbSizeInfo.kbLength} KB</p><p className="text-[9px] text-gray-500 leading-tight">จาก 1,024 KB (1MB)</p></div>
                      <div className="bg-blue-50 p-2 rounded border border-blue-100"><p className="text-[10px] text-blue-600 font-bold">ระบบบีบอัด Pako</p><p className={`text-base font-black ${dbSizeInfo.isCompressed ? 'text-green-600' : 'text-gray-400'}`}>{dbSizeInfo.isCompressed ? 'ทำงาน' : 'ปิด'}</p></div>
                      <div className="bg-blue-50 p-2 rounded border border-blue-100"><p className="text-[10px] text-blue-600 font-bold">ประมาณใช้งานได้อีก</p><p className="text-base font-black text-green-600">{dbSizeInfo.estDaysLeft} รอบ</p></div>
                    </div>
                    {selectedBranch !== 'demo' && (
                      <div className="mt-3 text-center">
                        <p className="text-[10px] text-gray-500 mb-2 leading-tight">* หากพื้นที่ใกล้เต็ม แนะนำให้ลบประวัติเดือนเก่าๆ ทิ้ง (ไม่กระทบสต๊อกปัจจุบัน)</p>
                        <div className="flex justify-center gap-2">
                          <select id="deleteOldMonthsSelect" className="p-1.5 border border-gray-300 rounded text-[11px] outline-none">
                            <option value="">-- เลือกลบย้อนหลัง --</option><option value="1">ลบ 1 เดือนเก่าสุด</option><option value="2">ลบ 2 เดือนเก่าสุด</option><option value="3">ลบ 3 เดือนเก่าสุด</option>
                          </select>
                          <button onClick={handleDeleteOldHistory} className="bg-gray-600 hover:bg-gray-700 text-white px-3 py-1.5 rounded text-[11px] font-bold shadow-sm">🗑️ ลบประวัติเก่า</button>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                  <div className="flex justify-between items-center mb-3 border-b border-gray-100 pb-3">
                    <h2 className="font-bold text-gray-800 text-lg flex items-center"><span className="text-xl mr-2">⚙️</span> บันทึกยอดยกมาเริ่มต้น</h2>
                    <button onClick={() => openAddItem('settings')} className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow hover:bg-blue-700 transition-colors">+ เพิ่มวัตถุดิบแรกเริ่ม</button>
                  </div>
                  <p className="text-[11px] text-gray-500 mb-4 bg-yellow-50 p-2 rounded-lg border border-yellow-200 leading-relaxed">* หน้านี้ใช้สำหรับบันทึกยอดยกมาเริ่มต้น เพื่อใช้เป็นฐานในการเริ่มใช้งานระบบเท่านั้น หากต้องการจัดการสถานะ เพิ่ม/แก้ไข/ลบ วัตถุดิบ ให้ไปที่เมนู <strong>"จัดการวัตถุดิบ"</strong></p>
                  <div className="space-y-6">
                    {categoryOrder.map(cat => {
                      const catItems = inventory.filter(i => i.category === cat && isItemVisible(i));
                      if (catItems.length === 0) return null;
                      return (
                        <div key={cat} className="border border-gray-200 rounded-xl overflow-hidden bg-white shadow-sm">
                          <h3 className="bg-gray-800 text-white px-3 py-2 text-sm font-bold">{cat}</h3>
                          <div className="p-2 space-y-2 divide-y divide-gray-100">
                            {catItems.map(item => {
                              const totalValue = (Number(item.initialStock) || 0) * (Number(item.initialStockPrice) || 0);
                              const createdAtDate = item.createdAt ? new Date(item.createdAt) : new Date();
                              const daysSinceCreation = Math.floor((new Date() - createdAtDate) / (1000 * 60 * 60 * 24));
                              const isEditable = daysSinceCreation <= 15;

                              return (
                                <div key={item.id} className={`pt-2 first:pt-0 flex flex-col sm:flex-row sm:items-center justify-between text-xs gap-1 ${!isEditable ? 'opacity-70' : ''}`}>
                                  <div className="font-bold text-gray-800 text-sm flex items-center">
                                    {getItemName(item)} {item.vendor ? <span className="text-[10px] text-blue-600 font-medium ml-1">({item.vendor})</span> : ''}
                                    {!isEditable && <span className="ml-2 text-[9px] bg-gray-200 text-gray-500 px-1.5 py-0.5 rounded shadow-inner">🔒 เกิน 15 วัน</span>}
                                  </div>
                                  <div className="flex flex-wrap items-center gap-3 bg-gray-50 p-1.5 rounded border border-gray-200">
                                    <div className="flex items-center gap-1"><span>ปริมาณ:</span><input type="number" disabled={!isEditable} value={item.initialStock === '' ? '' : item.initialStock} onChange={(e) => { const val = e.target.value === '' ? '' : Number(e.target.value); setInventory(inventory.map(i => i.id === item.id ? {...i, initialStock: val, currentStock: val} : i)); }} className="w-16 p-1 border border-blue-300 rounded text-center font-bold text-sm text-blue-700 focus:border-blue-600 outline-none bg-white disabled:bg-gray-100 disabled:border-gray-200" placeholder="0" /><span className="font-bold text-blue-700">{item.initialStockType === 'base' ? item.unit : item.purchaseUnit}</span></div>
                                    <div className="flex items-center gap-1"><span>ราคา:</span><span className="font-bold text-gray-700">{item.initialStockPrice || 0}</span><span>บ.</span></div>
                                    <div className="bg-green-50 text-green-800 px-1.5 rounded border border-green-200 font-bold whitespace-nowrap">มูลค่า: {formatMoney(totalValue)} บ.</div>
                                    {isEditable && (<button onClick={() => { if (item.currentStock > 0 && item.currentStock !== item.initialStock) { alert("❌ ไม่สามารถลบได้เนื่องจากวัตถุดิบนี้มีสต๊อกปัจจุบันเคลื่อนไหวแล้ว"); } else { handleDeleteItem(item.id); } }} className="text-[10px] bg-red-50 text-red-600 border border-red-200 px-2 py-1 rounded font-bold hover:bg-red-100 transition-colors ml-auto sm:ml-0">ลบ</button>)}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )
                    })}
                    {inventory.length === 0 && <div className="text-center text-gray-400 py-10 font-bold border-2 border-dashed border-gray-200 rounded-xl">ยังไม่มีวัตถุดิบในระบบ</div>}
                  </div>
                </div>

                {auth.role === 'owner' && (
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                    <h2 className="font-bold text-gray-800 text-lg flex items-center mb-3"><span className="text-xl mr-2">🏢</span> จัดการค่าใช้จ่ายคงที่ (Overhead Costs)</h2>
                    <p className="text-[11px] text-gray-500 mb-4 leading-relaxed bg-gray-50 p-2.5 rounded-lg border border-gray-200">* ระบบจะนำยอดค่าใช้จ่ายรายเดือนไป <b>หารเฉลี่ยตามจำนวนวันในเดือนนั้นๆ</b> เพื่อหักเป็นต้นทุนแฝงรายวัน หากบิลจริงยังไม่มา สามารถใส่ "ยอดประเมิน" ไว้ก่อนได้</p>
                    <div className="space-y-4">
                      {Object.keys(monthlyOverheads).sort().reverse().map(monthKey => {
                        const items = getOverheadList(monthKey);
                        const totalEst = items.reduce((sum, it) => sum + Number(it.estimate || 0), 0);
                        const totalAct = items.reduce((sum, it) => sum + Number(it.actual !== '' && it.actual !== null ? it.actual : (it.estimate || 0)), 0);
                        return (
                          <div key={monthKey} className="flex flex-col p-3 bg-white border border-gray-200 rounded-lg shadow-sm hover:border-blue-300 transition-colors">
                            <div className="flex justify-between items-center mb-2 border-b pb-2"><div className="font-bold text-sm bg-gray-800 text-white px-3 py-1 rounded-lg text-center shadow-sm tracking-wide">{monthKey}</div><button onClick={() => handleAddOverheadItem(monthKey)} className="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold hover:bg-blue-200">+ เพิ่มรายการ</button></div>
                            <div className="space-y-2 mb-2">
                              {items.length === 0 && <div className="text-center text-[10px] text-gray-400 py-2">ยังไม่มีรายการค่าใช้จ่าย</div>}
                              {items.map(item => (
                                <div key={item.id} className="flex flex-col sm:flex-row gap-2 sm:items-center bg-gray-50 p-2 rounded border border-gray-200">
                                   <div className="flex-1 font-bold text-xs text-gray-700">{item.name}</div>
                                   <div className="flex flex-wrap gap-2 w-full sm:w-auto">
                                     <div className="flex-1 min-w-[70px] sm:w-20"><label className="text-[8px] text-gray-500 block">ประเมิน</label><input type="number" value={item.estimate} onChange={(e) => handleUpdateOverheadItem(monthKey, item.id, 'estimate', e.target.value)} className="w-full p-1.5 text-xs border rounded bg-yellow-50 outline-none focus:border-yellow-500" /></div>
                                     <div className="flex-1 min-w-[70px] sm:w-20"><label className="text-[8px] text-blue-600 block">จ่ายจริง</label><input type="number" placeholder="รอรอบบิล" value={item.actual === null ? '' : item.actual} onChange={(e) => handleUpdateOverheadItem(monthKey, item.id, 'actual', e.target.value)} className="w-full p-1.5 text-xs border rounded bg-blue-50 outline-none focus:border-blue-500" /></div>
                                     <div className="flex-1 min-w-[70px] sm:w-20"><label className="text-[8px] text-gray-600 block">วิธีชำระ</label><select value={item.payMethod || 'ค้างชำระ'} onChange={(e) => handleUpdateOverheadItem(monthKey, item.id, 'payMethod', e.target.value)} className="w-full p-1.5 text-xs border rounded bg-gray-50 outline-none"><option>ค้างชำระ</option><option>เงินสด</option><option>โอนเงิน</option></select></div>
                                     <div className="flex-1 min-w-[90px] sm:w-28"><label className="text-[8px] text-gray-600 block">วันที่ชำระ</label><input type="date" value={item.payDate || ''} onChange={(e) => handleUpdateOverheadItem(monthKey, item.id, 'payDate', e.target.value)} className="w-full p-1.5 text-[10px] sm:text-xs border rounded bg-gray-50 outline-none" /></div>
                                     <div className="flex items-end pb-1"><button onClick={() => handleDeleteOverheadItem(monthKey, item.id)} className="text-red-400 hover:text-red-600 pl-1">❌</button></div>
                                   </div>
                                </div>

                        </div>
                      </div>
                    )}

                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                      <div className="space-y-4">
                        <div className="relative z-[50]"><label className="block text-xs font-bold text-gray-600 mb-1">1. บิลจากร้านค้า</label><SearchableDropdown items={vendors} selectedItem={selectedVendor} onSelect={setSelectedVendor} onAdd={handleAddVendor} onEdit={promptEditVendor} onDelete={handleDeleteVendor} placeholder="เลือกร้านค้า" isVendor={true} /></div>
                        <div className="relative z-[40]"><label className="block text-xs font-bold text-gray-600 mb-1">2. ค้นหาสินค้า / วัตถุดิบ</label><SearchableDropdown items={inventory.filter(isItemVisible)} selectedItem={selectedItem} onSelect={(id) => { setSelectedItem(id); setPurchasePrice(inventory.find(i=>i.id===id)?.lastPrice||''); }} onAdd={(searchName) => openAddItem('recordPurchase', searchName)} onEdit={(item) => openEditItem(item, 'recordPurchase')} onDelete={handleDeleteItem} placeholder="เลือกวัตถุดิบ" isVendor={false} /></div>

                        <div className={`transition-all duration-300 ${selectedItem ? 'opacity-100 max-h-96' : 'opacity-40 max-h-0 overflow-hidden'}`}>
                          <div className="grid grid-cols-2 gap-3 mt-4">
                            <div><label className="block text-xs font-bold text-gray-600 mb-1">3. ปริมาณที่ซื้อเข้า</label><div className="relative"><input type="number" value={purchaseQty} onChange={(e)=>setPurchaseQty(e.target.value)} placeholder="0" className="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-xl text-base font-bold outline-none focus:border-blue-500 shadow-inner" /><span className="absolute right-3 top-3 text-[10px] text-gray-500">{activePurchaseItem?.purchaseUnit || activePurchaseItem?.unit || '-'}</span></div></div>
                            <div>
                              <label className="block text-xs font-bold text-gray-600 mb-1">4. ราคาต่อหน่วย (บ.)</label>
                              <div className="relative"><input type="number" value={purchasePrice} onChange={(e)=>setPurchasePrice(e.target.value)} placeholder="0" className="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-xl text-base font-bold outline-none focus:border-blue-500 shadow-inner" /></div>
                              {activePurchaseItem && purchasePrice && (
                                (() => {
                                  const oldPrice = activePurchaseItem.lastPrice; const newPrice = Number(purchasePrice);
                                  if (!oldPrice || oldPrice === 0) return <div className="text-[10px] text-gray-500 mt-1">ราคาใหม่บันทึกครั้งแรก</div>;
                                  const diff = newPrice - oldPrice; const pctV = ((diff / oldPrice) * 100).toFixed(1);
                                  if (diff > 0) return <div className="text-[10px] font-bold mt-1 px-1.5 py-0.5 rounded inline-block bg-red-100 text-red-700 border border-red-200 shadow-sm">แพงขึ้น {diff} บ. (+{pctV}%)</div>;
                                  if (diff < 0) return <div className="text-[10px] font-bold mt-1 px-1.5 py-0.5 rounded inline-block bg-green-100 text-green-700 border border-green-200 shadow-sm">ถูกลง {Math.abs(diff)} บ. ({Math.abs(pctV)}%)</div>;
                                  return <div className="text-[10px] font-bold mt-1 px-1.5 py-0.5 rounded inline-block bg-gray-100 text-gray-500 border border-gray-200">ราคาเท่าเดิม</div>;
                                })()
                              )}
                            </div>
                          </div>
                          <button onClick={handleAddToBill} disabled={!purchaseQty || !purchasePrice} className="w-full mt-4 py-3 bg-blue-50 text-blue-700 font-bold rounded-xl border border-blue-200 disabled:opacity-50 hover:bg-blue-100 transition-colors shadow-sm text-sm">เพิ่มลงในบิล</button>
                        </div>
                      </div>
                    </div>

                    {billItems.length > 0 && (
                      <div className="bg-white p-3 rounded-xl shadow-sm border border-gray-200 animate-in slide-in-from-bottom-4">
                        <div className="flex justify-between items-center mb-3 border-b pb-2">
                          <h3 className="font-bold text-gray-800 text-sm">บิลชั่วคราว ({billItems.length})</h3>
                          <select value={paymentMethod} onChange={(e) => setPaymentMethod(e.target.value)} className={`p-1 text-xs border rounded-lg font-bold outline-none ${paymentMethod === 'ยังไม่ชำระ' ? 'bg-red-50 border-red-300 text-red-700' : 'bg-gray-50'}`}>
                            <option>เงินสด</option>
                            <option>โอนเงิน</option>
                            <option>เครดิต</option>
                            <option>ยังไม่ชำระ</option>
                          </select>
                        </div>
                        {paymentMethod === 'ยังไม่ชำระ' && (
                          <div className="mb-3 p-2 bg-red-50 border border-red-200 rounded-lg text-[10px] text-red-700 font-bold flex items-center gap-1">
                            <span>⚠️</span> บิลนี้จะถูกเก็บไว้ในระบบค้างชำระ สามารถชำระภายหลังได้ในหน้า "💳 ค้างชำระ"
                          </div>
                        )}
                        <div className="space-y-2 mb-4">
                          {billItems.map((bItem) => {
                            const diff = bItem.price - bItem.oldPrice;
                            return (
                              <div key={bItem.cartId} className="flex flex-col bg-gray-50 p-2 rounded-lg border border-gray-200">
                                <div className="flex justify-between items-start">
                                  <div className="flex-1 min-w-0 pr-2">
                                    <div className="font-bold text-xs">{getItemName(bItem.item)}</div>
                                    <div className="flex items-center gap-1.5 mt-1.5 flex-wrap">
                                      <input type="number" value={bItem.qty} onChange={(e) => setBillItems(billItems.map(i => i.cartId === bItem.cartId ? {...i, qty: Number(e.target.value), total: Number(e.target.value) * i.price} : i))} className="w-14 p-1.5 text-xs font-bold border rounded-lg outline-none text-center bg-white shadow-inner" />
                                      <span className="text-[10px] text-gray-500 shrink-0">{bItem.item.purchaseUnit || bItem.item.unit} x </span>
                                      <input type="number" value={bItem.price} onChange={(e) => setBillItems(billItems.map(i => i.cartId === bItem.cartId ? {...i, price: Number(e.target.value), total: i.qty * Number(e.target.value)} : i))} className="w-16 p-1.5 text-xs font-bold border rounded-lg outline-none text-center bg-white shadow-inner" />
                                      <span className="text-[10px] text-gray-500 shrink-0">บ.</span>
                                      {bItem.oldPrice > 0 && diff !== 0 && (<div className={`text-[9px] font-bold px-1.5 py-0.5 rounded flex items-center gap-0.5 ml-auto shadow-sm ${diff > 0 ? 'bg-red-100 text-red-600 border border-red-200' : 'bg-green-100 text-green-700 border border-green-200'}`}>{diff > 0 ? '▲ แพงขึ้น' : '▼ ถูกลง'} {((Math.abs(diff)/bItem.oldPrice)*100).toFixed(1)}%</div>)}
                                    </div>
                                  </div>
                                  <div className="flex items-center gap-2 pt-1"><div className="font-bold text-sm text-gray-800 shrink-0 w-12 text-right">{formatMoney(bItem.total)}</div><button onClick={() => setBillItems(billItems.filter(item => item.cartId !== bItem.cartId))} className="w-7 h-7 flex items-center justify-center bg-red-100 text-red-600 rounded-lg shrink-0 text-xs shadow-sm hover:bg-red-200 transition-colors">🗑️</button></div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                        <button onClick={handleSaveBill} className="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white text-base font-bold rounded-xl shadow-md active:scale-95 transition-transform">✅ บันทึกรับของเข้าสต๊อก</button>
                      </div>
                    )}
                  </>
                )}
                {receiptMode === 'history' && (
                  <div className="bg-white p-3 rounded-xl shadow-sm border border-gray-200">
                    <p className="text-[11px] text-gray-500 mb-3 bg-gray-50 p-2 rounded-lg border border-gray-200">* ประวัติรับของจะถูกจัดกลุ่มตามวันที่ สามารถกดที่วันที่เพื่อดูบิลทั้งหมด และกดพิมพ์สรุปรายวัน หรือ พิมพ์แยกบิลได้</p>
                    {Object.entries(receipts.reduce((acc, bill) => { (acc[bill.date] = acc[bill.date] || []).push(bill); return acc; }, {})).map(([date, billsOnDate]) => {
                      const isExpandedDate = expandedReceiptDate === date; const dateTotal = billsOnDate.reduce((sum, b) => sum + b.total, 0);
                      return (
                        <div key={date} className="mb-2 border border-gray-200 rounded-lg overflow-hidden">
                          <div onClick={() => setExpandedReceiptDate(isExpandedDate ? null : date)} className="bg-gray-800 text-white px-3 py-2.5 flex justify-between items-center cursor-pointer hover:bg-gray-700 transition-colors">
                            <div className="font-bold text-sm flex items-center"><span className="w-2 h-2 bg-blue-400 rounded-full mr-2"></span> {date} <span className="ml-2 text-[10px] bg-gray-600 px-1.5 rounded-full shadow-sm">{billsOnDate.length} บิล</span></div>
                            <div className="flex items-center gap-3"><span className="font-bold text-sm">{formatMoney(dateTotal)} บ.</span><span className="text-gray-400 text-[10px]">{isExpandedDate ? '▲' : '▼'}</span></div>
                          </div>

                          {isExpandedDate && (
                            <div className="bg-gray-50 p-2 border-t border-gray-300">
                              <div className="flex justify-end mb-2 gap-2">
                                <button onClick={() => triggerPrint({ type: 'dailyReceiptSummaryByBill', date: date, bills: billsOnDate })} className="text-[10px] bg-gray-600 text-white px-2 py-1 rounded font-bold shadow hover:bg-gray-700 flex items-center transition-colors">🖨️ พิมพ์สรุปรายวัน (แยกบิล)</button>
                                <button onClick={() => triggerPrint({ type: 'dailyReceiptSummary', date: date, bills: billsOnDate })} className="text-[10px] bg-blue-600 text-white px-2 py-1 rounded font-bold shadow hover:bg-blue-700 flex items-center transition-colors">🖨️ พิมพ์สรุปรายวัน (แยกหมวด)</button>
                              </div>
                              <div className="space-y-2">
                                {billsOnDate.map(bill => {
                                  const isExpandedBill = expandedBillId === bill.id;
                                  return (
                                    <div key={bill.id} className="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
                                      <div onClick={() => setExpandedBillId(isExpandedBill ? null : bill.id)} className="px-3 py-2 bg-blue-50/50 hover:bg-blue-100/50 cursor-pointer flex justify-between items-center transition-colors">
                                        <div><div className="font-bold text-xs text-gray-800">{bill.vendor}</div><div className="text-[9px] text-gray-500 mt-0.5">ชำระ: {bill.method}</div></div>
                                        <div className="flex items-center gap-3"><span className="font-bold text-blue-700 text-xs">{formatMoney(bill.total)} บ.</span></div>
                                      </div>
                                      {isExpandedBill && (
                                        <div className="p-2 border-t border-gray-100 animate-in slide-in-from-top-1">
                                          <div className="flex justify-between mb-2">
                                            <button onClick={() => openEditReceipt(bill)} className="text-[9px] bg-yellow-100 text-yellow-700 border border-yellow-300 px-3 py-1 rounded font-bold hover:bg-yellow-200 transition-colors shadow-sm">✏️ แก้ไขบิลย้อนหลัง</button>
                                            <button onClick={() => triggerPrint({ type: 'receipt', data: bill })} className="text-[9px] bg-gray-200 text-gray-700 px-3 py-1 rounded font-bold border border-gray-300 hover:bg-gray-300 transition-colors shadow-sm">🖨️ พิมพ์บิลนี้</button>
                                          </div>
                                          <table className="w-full text-left text-[10px]">
                                            <thead className="bg-gray-100 text-gray-600"><tr><th className="p-1 border-b">รายการ</th><th className="p-1 border-b text-center">จำนวน</th><th className="p-1 border-b text-center">ราคา/หน่วย</th><th className="p-1 border-b text-right">รวม</th></tr></thead>
                                            <tbody>
                                              {bill.items.map((item, idx) => {
                                                const diff = item.price - item.oldPrice;
                                                return (
                                                  <tr key={idx} className="border-b border-gray-50 border-dashed hover:bg-gray-50 transition-colors">
                                                    <td className="p-1 py-2"><div className="font-bold text-gray-800">{getItemName(item.item)}</div></td>
                                                    <td className="p-1 py-2 text-center font-bold text-gray-700">{item.qty} <span className="text-[8px] text-gray-500 font-normal">{item.item.purchaseUnit}</span></td>
                                                    <td className="p-1 py-2 text-center">
                                                      <div className="font-bold text-gray-800">{formatNumber(item.price)} <span className="text-[8px] font-normal text-gray-500">บ.</span></div>
                                                      {(item.oldPrice > 0 || item.priceNote) && (<div className={`text-[8px] leading-tight mt-0.5 whitespace-nowrap font-bold ${diff > 0 ? 'text-red-500' : 'text-green-600'}`}>{diff > 0 ? `▲ +${((diff/item.oldPrice)*100).toFixed(1)}%` : `▼ ${((Math.abs(diff)/item.oldPrice)*100).toFixed(1)}%`}</div>)}
                                                      {item.oldPrice === 0 && <div className="text-[8px] text-gray-400 mt-0.5 italic">ราคาเริ่มต้น</div>}
                                                    </td>
                                                    <td className="p-1 py-2 text-right font-bold text-blue-700">{formatMoney(item.total)}</td>
                                                  </tr>
                                                );
                                              })}
                                            </tbody>
                                          </table>
                                        </div>
                                      )}
                                    </div>
                                  )
                                })}
                              </div>
                            </div>
                          )}
                        </div>
                      )
                    })}
                  </div>
                )}

                {/* ===== AP: หน้าจัดการบิลค้างชำระ ===== */}
                {receiptMode === 'unpaid' && (() => {
                  const unpaidBills = receipts.filter(r => r.method === 'ยังไม่ชำระ');
                  const unpaidByVendor = {};
                  unpaidBills.forEach(b => {
                    if (!unpaidByVendor[b.vendor]) unpaidByVendor[b.vendor] = [];
                    unpaidByVendor[b.vendor].push(b);
                  });
                  const sortedVendors = Object.keys(unpaidByVendor).sort((a, b) =>
                    apSortMode === 'amount'
                      ? unpaidByVendor[b].reduce((s,r) => s+r.total,0) - unpaidByVendor[a].reduce((s,r) => s+r.total,0)
                      : a.localeCompare(b, 'th')
                  );
                  const totalUnpaid = unpaidBills.reduce((s,r) => s+r.total, 0);
                  const selectedIds = Object.keys(apSelectedBills).filter(id => apSelectedBills[id]);
                  const selectedTotal = selectedIds.reduce((sum,id) => { const b = receipts.find(r => String(r.id)===id); return sum+(b?b.total:0); }, 0);
                  const selectedVendors = new Set(selectedIds.map(id => receipts.find(r => String(r.id)===id)?.vendor).filter(Boolean));

                  return (
                    <div className="animate-in fade-in space-y-3">
                      {/* Summary Header */}
                      <div className="bg-gradient-to-r from-red-600 to-red-500 p-4 rounded-xl shadow text-white">
                        <div className="flex justify-between items-center">
                          <div>
                            <p className="text-[10px] font-bold text-red-200">ยอดค้างชำระทั้งหมด</p>
                            <p className="text-2xl font-black">{formatMoney(totalUnpaid)} <span className="text-sm font-normal text-red-200">บาท</span></p>
                            <p className="text-[10px] text-red-200 mt-0.5">{unpaidBills.length} บิล จาก {sortedVendors.length} ร้านค้า</p>
                          </div>
                          {unpaidBills.length === 0 && <div className="text-[40px] opacity-50">✅</div>}
                          {unpaidBills.length > 0 && <div className="text-[40px] opacity-40">💳</div>}
                        </div>
                      </div>

                      {unpaidBills.length === 0 ? (
                        <div className="text-center py-10 text-gray-400 font-bold bg-white rounded-xl border">
                          <div className="text-4xl mb-3">🎉</div>
                          <p>ไม่มีบิลค้างชำระในระบบ</p>
                          <p className="text-[11px] mt-1 text-gray-300">เมื่อรับของแบบ "ยังไม่ชำระ" จะแสดงที่นี่</p>
                        </div>
                      ) : (
                        <>
                          {/* Sort Controls */}
                          <div className="flex gap-2 items-center">
                            <span className="text-[10px] text-gray-500 font-bold shrink-0">เรียงตาม:</span>
                            <div className="flex bg-gray-100 p-1 rounded-lg flex-1 max-w-[260px]">
                              <button onClick={() => setApSortMode('amount')} className={`flex-1 py-1.5 text-[11px] font-bold rounded-md transition-colors ${apSortMode==='amount' ? 'bg-white shadow text-red-700' : 'text-gray-500'}`}>💰 ยอดหนี้รวม (มากสุดบน)</button>
                              <button onClick={() => setApSortMode('name')} className={`flex-1 py-1.5 text-[11px] font-bold rounded-md transition-colors ${apSortMode==='name' ? 'bg-white shadow text-blue-700' : 'text-gray-500'}`}>🔤 ชื่อร้าน (A→Z)</button>
                            </div>
                          </div>

                          {/* Vendor List */}
                          <div className="space-y-2">
                            {sortedVendors.map(vendor => {
                              const vendorBills = unpaidByVendor[vendor].sort((a,b) => {
                                const da = parseDDMMYYYY(a.date); const db = parseDDMMYYYY(b.date);
                                return db - da; // ใหม่สุดบนสุด
                              });
                              const vendorTotal = vendorBills.reduce((s,r) => s+r.total, 0);
                              const vendorSelectedCount = vendorBills.filter(b => apSelectedBills[String(b.id)]).length;
                              const isVendorExpanded = apExpandedVendor === vendor;

                              return (
                                <div key={vendor} className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                                  {/* Vendor Header */}
                                  <div
                                    onClick={() => setApExpandedVendor(isVendorExpanded ? null : vendor)}
                                    className={`p-3 flex justify-between items-center cursor-pointer transition-colors ${isVendorExpanded ? 'bg-red-50 border-b border-red-100' : 'hover:bg-gray-50'}`}
                                  >
                                    <div className="flex items-center gap-3">
                                      <div className="w-8 h-8 bg-red-100 rounded-full flex items-center justify-center text-red-600 font-black text-sm shrink-0">
                                        {vendor.charAt(0)}
                                      </div>
                                      <div>
                                        <div className="font-bold text-gray-800 text-sm flex items-center gap-2">
                                          {vendor}
                                          {vendorSelectedCount > 0 && <span className="text-[9px] bg-blue-600 text-white px-1.5 py-0.5 rounded-full">เลือก {vendorSelectedCount}</span>}
                                        </div>
                                        <div className="text-[10px] text-gray-500">{vendorBills.length} บิล</div>
                                      </div>
                                    </div>
                                    <div className="text-right flex items-center gap-3">
                                      <div>
                                        <div className="text-[9px] text-gray-400 font-bold">ยอดค้างรวม</div>
                                        <div className="font-black text-red-600 text-sm">{formatMoney(vendorTotal)} ฿</div>
                                      </div>
                                      <span className="text-gray-400 text-xs">{isVendorExpanded ? '▲' : '▼'}</span>
                                    </div>
                                  </div>

                                  {/* Bill List (accordion) */}
                                  {isVendorExpanded && (
                                    <div className="divide-y divide-gray-100 bg-gray-50/50">
                                      {vendorBills.map(bill => {
                                        const isSelected = !!apSelectedBills[String(bill.id)];
                                        const isBillExpanded = apExpandedBill === bill.id;
                                        return (
                                          <div key={bill.id} className={`transition-colors ${isSelected ? 'bg-blue-50' : ''}`}>
                                            <div className="flex items-start p-3 gap-3">
                                              {/* Checkbox */}
                                              <input
                                                type="checkbox"
                                                checked={isSelected}
                                                onChange={() => toggleApBill(bill.id, vendor)}
                                                className="mt-1 w-4 h-4 accent-blue-600 cursor-pointer shrink-0"
                                              />
                                              {/* Bill Info */}
                                              <div
                                                className="flex-1 cursor-pointer"
                                                onClick={() => setApExpandedBill(isBillExpanded ? null : bill.id)}
                                              >
                                                <div className="flex justify-between items-start">
                                                  <div>
                                                    <div className="text-[11px] font-bold text-gray-800">{bill.date}</div>
                                                    <div className="text-[9px] text-gray-400">{bill.items.length} รายการ <span className="ml-1">{isBillExpanded ? '▲ ซ่อน' : '▼ ดูรายละเอียด'}</span></div>
                                                  </div>
                                                  <div className="font-black text-gray-800 text-sm">{formatMoney(bill.total)} ฿</div>
                                                </div>
                                                {/* Bill Detail (expand) */}
                                                {isBillExpanded && (
                                                  <div className="mt-2 animate-in fade-in">
                                                    <table className="w-full text-[10px] border border-gray-200 rounded bg-white overflow-hidden">
                                                      <thead className="bg-gray-100 text-gray-600 font-bold">
                                                        <tr>
                                                          <th className="p-1.5 text-left">รายการ</th>
                                                          <th className="p-1.5 text-center">จำนวน</th>
                                                          <th className="p-1.5 text-right">ราคา/หน่วย</th>
                                                          <th className="p-1.5 text-right">รวม</th>
                                                        </tr>
                                                      </thead>
                                                      <tbody className="divide-y divide-gray-100">
                                                        {bill.items.map((bi, idx) => (
                                                          <tr key={idx} className="hover:bg-gray-50">
                                                            <td className="p-1.5 font-medium text-gray-700">{getItemName(bi.item)}</td>
                                                            <td className="p-1.5 text-center">{formatNumber(bi.qty)} {bi.item.purchaseUnit||bi.item.unit}</td>
                                                            <td className="p-1.5 text-right">{formatNumber(bi.price)} ฿</td>
                                                            <td className="p-1.5 text-right font-bold text-blue-700">{formatMoney(bi.total)}</td>
                                                          </tr>
                                                        ))}
                                                      </tbody>
                                                      <tfoot className="bg-gray-50 border-t border-gray-300 font-bold">
                                                        <tr>
                                                          <td colSpan="3" className="p-1.5 text-right text-gray-700">รวมทั้งบิล:</td>
                                                          <td className="p-1.5 text-right text-blue-700">{formatMoney(bill.total)} ฿</td>
                                                        </tr>
                                                      </tfoot>
                                                    </table>
                                                  </div>
                                                )}
                                              </div>
                                            </div>
                                          </div>
                                        );
                                      })}
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>

                          {/* Sticky Payment Footer */}
                          {selectedIds.length > 0 && (
                            <div className="sticky bottom-0 bg-white border border-blue-200 rounded-xl shadow-lg p-3 animate-in slide-in-from-bottom-4 z-20">
                              <div className="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
                                <div className="flex-1">
                                  <div className="text-[10px] text-gray-500 font-bold">เลือกแล้ว {selectedIds.length} บิล จากร้าน: <span className="text-blue-700">{[...selectedVendors].join(', ')}</span></div>
                                  <div className="text-xl font-black text-blue-700">{formatMoney(selectedTotal)} <span className="text-sm font-normal text-gray-500">บาท</span></div>
                                </div>
                                <div className="flex gap-2 items-center flex-wrap">

                                      <div onClick={() => setExpandedPriceItem(isExpanded ? null : item.id)} className={`px-3 py-2.5 flex justify-between items-center cursor-pointer hover:bg-blue-50 transition-colors ${isExpanded ? 'bg-blue-50 border-l-[3px] border-l-blue-500' : 'bg-white border-l-[3px] border-l-transparent'}`}>

                                      </div>
                                      {isExpanded && (
                                        <div className="bg-gray-50 p-2 border-t border-gray-200">
                                          {itemHistory.length > 0 ? (
                                            <table className="w-full text-left text-[11px]"><thead className="bg-gray-200 text-gray-700 font-bold"><tr><th className="p-2 border-b border-gray-300">วันที่รับของ</th><th className="p-2 border-b border-gray-300">ร้านค้า</th><th className="p-2 border-b border-gray-300 text-right">ราคา/หน่วย</th><th className="p-2 border-b border-gray-300 text-right">ส่วนต่าง</th></tr></thead>
                                              <tbody className="divide-y divide-gray-100">
                                                {itemHistory.map((h, idx) => {
                                                  const diff = h.price - h.oldPrice;
                                                  return ( <tr key={idx} className="bg-white hover:bg-gray-50 transition-colors"><td className="p-2 font-medium text-gray-800">{h.date}</td><td className="p-2 text-gray-600">{h.vendor}</td><td className="p-2 text-right font-bold text-gray-900">{formatNumber(h.price)}</td><td className={`p-2 text-right font-bold ${diff > 0 ? 'text-red-600' : (diff < 0 ? 'text-green-600' : 'text-gray-400')}`}>{h.oldPrice > 0 ? (diff === 0 ? '-' : (diff > 0 ? `▲ +${((diff/h.oldPrice)*100).toFixed(1)}%` : `▼ ${((Math.abs(diff)/h.oldPrice)*100).toFixed(1)}%`)) : <span className="italic font-normal">เริ่มแรก</span>}</td></tr> )
                                                })}
                                              </tbody>
                                            </table>
                                          ) : <div className="text-center py-4 text-gray-400 text-xs font-medium bg-white rounded border border-gray-100">ยังไม่มีประวัติการรับของในระบบ</div>}
                                        </div>
                                      )}
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}

                {/* --- 📦 ประวัติจำนวนสต๊อก (Matrix) --- */}

                        </table>
                      </div>
                    </div>

                {historyMode === 'stockValue' && (
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 animate-in fade-in">
                    <div className="flex justify-between items-center mb-4"><h2 className="font-bold text-gray-800 text-base flex items-center"><span className="text-lg mr-2">💰</span> มูลค่าสต๊อกคงเหลือ (บาท)</h2></div>
                    <div className="space-y-3">
                      <div className="flex overflow-x-auto hide-scrollbar gap-2 pb-1 border-b border-gray-100"><button onClick={() => setStockMatrixCategory('')} className={`shrink-0 px-3 py-1.5 rounded-full text-[11px] sm:text-xs font-bold border shadow-sm transition-colors ${stockMatrixCategory === '' ? 'bg-gray-800 text-white border-gray-800' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}>รวมทุกหมวด</button>{categoryOrder.map(cat => (<button key={cat} onClick={() => setStockMatrixCategory(cat)} className={`shrink-0 px-3 py-1.5 rounded-full text-[11px] sm:text-xs font-bold border shadow-sm transition-colors ${stockMatrixCategory === cat ? 'bg-gray-800 text-white border-gray-800' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}>{cat}</button>))}</div>

                              {visibleStockDates.map((dateStr, i) => {
                                  const dayRecord = dailyHistory.find(h => h.endDate === dateStr && h.type === 'checked'); let totalValue = 0;
                                  if(dayRecord) { dayRecord.details.forEach(d => { if(stockMatrixCategory === '' || d.category === stockMatrixCategory) { totalValue += (d.close * d.costPerUnit); } }); return <td key={i} className="p-1 text-center border-r border-green-200 text-green-800 text-[12px]">{formatMoney(totalValue)}</td>; }
                                  return <td key={i} className="p-1 text-center border-r border-green-200 text-gray-400">-</td>;
                              })}
                            </tr>
                            {inventory.filter(i => stockMatrixCategory === '' || i.category === stockMatrixCategory).filter(isItemVisible).map(item => (
                              <tr key={item.id} className="hover:bg-green-50/30 transition-colors">
                                <td className="p-2 sticky left-0 bg-white border-r border-gray-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] z-10 font-bold text-gray-800 text-[11px] truncate max-w-[150px]">{getItemName(item)}</td>
                                {visibleStockDates.map((dateStr, i) => {
                                    const dayRecord = dailyHistory.find(h => h.endDate === dateStr && h.type === 'checked'); let foundDetail = dayRecord ? dayRecord.details.find(d => d.id === item.id) : null;
                                    if(foundDetail) { const stockValue = foundDetail.close * foundDetail.costPerUnit; return <td key={i} className="p-1 text-center border-r border-gray-100 align-middle bg-green-50/10"><div className="font-bold text-green-700">{formatMoney(stockValue)}</div></td>; } 
                                    else { return <td key={i} className="p-1 text-center border-r border-gray-50 align-middle text-gray-300">-</td>; }
                                })}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>

              </div>

          {/* ===== TAB: หน้าจัดการเงินสด ===== */}
          {activeTab === 'cashMgmt' && (auth.role === 'owner' || auth.role === 'manager') && (
            <div className="space-y-4 animate-in fade-in">
              {/* Header Summary */}
              <div className="bg-gradient-to-r from-green-600 to-emerald-600 rounded-xl p-4 text-white shadow-lg">
                <div className="flex justify-between items-start">
                  <div>
                    <p className="text-[10px] text-green-200 font-bold">เงินสดสะสมล่าสุด</p>
                    <p className="text-3xl font-black">{formatMoney(buildCashFlowData[0]?.cumulativeCash ?? 0)} <span className="text-sm font-normal">บ.</span></p>
                    <p className="text-[9px] text-green-300 mt-1">⚠️ ข้อมูลยังไม่บันทึก Firebase — จะหายหากรีเฟรชหน้า</p>
                  </div>
                  <div className="text-right">
                    <p className="text-[10px] text-green-200">วันที่: {formatDDMMYYYY(new Date())}</p>
                    <p className="text-[10px] text-green-200 mt-1">รวม {buildCashFlowData.length} วัน</p>
                  </div>
                </div>
              </div>

              {/* ฟอร์มบันทึกฝากเงิน */}
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                <h3 className="font-bold text-gray-700 text-sm mb-3 flex items-center"><span className="w-2 h-5 bg-green-500 rounded-full mr-2"></span>🏦 บันทึกฝากเงิน</h3>
                <div className="flex gap-2 items-center flex-wrap">
                  <input type="date"
                    value={cashMgmtDepositDate.split('/').length===3 ? `${cashMgmtDepositDate.split('/')[2]}-${cashMgmtDepositDate.split('/')[1]}-${cashMgmtDepositDate.split('/')[0]}` : cashMgmtDepositDate}
                    onChange={e => { const p=e.target.value.split('-'); setCashMgmtDepositDate(`${p[2]}/${p[1]}/${p[0]}`); }}
                    className="p-2 text-xs border rounded-lg outline-none focus:border-green-400 font-bold" />
                  <input type="number" placeholder="ยอดฝากเงิน (บาท)" value={cashMgmtDepositAmt} onChange={e=>setCashMgmtDepositAmt(e.target.value)} className="flex-1 p-2 text-xs border rounded-lg outline-none focus:border-green-400 font-bold text-center min-w-28" />
                  <input type="text" placeholder="หมายเหตุ (ถ้ามี)" value={cashMgmtDepositNote} onChange={e=>setCashMgmtDepositNote(e.target.value)} className="flex-1 p-2 text-xs border rounded-lg outline-none focus:border-green-400 min-w-24" />
                  <button onClick={saveDeposit} className="bg-green-600 hover:bg-green-700 text-white font-bold px-4 py-2 rounded-lg text-xs shadow-sm transition-colors">+ บันทึกฝากเงิน</button>
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">

                {buildCashFlowData.length === 0 ? (
                  <div className="p-8 text-center text-gray-400">
                    <div className="text-4xl mb-2">💵</div>
                    <p className="font-bold text-sm">ยังไม่มีข้อมูล</p>
                    <p className="text-[11px] mt-1">เริ่มบันทึกยอดขายรายวันในหน้าภาพรวมก่อน</p>
                  </div>
                ) : (
                  <div className="overflow-x-auto">
                    <table className="w-full text-[10px] sm:text-xs">
                      <thead className="bg-gray-50 border-b border-gray-200">
                        <tr>
                          <th className="p-2 text-left font-bold text-gray-600">วันที่</th>
                          <th className="p-2 text-right font-bold text-green-700">เงินสดรับ</th>
                          <th className="p-2 text-right font-bold text-red-600">จ่ายของสด</th>
                          <th className="p-2 text-right font-bold text-orange-600">จ่ายรายวัน</th>
                          <th className="p-2 text-right font-bold text-orange-600">จ่ายรายเดือน</th>
                          <th className="p-2 text-right font-bold text-blue-700">สุทธิ</th>
                          <th className="p-2 text-right font-bold text-purple-600">ฝากเงิน</th>
                          <th className="p-2 text-right font-bold text-gray-800">สะสม</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {buildCashFlowData.map((row, idx) => {
                          const isToday = row.date === formatDDMMYYYY(new Date());
                          const totalOut = row.paidReceiptsToday + row.paidAPToday + row.dailyExpCash + row.monthlyExpCash;
                          return (
                            <tr key={row.date} className={`${isToday ? 'bg-blue-50 border-l-4 border-l-blue-400' : ''} hover:bg-gray-50`}>
                              <td className="p-2 font-bold text-gray-700">{row.date}{isToday && <span className="ml-1 text-[8px] bg-blue-100 text-blue-700 px-1 rounded font-bold">วันนี้</span>}</td>
                              <td className="p-2 text-right text-green-700 font-bold">{row.cashIncome > 0 ? `+${formatMoney(row.cashIncome)}` : '-'}</td>
                              <td className="p-2 text-right text-red-500" title={row.apDetails}>{(row.paidReceiptsToday + row.paidAPToday) > 0 ? `-${formatMoney(row.paidReceiptsToday + row.paidAPToday)}` : '-'}</td>
                              <td className="p-2 text-right text-orange-500">{row.dailyExpCash > 0 ? `-${formatMoney(row.dailyExpCash)}` : '-'}</td>
                              <td className="p-2 text-right text-orange-500">{row.monthlyExpCash > 0 ? `-${formatMoney(row.monthlyExpCash)}` : '-'}</td>
                              <td className={`p-2 text-right font-bold ${row.netCash >= 0 ? 'text-blue-700' : 'text-red-600'}`}>{row.netCash >= 0 ? `+${formatMoney(row.netCash)}` : formatMoney(row.netCash)}</td>

                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>

              {/* หมายเหตุ */}
              <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-3">
                <p className="text-[10px] font-bold text-yellow-800 mb-1">📝 หมายเหตุ</p>

                </ul>
              </div>
            </div>

          {/* ================= MODALS ================= */}
          {showWasteModal && (

              <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden animate-in zoom-in-95 duration-200">
                <div className="bg-red-600 p-3 flex justify-between items-center"><h3 className="font-bold text-white text-sm">แจ้งของเสีย: {inventory.find(i=>i.id===showWasteModal)?.name}</h3><button onClick={() => setShowWasteModal(null)} className="text-white font-bold">&times;</button></div>
                <div className="p-4 space-y-4">
                  <div><label className="block text-xs font-bold text-gray-700 mb-1">ปริมาณที่เสีย <span className="text-red-500">*</span></label><div className="flex items-center"><input type="number" id="wasteQty" defaultValue={dailyCounts[showWasteModal]?.waste || ''} className="w-full p-2 border-2 border-gray-200 rounded-lg font-bold text-red-600 outline-none focus:border-red-500 text-lg text-center shadow-inner" placeholder="0" /><span className="ml-2 text-xs font-bold text-gray-500 w-8">{inventory.find(i=>i.id===showWasteModal)?.unit}</span></div></div>
                  <div><label className="block text-xs font-bold text-gray-700 mb-1">สาเหตุ (หมายเหตุ)</label><input type="text" id="wasteReason" defaultValue={dailyCounts[showWasteModal]?.reason || ''} className="w-full p-2 border border-gray-300 rounded-lg text-sm outline-none focus:border-red-500 bg-gray-50 shadow-inner" placeholder="เช่น เน่า, ตกพื้น" /></div>
                  <div><label className="block text-xs font-bold text-gray-700 mb-1 flex items-center">📸 แนบรูปภาพ (ถ้ามี)</label><input type="file" id="wastePhoto" accept="image/*" capture="environment" className="w-full text-[10px] text-gray-500 file:mr-2 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-[10px] file:font-bold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200" /></div>
                </div>
                <div className="p-3 border-t bg-gray-50 flex space-x-2"><button onClick={() => setShowWasteModal(null)} className="flex-1 py-2.5 bg-gray-200 text-gray-700 font-bold rounded-lg text-sm transition-colors hover:bg-gray-300">ยกเลิก</button><button onClick={saveWasteModal} className="flex-1 py-2.5 bg-red-600 text-white font-bold rounded-lg text-sm shadow-sm active:scale-95 transition-all hover:bg-red-700">บันทึกของเสีย</button></div>
              </div>
            </div>
          )}

          {wasteDetailModal && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-gray-900/80 backdrop-blur-sm animate-in fade-in" onClick={() => setWasteDetailModal(null)}>
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-xs overflow-hidden animate-in zoom-in-95" onClick={e=>e.stopPropagation()}>
                <div className="bg-red-50 p-4 border-b border-red-100 text-center relative"><div className="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center text-xl mx-auto mb-2 shadow-sm">🗑️</div><h3 className="font-bold text-gray-800 text-base">{wasteDetailModal.name}</h3><button onClick={() => setWasteDetailModal(null)} className="absolute top-3 right-3 text-gray-400 hover:text-gray-600 transition-colors">&times;</button></div>
                <div className="p-5 text-center">
                  <p className="text-xs text-gray-500 mb-1 font-bold">ยอดเสียไปเมื่อสิ้นวัน</p><p className="text-3xl font-black text-red-600 mb-1">{wasteDetailModal.waste} <span className="text-sm font-bold text-gray-400">{wasteDetailModal.unit}</span></p><p className="text-xs font-bold text-red-800 bg-red-100 py-1 px-3 rounded-full inline-block mb-4 shadow-sm">มูลค่า {(wasteDetailModal.waste * wasteDetailModal.costPerUnit).toFixed(0)} บาท</p>
                  <div className="text-left bg-gray-50 p-3 rounded-lg border border-gray-200 shadow-inner"><p className="text-[10px] font-bold text-gray-500 mb-1">สาเหตุ / หมายเหตุ:</p><p className="text-sm font-medium text-gray-800">{wasteDetailModal.wasteReason || '-'}</p></div>
                  {wasteDetailModal.wastePhoto && (<div className="mt-4 text-left"><p className="text-[10px] font-bold text-gray-500 mb-1">รูปภาพแนบ:</p><div className="w-full h-32 bg-gray-200 rounded-lg border border-gray-300 flex items-center justify-center overflow-hidden shadow-inner"><span className="text-4xl text-gray-400">📸</span></div></div>)}
                </div>
              </div>
            </div>
          )}

          {itemModal.isOpen && itemModal.data && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-2 sm:p-4 bg-gray-900/80 backdrop-blur-sm animate-in fade-in">
              <div className="bg-white rounded-2xl shadow-2xl w-full h-[95vh] sm:h-[85vh] max-w-2xl flex flex-col overflow-hidden border border-gray-200 animate-in zoom-in-95">
                <div className="bg-blue-600 p-4 flex justify-between items-center shrink-0"><h3 className="font-bold text-white text-lg">✨ รายละเอียดวัตถุดิบและระบบยกมา</h3><button onClick={() => setItemModal({ isOpen: false, mode: 'add', sourceTab: 'manage', data: null })} className="text-white font-bold text-xl transition-colors hover:text-gray-200">&times;</button></div>
                <div className="p-4 sm:p-6 space-y-4 overflow-y-auto smooth-scroll flex-1 bg-gray-50">
                  {itemModal.sourceTab === 'settings' && (
                    <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 space-y-4 shadow-sm">
                      <h4 className="font-bold text-amber-900 text-xs">📦 บันทึกยอดสต๊อกคลังแรกเริ่ม (เลือกบันทึกรูปแบบใดรูปแบบหนึ่ง)</h4>
                      <div className="grid grid-cols-2 gap-4">
                        <div className={`p-3 rounded-lg border bg-white transition-all ${itemModal.data.initialStockType === 'base' ? 'border-blue-500 ring-2 ring-blue-100 shadow-sm' : 'border-gray-200 opacity-50'}`}>
                          <label className="flex items-center gap-2 font-bold text-xs text-gray-700 cursor-pointer"><input type="radio" checked={itemModal.data.initialStockType === 'base'} onChange={()=>setItemModal({...itemModal, data: {...itemModal.data, initialStockType: 'base', initialStockPrice: ''}})} />บันทึกตาม "หน่วยนับสต๊อก"</label>
                          <div className="mt-2 space-y-2"><input type="number" placeholder="จำนวนหน่วยนับ" disabled={itemModal.data.initialStockType !== 'base'} value={itemModal.data.initialStockType === 'base' ? itemModal.data.initialStock : ''} onChange={(e)=>setItemModal({...itemModal, data: {...itemModal.data, initialStock: e.target.value}})} className="w-full p-2 border rounded text-xs outline-none focus:border-blue-500" /><input type="number" placeholder="ราคาต่อหน่วยนับ (บาท)" disabled={itemModal.data.initialStockType !== 'base'} value={itemModal.data.initialStockType === 'base' ? itemModal.data.initialStockPrice : ''} onChange={(e)=>setItemModal({...itemModal, data: {...itemModal.data, initialStockPrice: e.target.value}})} className="w-full p-2 border rounded text-xs outline-none focus:border-blue-500" /></div>
                        </div>
                        <div className={`p-3 rounded-lg border bg-white transition-all ${itemModal.data.initialStockType === 'purchase' ? 'border-blue-500 ring-2 ring-blue-100 shadow-sm' : 'border-gray-200 opacity-50'}`}>
                          <label className="flex items-center gap-2 font-bold text-xs text-gray-700 cursor-pointer"><input type="radio" checked={itemModal.data.initialStockType === 'purchase'} onChange={()=>setItemModal({...itemModal, data: {...itemModal.data, initialStockType: 'purchase', initialStockPrice: ''}})} />บันทึกตาม "หน่วยซื้อเข้า"</label>
                          <div className="mt-2 space-y-2"><input type="number" placeholder="จำนวนหน่วยซื้อ" disabled={itemModal.data.initialStockType !== 'purchase'} value={itemModal.data.initialStockType === 'purchase' ? itemModal.data.initialStock : ''} onChange={(e)=>setItemModal({...itemModal, data: {...itemModal.data, initialStock: e.target.value}})} className="w-full p-2 border rounded text-xs outline-none focus:border-blue-500" /><input type="number" placeholder="ราคาต่อหน่วยซื้อ (บาท)" disabled={itemModal.data.initialStockType !== 'purchase'} value={itemModal.data.initialStockType === 'purchase' ? itemModal.data.initialStockPrice : ''} onChange={(e)=>setItemModal({...itemModal, data: {...itemModal.data, initialStockPrice: e.target.value}})} className="w-full p-2 border rounded text-xs outline-none focus:border-blue-500" /></div>
                        </div>
                      </div>
                    </div>
                  )}
                  <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm space-y-4">
                    <div><label className="block text-xs font-bold text-gray-700 mb-1">ชื่อวัตถุดิบ *</label><input type="text" value={itemModal.data.name || ''} onChange={(e) => setItemModal({...itemModal, data: {...itemModal.data, name: e.target.value}})} className="w-full p-3 border rounded-xl text-sm font-bold bg-gray-50 focus:bg-white focus:border-blue-500 outline-none transition-all shadow-inner" placeholder="เช่น อกไก่, น้ำปลา" /></div>
                    <div className="grid grid-cols-2 gap-3">
                      <div><label className="block text-xs font-bold text-gray-700 mb-1">หมวดหมู่ *</label><input type="text" list="categories-list" value={itemModal.data.category || ''} onChange={(e) => setItemModal({...itemModal, data: {...itemModal.data, category: e.target.value}})} className="w-full p-3 border rounded-xl text-sm font-bold bg-white focus:border-blue-500 outline-none shadow-sm" placeholder="เลือกหรือพิมพ์ใหม่..." /><datalist id="categories-list">{categoryOrder.map(c => <option key={c} value={c} />)}</datalist></div>
                      {itemModal.sourceTab !== 'manage' && (<div><label className="block text-xs font-bold text-gray-700 mb-1">ร้านประจำแรกเริ่ม</label><input type="text" list="vendors-list-modal" value={itemModal.data.vendor || ''} onChange={(e) => setItemModal({...itemModal, data: {...itemModal.data, vendor: e.target.value}})} className="w-full p-3 border rounded-xl text-sm bg-white outline-none shadow-sm" placeholder="เลือกหรือพิมพ์ใหม่..." /><datalist id="vendors-list-modal">{vendors.map(v => <option key={v} value={v} />)}</datalist></div>)}
                    </div>
                    <div className="grid grid-cols-3 gap-3">
                      <div><label className="block text-xs font-bold text-gray-700 mb-1">หน่วยนับสต๊อก *</label><input type="text" value={itemModal.data.unit || ''} onChange={(e) => setItemModal({...itemModal, data: {...itemModal.data, unit: e.target.value}})} className="w-full p-2.5 border rounded-xl text-xs shadow-sm" placeholder="เช่น กก., ขวด" /></div>
                      <div><label className="block text-xs font-bold text-gray-700 mb-1">หน่วยสั่งซื้อ</label><input type="text" value={itemModal.data.purchaseUnit || ''} onChange={(e) => setItemModal({...itemModal, data: {...itemModal.data, purchaseUnit: e.target.value}})} className="w-full p-2.5 border rounded-xl text-xs shadow-sm" placeholder="เช่น ลัง, ถุง" /></div>
                      <div><label className="block text-xs font-bold text-gray-700 mb-1">อัตราแปลงหน่วย</label><input type="number" value={itemModal.data.conversionRate || ''} onChange={(e) => setItemModal({...itemModal, data: {...itemModal.data, conversionRate: e.target.value}})} className="w-full p-2.5 border rounded-xl text-xs font-bold text-center shadow-sm" placeholder="1" /></div>
                    </div>
                  </div>
                  {itemModal.sourceTab === 'manage' && itemModal.mode === 'edit' && (
                    <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex justify-between items-center">
                      <div><span className="font-bold text-sm text-gray-800">สถานะการใช้งานรายการวัตถุดิบ</span><p className="text-[10px] text-gray-500">ปิดหากเลิกใช้วัตถุดิบนี้ในระบบครัว</p></div>
                      <div className="flex items-center gap-4">
                        {itemModal.data.isActive === false && (<label className="flex items-center gap-1.5 text-xs text-orange-700 font-bold bg-orange-50 px-2 py-1 rounded border shadow-sm cursor-pointer"><input type="checkbox" checked={itemModal.data.showWhenInactive || false} onChange={(e)=>setItemModal({...itemModal, data: {...itemModal.data, showWhenInactive: e.target.checked}})} />ยังแสดง (สถานะไม่ใช้แล้ว)</label>)}
                        <button onClick={() => setItemModal({...itemModal, data: {...itemModal.data, isActive: !itemModal.data.isActive}})} className={`px-4 py-1.5 rounded-lg text-xs font-bold text-white shadow-sm transition-colors ${itemModal.data.isActive !== false ? 'bg-green-600 hover:bg-green-700' : 'bg-gray-400 hover:bg-gray-500'}`}>{itemModal.data.isActive !== false ? 'เปิดใช้งานอยู่' : 'ปิดใช้งานแล้ว'}</button>
                      </div>
                    </div>
                  )}
                </div>
                <div className="p-4 border-t bg-white shrink-0 shadow-[0_-4px_6px_-1px_rgb(0,0,0,0.05)]"><button onClick={saveItemModal} className="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md transition-transform active:scale-95">✅ ลงบันทึกรายการวัตถุดิบ</button></div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const renderApp = () => { const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />); };
    if (window.isFirebaseLoaded) { renderApp(); } else { window.addEventListener('firebase-loaded', renderApp); }
  </script>
</body>
</html>
