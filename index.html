<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
    
    .smooth-scroll { 
      -webkit-overflow-scrolling: touch; 
      overscroll-behavior-y: contain; 
    }
    
    @media print {
      body * { visibility: hidden; }
      #printable-area, #printable-area * { visibility: visible; }
      #printable-area { position: absolute; left: 0; top: 0; width: 100%; background: white; padding: 0 !important; margin: 0 !important; box-shadow: none !important;}
      .no-print { display: none !important; }
      table { width: 100%; border-collapse: collapse; font-size: 11px; } 
      th, td { border: 1px solid #999; padding: 3px 4px; } 
      th { background-color: #e5e7eb !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-weight: bold;}
      h1 { font-size: 16px; margin: 0 0 4px 0; }
      h3 { font-size: 13px; margin: 8px 0 4px 0; background: none; border: none; padding: 0; font-weight: bold;}
      p { font-size: 11px; margin: 0 0 6px 0; }
      .mb-8 { margin-bottom: 8px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { initializeFirestore, memoryLocalCache, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    
    window.FirebaseAPI = { initializeApp, initializeFirestore, memoryLocalCache, doc, getDoc, setDoc, onSnapshot, getAuth, signInAnonymously, onAuthStateChanged };
    window.isFirebaseLoaded = true;
    window.dispatchEvent(new Event('firebase-loaded'));
  </script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const formatNumber = (num) => {
      if (num === undefined || num === null || isNaN(num)) return '0';
      return Number(num).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 1 });
    };
    const formatMoney = (num) => {
      if (num === undefined || num === null || isNaN(num)) return '0';
      return Number(num).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    };

    // ==========================================
    // COMPONENT: Mobile-Friendly Full-Screen Dropdown
    // ==========================================
    function SearchableDropdown({ items, selectedItem, onSelect, onAdd, onEdit, onDelete, placeholder, isVendor = false }) {
      const [isOpen, setIsOpen] = useState(false);
      const [search, setSearch] = useState('');

      const filtered = items.filter(item => {
        const name = isVendor ? item : item.name;
        return name.toLowerCase().includes(search.toLowerCase());
      });

      return (
        <>
          <div onClick={() => setIsOpen(true)} className="w-full p-3 bg-white border border-gray-300 rounded-lg text-sm font-bold text-blue-700 flex justify-between items-center cursor-pointer shadow-sm hover:border-blue-400 transition-colors">
            <span className="truncate">{selectedItem ? (isVendor ? selectedItem : items.find(i=>i.id===selectedItem)?.name) : placeholder}</span>
            <svg className="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
          </div>

          {isOpen && (
            <div className="fixed inset-0 z-[100] flex flex-col justify-center items-center p-2 sm:p-4 bg-gray-900/70 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-gray-100 w-full h-auto max-h-[92vh] sm:max-h-[85vh] max-w-2xl rounded-2xl shadow-2xl flex flex-col overflow-hidden animate-in zoom-in-95 duration-200 border border-gray-200">
                <div className="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-200/50">
                  <h3 className="font-bold text-gray-800 text-lg">{placeholder}</h3>
                  <button onClick={() => setIsOpen(false)} className="w-8 h-8 bg-gray-300 hover:bg-gray-400 rounded-full flex items-center justify-center font-bold text-gray-700 transition-colors">&times;</button>
                </div>
                <div className="p-3 border-b border-gray-200 bg-gray-100 shrink-0 shadow-sm z-10">
                  <div className="relative">
                    <input type="text" autoFocus placeholder="พิมพ์ค้นหา หรือ เพิ่มรายการใหม่..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full pl-10 pr-4 py-3 bg-white border border-gray-300 rounded-xl text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-inner" />
                    <svg className="w-5 h-5 absolute left-3 top-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                  </div>
                </div>
                <div className="overflow-y-auto flex-1 smooth-scroll pb-6 bg-gray-100 px-2">
                  {filtered.map(item => {
                    const id = isVendor ? item : item.id;
                    const name = isVendor ? item : (item.isActive === false ? `${item.name} (ไม่ใช้แล้ว)` : item.name);
                    return (
                      <div key={id} className={`flex justify-between items-center p-3 sm:p-4 border-b border-gray-200 cursor-pointer rounded-xl mx-1 mt-2 shadow-sm transition-all duration-150 ${!isVendor && item.isActive === false ? 'bg-gray-200 opacity-75' : 'bg-white hover:bg-blue-50 active:bg-blue-100'}`}>
                        <div className="flex-1 min-w-0 py-1" onClick={() => { onSelect(id); setIsOpen(false); setSearch(''); }}>
                          <div className={`font-bold text-sm sm:text-base truncate ${!isVendor && item.isActive === false ? 'text-gray-500' : 'text-gray-800'}`}>{name}</div>
                          {!isVendor && <div className="text-xs text-gray-500 mt-1">{item.lastPrice} บ./{item.purchaseUnit || item.unit} | มี: <span className="text-blue-600 font-bold">{item.currentStock}</span> {item.unit}</div>}
                        </div>
                        <div className="flex space-x-2 shrink-0 ml-3">
                          <button onClick={(e) => { e.stopPropagation(); onEdit(isVendor ? name : item); if(!isVendor) setIsOpen(false); }} className="w-9 h-9 flex items-center justify-center text-gray-600 bg-gray-100 hover:bg-blue-100 hover:text-blue-600 rounded-lg text-sm transition-colors shadow-sm">✏️</button>
                          <button onClick={(e) => { e.stopPropagation(); onDelete(id); }} className="w-9 h-9 flex items-center justify-center text-gray-600 bg-gray-100 hover:bg-red-100 hover:text-red-600 rounded-lg text-sm transition-colors shadow-sm">🗑️</button>
                        </div>
                      </div>
                    );
                  })}
                  {search && !items.find(i => (isVendor ? i : i.name).toLowerCase() === search.toLowerCase()) && (
                    <div onClick={() => { onAdd(search); if(isVendor) onSelect(search); setIsOpen(false); setSearch(''); }} className="p-4 mt-3 bg-green-100 text-green-800 font-bold text-sm sm:text-base text-center rounded-xl mx-2 cursor-pointer shadow-sm hover:bg-green-200 transition-colors">
                      + เพิ่ม "{search}" เป็นของใหม่
                    </div>
                  )}
                  {filtered.length === 0 && !search && <div className="p-10 text-center text-gray-400 text-sm sm:text-base font-medium">ไม่มีข้อมูล...</div>}
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    function App() {
      // --- FIREBASE CONFIGURATION ---
      const firebaseConfig = {
        apiKey: "AIzaSyCak5RHaVkjqN02MeWjvQ6HWA1EESEdeok",
        authDomain: "restaurant-stock-81615.firebaseapp.com",
        projectId: "restaurant-stock-81615",
        storageBucket: "restaurant-stock-81615.firebasestorage.app",
        messagingSenderId: "709594661979",
        appId: "1:709594661979:web:48edb6455c5e4a99a6eb7e",
        measurementId: "G-0YQ2THJHBC"
      };

      const [db, setDb] = useState(null);
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      const [isSyncActive, setIsSyncActive] = useState(false);

      // --- STATE DEFINITIONS ---
      const [auth, setAuth] = useState({ loggedIn: false, role: '', name: '' });
      const [loginPin, setLoginPin] = useState('');
      const [activeTab, setActiveTab] = useState('dashboard');
      
      const [branches, setBranches] = useState([
        { id: 'branch1', name: 'ครัวแสนสุข' }, 
        { id: 'branch2', name: 'ครัวบ้านแม่' }
      ]);
      const [selectedBranch, setSelectedBranch] = useState('branch1');
      
      const [categoryOrder, setCategoryOrder] = useState(['เนื้อสัตว์', 'อาหารทะเล', 'ผักสด', 'ของแห้ง', 'เครื่องปรุง', 'เครื่องดื่ม', 'อื่นๆ']);
      const [vendors, setVendors] = useState(['ตลาดสด', 'Makro', 'ร้านเจ๊หมวย (เนื้อสัตว์)']);

      const [newCategoryInput, setNewCategoryInput] = useState('');
      const [newVendorInput, setNewVendorInput] = useState('');

      const getDaysAgo = (days) => { const d = new Date(); d.setDate(d.getDate() - days); return d.toISOString().split('T')[0]; };
      const getTodayFormatted = () => { const d = new Date(); return d.toISOString().split('T')[0]; };
      const parseDDMMYYYY = (str) => { const [d, m, y] = str.split('/'); return new Date(y, m - 1, d); };
      const formatDDMMYYYY = (dateObj) => { const d = String(dateObj.getDate()).padStart(2, '0'); const m = String(dateObj.getMonth() + 1).padStart(2, '0'); const y = dateObj.getFullYear(); return `${d}/${m}/${y}`; };

      const [inventory, setInventory] = useState([]);
      const [dailyHistory, setDailyHistory] = useState([]);
      const [receipts, setReceipts] = useState([]);
      const [sales, setSales] = useState(0);
      
      const [pendingSalesInputs, setPendingSalesInputs] = useState({});

      // --- FIREBASE INITIALIZATION & SYNC ---
      useEffect(() => {
        let unsubscribeSnapshot = null;
        let isMounted = true;
        
        const initFirebase = async () => {
          try {
            while (!window.FirebaseAPI) {
              await new Promise(r => setTimeout(r, 100));
            }
            const { initializeApp, initializeFirestore, memoryLocalCache, doc, onSnapshot, getAuth, signInAnonymously, onAuthStateChanged } = window.FirebaseAPI;
            
            if (!window.firebaseAppInst) {
              window.firebaseAppInst = initializeApp(firebaseConfig);
              window.firebaseAuthInst = getAuth(window.firebaseAppInst);
              window.firestoreInst = initializeFirestore(window.firebaseAppInst, {
                localCache: memoryLocalCache(),
                experimentalForceLongPolling: true
              });
            }

            const firebaseAuth = window.firebaseAuthInst;
            const firestoreDb = window.firestoreInst;
            
            setDb(firestoreDb);
            setIsSyncActive(false); 
            
            const user = await new Promise((resolve) => {
              const unsubAuth = onAuthStateChanged(firebaseAuth, async (u) => {
                unsubAuth();
                if (u) {
                  resolve(u);
                } else {
                  try {
                    const cred = await signInAnonymously(firebaseAuth);
                    resolve(cred.user);
                  } catch (e) {
                    console.warn("Auth error:", e);
                    resolve(null);
                  }
                }
              });
            });

            if (!user || !isMounted) {
              setIsDataLoaded(true);
              return;
            }
            
            const docRef = doc(firestoreDb, "restaurant_data", selectedBranch);
            
            unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
              if (docSnap.exists()) {
                const data = docSnap.data();
                setInventory(data.inventory && data.inventory.length > 0 ? data.inventory : []);
                setDailyHistory(data.dailyHistory && data.dailyHistory.length > 0 ? data.dailyHistory : []);
                setReceipts(data.receipts && data.receipts.length > 0 ? data.receipts : []);
                if (data.vendors && data.vendors.length > 0) setVendors(data.vendors);
                if (data.categoryOrder && data.categoryOrder.length > 0) setCategoryOrder(data.categoryOrder);
                setSales(data.sales !== undefined ? data.sales : 0);
              } else {
                setInventory([]);
                setDailyHistory([]);
                setReceipts([]);
                setSales(0);
              }
              setIsDataLoaded(true);
              setIsSyncActive(true);
            }, (error) => {
              console.error("Firebase onSnapshot error:", error);
              setIsDataLoaded(true);
              setIsSyncActive(false); 
            });

          } catch (error) {
            console.error("Firebase fetch error:", error);
            setIsDataLoaded(true);
            setIsSyncActive(false);
          }
        };
        initFirebase();

        return () => {
          isMounted = false;
          if (unsubscribeSnapshot) {
            unsubscribeSnapshot();
          }
        };
      }, [selectedBranch]);

      useEffect(() => {
        if (!db || !isSyncActive) return;
        const saveToFirebase = async () => {
          try {
            const { doc, setDoc } = window.FirebaseAPI;
            await setDoc(doc(db, "restaurant_data", selectedBranch), {
              inventory, dailyHistory, receipts, categoryOrder, vendors, sales
            }, { merge: true });
          } catch(e) {
            console.error("Firebase auto-save error:", e);
          }
        };
        const timer = setTimeout(saveToFirebase, 2000);
        return () => clearTimeout(timer);
      }, [inventory, dailyHistory, receipts, categoryOrder, vendors, sales, db, isSyncActive, selectedBranch]);


      // --- HELPERS & MODES ---
      const isItemVisible = (item) => item.isActive !== false || item.showWhenInactive === true;
      const getItemName = (item) => item.isActive === false ? `${item.name} (ไม่ใช้แล้ว)` : item.name;

      const [expandedHistoryDate, setExpandedHistoryDate] = useState(null);
      const [wasteDetailModal, setWasteDetailModal] = useState(null);
      const [historyMode, setHistoryMode] = useState('daily');
      const [expandedPriceItem, setExpandedPriceItem] = useState(null);
      const [priceSearch, setPriceSearch] = useState('');
      const [receiptMode, setReceiptMode] = useState('record');
      const [expandedReceiptDate, setExpandedReceiptDate] = useState(null);
      const [expandedBillId, setExpandedBillId] = useState(null);
      const [priceViewMode, setPriceViewMode] = useState('matrix');
      const [matrixCategory, setMatrixCategory] = useState('');
      const [matrixOffset, setMatrixOffset] = useState(0);

      useEffect(() => { if (!matrixCategory && categoryOrder.length > 0) setMatrixCategory(categoryOrder[0]); }, [categoryOrder]);

      const uniqueReceiptDates = useMemo(() => {
        return [...new Set(receipts.map(r => r.date))].sort((a, b) => parseDDMMYYYY(b) - parseDDMMYYYY(a));
      }, [receipts]);
      
      const maxMatrixOffset = Math.max(0, uniqueReceiptDates.length - 10);
      const shiftMatrix = (steps) => setMatrixOffset(prev => Math.max(0, Math.min(maxMatrixOffset, prev + steps)));
      const visibleDates = uniqueReceiptDates.slice(matrixOffset, matrixOffset + 10);

      const [stockMatrixCategory, setStockMatrixCategory] = useState('');
      const [stockMatrixOffset, setStockMatrixOffset] = useState(0);
      useEffect(() => { if (!stockMatrixCategory && categoryOrder.length > 0) setStockMatrixCategory(categoryOrder[0]); }, [categoryOrder]);

      const uniqueCheckedDates = useMemo(() => {
        return [...new Set(dailyHistory.filter(h => h.type === 'checked').map(h => h.date))].sort((a, b) => parseDDMMYYYY(b) - parseDDMMYYYY(a));
      }, [dailyHistory]);
      
      const maxStockMatrixOffset = Math.max(0, uniqueCheckedDates.length - 10);
      const shiftStockMatrix = (steps) => setStockMatrixOffset(prev => Math.max(0, Math.min(maxStockMatrixOffset, prev + steps)));
      const visibleStockDates = uniqueCheckedDates.slice(stockMatrixOffset, stockMatrixOffset + 10);

      // --- DYNAMIC DASHBOARD DATA ---
      const pendingRecords = useMemo(() => {
        return dailyHistory.filter(h => h.sales === null && h.type === 'checked')
          .sort((a, b) => parseDDMMYYYY(b.endDate || b.date) - parseDDMMYYYY(a.endDate || a.date)); 
      }, [dailyHistory]);

      const completedRecords = useMemo(() => {
        return dailyHistory.filter(h => h.sales !== null && h.type === 'checked')
          .sort((a, b) => parseDDMMYYYY(b.endDate || b.date) - parseDDMMYYYY(a.endDate || a.date));
      }, [dailyHistory]);

      const latestCompleted = completedRecords.length > 0 ? completedRecords[0] : null;
      
      const getMonthlyStats = () => {
        const stats = {};
        completedRecords.forEach(h => {
          let totalSales = h.sales || 0;
          let totalCostUsed = h.totalUsedVal || 0;
          let totalCostWaste = h.totalWasteVal || 0;
          
          let curDate = parseDDMMYYYY(h.startDate || h.date);
          const endDateObj = parseDDMMYYYY(h.endDate || h.date);
          let daysCount = Math.round((endDateObj - curDate) / (1000 * 60 * 60 * 24)) + 1;
          if (daysCount < 1) daysCount = 1;

          const dailySales = totalSales / daysCount;
          const dailyUsed = totalCostUsed / daysCount;
          const dailyWaste = totalCostWaste / daysCount;

          let loopDate = new Date(curDate);
          while (loopDate <= endDateObj) {
            let m = String(loopDate.getMonth() + 1).padStart(2, '0');
            let y = loopDate.getFullYear();
            let monthKey = `${y}-${m}`;
            
            if (!stats[monthKey]) stats[monthKey] = { label: `${m}/${y}`, sales: 0, costUsed: 0, costWaste: 0 };
            
            stats[monthKey].sales += dailySales;
            stats[monthKey].costUsed += dailyUsed;
            stats[monthKey].costWaste += dailyWaste;

            loopDate.setDate(loopDate.getDate() + 1);
          }
        });
        return stats;
      };
      
      const dynamicMonthlyStats = getMonthlyStats();
      const currentMonthKey = new Date().getFullYear() + '-' + String(new Date().getMonth() + 1).padStart(2, '0');
      const [selectedMonth, setSelectedMonth] = useState(currentMonthKey);
      
      const currentMonthData = dynamicMonthlyStats[selectedMonth] || { sales: 0, costUsed: 0, costWaste: 0 };
      const monthlyTotalCost = (currentMonthData.costUsed || 0) + (currentMonthData.costWaste || 0);
      const monthlyProfit = currentMonthData.sales - monthlyTotalCost;
      const monthlyCostPercent = currentMonthData.sales > 0 ? ((monthlyTotalCost / currentMonthData.sales) * 100).toFixed(1) : 0;

      const [dashPage, setDashPage] = useState(1);
      const dashHistoryItems = completedRecords.slice(1).slice(0, 10).map((h, i) => ({
        id: h.id || i, 
        dateLabel: h.days > 1 ? `${h.startDate} ถึง ${h.endDate}` : (h.endDate || h.date), 
        days: h.days || 1, 
        sales: h.sales || 0, 
        cost: h.totalUsedVal + h.totalWasteVal, 
        costUsed: h.totalUsedVal, 
        costWaste: h.totalWasteVal
      }));

      // --- TAB STATES ---
      const [manageMode, setManageMode] = useState('items'); 
      const [targetDays, setTargetDays] = useState(3);
      const [avgStartDate, setAvgStartDate] = useState(getDaysAgo(30));
      const [avgEndDate, setAvgEndDate] = useState(getTodayFormatted());
      
      const [orderVendors, setOrderVendors] = useState({});
      const [selectedVendor, setSelectedVendor] = useState(vendors[0] || '');
      const [selectedItem, setSelectedItem] = useState('');
      const [purchaseQty, setPurchaseQty] = useState('');
      const [purchasePrice, setPurchasePrice] = useState('');
      const [billItems, setBillItems] = useState([]);
      const [paymentMethod, setPaymentMethod] = useState('เงินสด');
      
      const [dailyCounts, setDailyCounts] = useState({}); 
      const [categoryConfirmStatus, setCategoryConfirmStatus] = useState({});
      const [showWasteModal, setShowWasteModal] = useState(null); 
      const [staffNameInput, setStaffNameInput] = useState('');
      const [countDate, setCountDate] = useState(getTodayFormatted());

      const [itemModal, setItemModal] = useState({ isOpen: false, mode: 'add', sourceTab: 'manage', data: null });
      const [printData, setPrintData] = useState(null);

      const calculateDynamicAvg = (itemId) => {
        if (!avgStartDate || !avgEndDate) return 0;
        let totalUsed = 0;
        let totalWeights = 0;
        const start = new Date(avgStartDate);
        const end = new Date(avgEndDate);
        
        let currentDate = new Date(start);
        while (currentDate <= end) {
          const checkDateStr = formatDDMMYYYY(currentDate);
          const dayRecord = dailyHistory.find(h => h.date === checkDateStr || h.endDate === checkDateStr);
          
          if (dayRecord && dayRecord.type === 'checked') {
             let weight = dayRecord.days || 1;
             const itemDetail = dayRecord.details?.find(d => d.id === itemId);
             const usedQty = itemDetail ? itemDetail.used : 0;
             totalUsed += usedQty;
             totalWeights += weight;
          }
          currentDate.setDate(currentDate.getDate() + 1);
        }
        return totalWeights > 0 ? (totalUsed / totalWeights) : 0;
      };

      // --- LOGIN LOGIC ---
      const handleLogin = (e) => {
        e.preventDefault();
        if (loginPin === '1245') { 
          setAuth({ loggedIn: true, role: 'owner', name: 'เจ้าของร้าน' }); 
          setActiveTab('dashboard'); 
        }
        else if (loginPin === '1357') { 
          setAuth({ loggedIn: true, role: 'manager', name: 'ผู้จัดการ' }); 
          setActiveTab('dashboard'); 
        }
        else if (loginPin === '1234') { 
          setAuth({ loggedIn: true, role: 'staff', name: 'พนักงาน' }); 
          setSelectedBranch('branch1');
          setActiveTab('dailyCount'); 
          setHistoryMode('daily'); 
        }
        else if (loginPin === '5678') { 
          setAuth({ loggedIn: true, role: 'staff', name: 'พนักงาน' }); 
          setSelectedBranch('branch2');
          setActiveTab('dailyCount'); 
          setHistoryMode('daily'); 
        }
        else { alert('รหัสผ่านไม่ถูกต้อง'); }
      };
      
      const handleLogout = () => { setAuth({ loggedIn: false, role: '', name: '' }); setLoginPin(''); };

      // --- MASTER DATA HANDLERS ---
      const handleAddCategoryInline = () => {
        if (!newCategoryInput.trim()) return;
        if (categoryOrder.includes(newCategoryInput.trim())) return alert('มีหมวดหมู่นี้อยู่แล้ว');
        setCategoryOrder([...categoryOrder, newCategoryInput.trim()]);
        setNewCategoryInput('');
      };
      const promptEditCategory = (oldCat) => {
        const newCat = window.prompt(`แก้ไขชื่อหมวดหมู่ "${oldCat}" เป็น:`, oldCat);
        if (!newCat || !newCat.trim() || newCat.trim() === oldCat) return;
        setCategoryOrder(categoryOrder.map(c => c === oldCat ? newCat.trim() : c));
        setInventory(inventory.map(i => i.category === oldCat ? { ...i, category: newCat.trim() } : i));
      };
      const handleDeleteCategory = (cat) => {
        if (inventory.some(i => i.category === cat)) return alert(`❌ ไม่สามารถลบได้! ยังมีวัตถุดิบค้างอยู่ในหมวด "${cat}" กรุณาจัดการวัตถุดิบก่อน`);
        if (window.confirm(`ยืนยันการลบหมวดหมู่ "${cat}"?`)) setCategoryOrder(categoryOrder.filter(c => c !== cat));
      };
      const moveCategoryUp = (idx) => {
        if(idx === 0) return;
        const newOrder = [...categoryOrder];

      // --- SMART PURCHASE LOGIC ---
      const getFilteredOrders = () => {
        const orders = {};
        const safeTargetDays = Number(targetDays) || 1; 
        
        inventory.filter(isItemVisible).forEach(item => {
          const dynamicAvgUsage = calculateDynamicAvg(item.id);
          const targetStock = dynamicAvgUsage * safeTargetDays;
          let toOrder = targetStock - item.currentStock;
          toOrder = toOrder > 0 ? toOrder : 0;
          const remainingDays = dynamicAvgUsage > 0 ? (item.currentStock / dynamicAvgUsage) : 999;

          if (toOrder > 0 || remainingDays <= 3) {
            let smartVendor = item.vendor || 'ไม่ระบุร้านค้า'; 
            const itemReceipts = receipts.filter(r => r.items.some(ri => ri.item.id === item.id));
            let dynamicVendorHistory = []; 

            if (itemReceipts.length > 0) {
              const sortedReceipts = [...itemReceipts].sort((a, b) => parseDDMMYYYY(b.date) - parseDDMMYYYY(a.date));
              const recentVendors = sortedReceipts.map(r => r.vendor);
              
              if (recentVendors.length >= 3 && recentVendors[0] === recentVendors[1] && recentVendors[1] === recentVendors[2]) {
                smartVendor = recentVendors[0]; 
              } else {
                const frequency = {};
                recentVendors.forEach(v => frequency[v] = (frequency[v] || 0) + 1);
                let maxFreq = 0;
                let bestVendor = smartVendor;
                if (bestVendor === 'ไม่ระบุร้านค้า') bestVendor = recentVendors[0];

                [...recentVendors].reverse().forEach(v => {
                  if (frequency[v] >= maxFreq) { maxFreq = frequency[v]; bestVendor = v; }
                });
                smartVendor = bestVendor;
              }
              
              const allFreq = {};
              recentVendors.forEach(v => allFreq[v] = (allFreq[v] || 0) + 1);
              const vendorSet = new Set([smartVendor, ...recentVendors, ...vendors]);
              vendorSet.delete('ไม่ระบุร้านค้า');
              dynamicVendorHistory = Array.from(vendorSet).sort((a, b) => {
                if (a === smartVendor) return -1;
                if (b === smartVendor) return 1;
                return (allFreq[b] || 0) - (allFreq[a] || 0);
              });
            } else {
              if (item.vendor) {
                const vendorSet = new Set([item.vendor, ...vendors]);
                vendorSet.delete('ไม่ระบุร้านค้า');

              } else {
                dynamicVendorHistory = vendors;
              }
            }

            const targetVendor = orderVendors[item.id] || smartVendor;
            if (!orders[targetVendor]) orders[targetVendor] = [];
            orders[targetVendor].push({ ...item, avgUsagePerDay: dynamicAvgUsage, targetStock, toOrder, remainingDays, currentTargetVendor: targetVendor, dynamicVendorHistory });
          }
        });
        
        Object.keys(orders).forEach(vendor => {

             const catDiff = categoryOrder.indexOf(a.category) - categoryOrder.indexOf(b.category);
             if (catDiff !== 0) return catDiff;
             return inventory.findIndex(i => i.id === a.id) - inventory.findIndex(i => i.id === b.id);
          });
        });
        return orders;

      const getTodayReceiptsQty = (itemId, startObj, endObj) => {
         let qty = 0;
         const receiptsInRange = receipts.filter(r => {

      const submitDailyCount = () => {
        if(Object.keys(dailyCounts).length === 0) { alert('กรุณากรอกยอดอย่างน้อย 1 รายการ หรือกดยืนยันหมวดหมู่ให้ครบ'); return; }
        if (!isAllCategoriesConfirmed) { alert('กรุณา "ยืนยัน" ยอดเช็คสต๊อกให้ครบทุกหมวดหมู่ก่อนส่งยอดทั้งหมด'); return; }

        const endObj = parseDDMMYYYY(endDateStr);
        let daysDiff = Math.round((endObj - startObj) / (1000 * 60 * 60 * 24)) + 1;
        if (daysDiff < 1) daysDiff = 1;

        if(dailyHistory.find(h => h.endDate === endDateStr || h.date === endDateStr)) {
           if(!window.confirm(`⚠️ วันที่ ${endDateStr} มีการบันทึกไปแล้ว ต้องการบันทึกทับหรือไม่?`)) return;

             open: item.currentStock, bought: receiptsQty,

        if (pin !== '1245') return alert('รหัสผ่านไม่ถูกต้อง ลบไม่สำเร็จ');
        if (window.confirm('🚨 ยืนยันเซ็ตยอดสต๊อกเป็น 0 และลบประวัติแน่ใจหรือไม่?')) {

          alert('เซ็ตยอดสต๊อกเป็น 0 และลบประวัติเรียบร้อยแล้ว พร้อมเริ่มนับใหม่!');

      // ฟังก์ชันคำนวณพื้นที่ (Storage Estimator)
      const calculateStorage = () => {
        try {
          const rawData = JSON.stringify({ inventory, dailyHistory, receipts, categoryOrder, vendors });
          const byteLength = new TextEncoder().encode(rawData).length;
          const kbLength = (byteLength / 1024).toFixed(2);
          const mbLength = (byteLength / (1024 * 1024)).toFixed(4);
          
          const maxBytes = 1048576; // 1 MB Firestore limit
          const percentUsed = ((byteLength / maxBytes) * 100).toFixed(2);
          
          let estDaysLeft = "N/A";
          if (dailyHistory.length > 0) {
            const avgBytesPerRecord = byteLength / dailyHistory.length;
            const remainingBytes = maxBytes - byteLength;
            estDaysLeft = Math.floor(remainingBytes / avgBytesPerRecord);
          }

          return { kbLength, mbLength, percentUsed, estDaysLeft };
        } catch (e) {
          return { kbLength: 0, mbLength: 0, percentUsed: 0, estDaysLeft: "N/A" };
        }
      };
      const storageStats = useMemo(() => calculateStorage(), [inventory, dailyHistory, receipts]);

      // --- ฟังก์ชันลบประวัติแบบเลือกเดือน (Storage Management) ---
      const handleDeleteOldHistory = () => {
        const selectEl = document.getElementById('deleteOldMonthsSelect');
        const monthsCount = Number(selectEl.value);
        if (!monthsCount) return alert('กรุณาเลือกจำนวนเดือนที่ต้องการลบ');

        const allDates = [...dailyHistory.map(h => h.date || h.endDate), ...receipts.map(r => r.date)].filter(Boolean);
        
        const uniqueMonths = [...new Set(allDates.map(dateStr => {
          const parts = dateStr.split('/');
          if(parts.length === 3) return `${parts[2]}-${parts[1]}`;
          return null;
        }).filter(Boolean))].sort();

        if (uniqueMonths.length === 0) return alert("ไม่มีข้อมูลประวัติให้ลบ");

        const monthsToDelete = uniqueMonths.slice(0, monthsCount);

        if (!window.confirm(`⚠️ อันตราย! ยืนยันการลบประวัติของ ${monthsToDelete.length} เดือนที่เก่าที่สุด?\n(เดือน: ${monthsToDelete.join(', ')})\n\n* การกระทำนี้จะไม่กระทบยอดสต๊อกปัจจุบันและรายชื่อวัตถุดิบ\n* ข้อมูลที่ถูกลบจะไม่สามารถกู้คืนได้`)) {
          return;
        }

        const newDailyHistory = dailyHistory.filter(h => {
          const dStr = h.endDate || h.date;
          if(!dStr) return true;
          const parts = dStr.split('/');
          const monthKey = `${parts[2]}-${parts[1]}`;
          return !monthsToDelete.includes(monthKey);
        });

        const newReceipts = receipts.filter(r => {
          const parts = r.date.split('/');
          const monthKey = `${parts[2]}-${parts[1]}`;
          return !monthsToDelete.includes(monthKey);
        });

        setDailyHistory(newDailyHistory);
        setReceipts(newReceipts);
        selectEl.value = "";
        alert(`ลบประวัติสำเร็จ! คืนพื้นที่คลาวด์เรียบร้อยแล้ว`);

                  <button onClick={() => setActiveTab('purchase')} className={`shrink-0 px-4 py-3 text-[13px] font-bold border-b-2 ${activeTab === 'purchase' ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-transparent text-gray-500'}`}>สั่งของ</button>
                  <button onClick={() => setActiveTab('recordPurchase')} className={`shrink-0 px-4 py-3 text-[13px] font-bold border-b-2 ${activeTab === 'recordPurchase' ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-transparent text-gray-500'}`}>รับของ</button>
                  <button onClick={() => setActiveTab('manageItems')} className={`shrink-0 px-4 py-3 text-[13px] font-bold border-b-2 ${activeTab === 'manageItems' ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-transparent text-gray-500'}`}>จัดเรียง</button>
                  <button onClick={() => setActiveTab('settings')} className={`shrink-0 px-4 py-3 text-[13px] font-bold border-b-2 ${activeTab === 'settings' ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-transparent text-gray-500'}`}>ตั้งค่า</button>
                </>
              )}
              <button onClick={() => setActiveTab('dailyCount')} className={`shrink-0 px-4 py-3 text-[13px] font-bold border-b-2 ${activeTab === 'dailyCount' ? 'border-red-600 text-red-600 bg-red-50/50' : 'border-transparent text-gray-500'}`}>เช็คสต๊อก</button>
              {auth.role !== 'staff' && <button onClick={() => setActiveTab('history')} className={`shrink-0 px-4 py-3 text-[13px] font-bold border-b-2 ${activeTab === 'history' ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-transparent text-gray-500'}`}>ประวัติ</button>}
            </div>
          </div>

          <div className="p-3 max-w-5xl mx-auto space-y-4">
            
            {activeTab === 'dashboard' && auth.role !== 'staff' && (
              <div className="space-y-4 animate-in fade-in">
                {pendingRecords.length > 0 && (
                  <div className="bg-yellow-50 rounded-xl shadow-sm border border-yellow-200 overflow-hidden mb-4">
                    <div className="bg-yellow-500 px-4 py-3 flex justify-between items-center">
                      <h3 className="font-bold text-white text-sm">⚠️ รอระบุยอดขาย ({pendingRecords.length} รอบ)</h3>
                      <span className="text-[10px] text-yellow-100 bg-yellow-600 px-2 py-0.5 rounded">เรียงลำดับเก่าสุดก่อนเสมอ</span>
                    </div>
                    <div className="divide-y divide-yellow-100 p-2 space-y-2">
                      {pendingRecords.map((record, index) => {
                        const isOldest = index === pendingRecords.length - 1;
                        return (
                          <div key={record.id} className={`p-3 rounded-lg border ${isOldest ? 'bg-white border-yellow-400 shadow-sm' : 'bg-gray-50 border-gray-200 opacity-60'}`}>
                            <div className="flex justify-between items-center mb-2">
                              <div>
                                <div className="font-bold text-sm text-gray-800">
                                  {record.days > 1 ? `รอบ: ${record.startDate} ถึง ${record.endDate}` : `รอบ: ${record.endDate || record.date}`}
                                </div>
                                <div className="text-[10px] text-gray-500">นับไปเมื่อสิ้นวันล่าสุด</div>
                              </div>
                              <div className="text-right">
                                <div className="text-[10px] text-red-600 font-bold">ต้นทุนที่ใช้ไป</div>
                                <div className="font-bold text-red-700">{formatMoney(record.totalUsedVal + record.totalWasteVal)} บ.</div>
                              </div>
                            </div>
                            {isOldest ? (
                              <div className="flex gap-2 items-stretch mt-2">
                                <input 
                                  type="number" 
                                  placeholder="กรอกยอดขายของรอบนี้" 
                                  value={pendingSalesInputs[record.id] || ''}
                                  onChange={(e) => setPendingSalesInputs({...pendingSalesInputs, [record.id]: e.target.value})}
                                  className="flex-1 p-2 border-2 border-yellow-300 rounded focus:outline-none focus:border-yellow-500 font-bold text-center text-sm"
                                />
                                <button onClick={() => savePendingSales(record.id)} className="bg-yellow-500 hover:bg-yellow-600 text-white font-bold px-4 rounded shadow-sm text-xs">
                                  บันทึกยอดขาย
                                </button>
                              </div>
                            ) : (
                              <div className="text-[10px] text-center text-gray-500 bg-gray-100 p-2 rounded mt-2 font-bold">
                                🔒 กรุณาระบุยอดขายรอบเก่ากว่าก่อน
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                    <div className="flex justify-between items-start mb-4">
                      <h2 className="font-bold text-gray-700 flex items-center text-lg">
                        <span className="w-2 h-6 bg-blue-500 rounded-full mr-2"></span>ยอดขายล่าสุด
                      </h2>
                    </div>
                    {latestCompleted ? (
                      <>
                        <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 mb-4 flex justify-between items-center text-center">
                          <div className="text-left">
                            <div className="text-xs text-blue-800 font-bold mb-1">{latestCompleted.days > 1 ? `${latestCompleted.startDate} - ${latestCompleted.endDate}` : latestCompleted.endDate || latestCompleted.date}</div>
                            <div className="text-3xl font-black text-gray-800">{formatMoney(latestCompleted.sales)}</div>
                          </div>
                          <span className="text-xs text-gray-500 font-medium bg-blue-100 px-2 py-1 rounded border border-blue-200">บาท</span>
                        </div>
                        <div className="grid grid-cols-2 gap-3 flex-1">
                          <div className="p-3 bg-red-50 rounded-lg border border-red-100 flex flex-col justify-center text-center relative">
                            <p className="text-[11px] font-semibold text-red-700">ต้นทุนรวม (Food Cost)</p>
                            <p className="text-xl font-bold text-red-600 my-1">{formatMoney(latestCompleted.totalUsedVal + latestCompleted.totalWasteVal)} <span className="text-sm font-normal">฿</span></p>
                            <span className={`text-xs font-bold px-2 py-0.5 rounded-full inline-block mx-auto mb-2 ${(((latestCompleted.totalUsedVal + latestCompleted.totalWasteVal)/(latestCompleted.sales||1))*100) <= 40 ? 'bg-green-100 text-green-700' : 'bg-red-200 text-red-800'}`}>
                              {latestCompleted.sales > 0 ? (((latestCompleted.totalUsedVal + latestCompleted.totalWasteVal) / latestCompleted.sales) * 100).toFixed(1) : 0}%
                            </span>
                            <div className="mt-auto pt-2 border-t border-red-200">
                              <p className="text-[9px] text-red-600 font-medium">ใช้ไป {formatMoney(latestCompleted.totalUsedVal)} ฿ | เสีย {formatMoney(latestCompleted.totalWasteVal)} ฿</p>
                            </div>
                          </div>
                          <div className="p-3 bg-blue-50 rounded-lg border border-blue-100 flex flex-col justify-center text-center">
                            <p className="text-[11px] font-semibold text-blue-700">กำไรขั้นต้น (Profit)</p>
                            <p className="text-xl font-bold text-blue-700 my-1">{formatMoney(latestCompleted.sales - (latestCompleted.totalUsedVal + latestCompleted.totalWasteVal))} <span className="text-sm font-normal">฿</span></p>
                            <span className="text-xs font-bold bg-blue-200 text-blue-800 px-2 py-0.5 rounded-full inline-block mx-auto mb-2">
                              {latestCompleted.sales > 0 ? (((latestCompleted.sales - (latestCompleted.totalUsedVal + latestCompleted.totalWasteVal)) / latestCompleted.sales) * 100).toFixed(1) : 0}%
                            </span>
                            <div className="mt-auto pt-2 border-t border-transparent"></div>
                          </div>
                        </div>
                      </>
                    ) : (
                      <div className="p-10 text-center text-gray-400 font-bold border-2 border-dashed border-gray-200 rounded-xl bg-gray-50 flex-1 flex flex-col justify-center">
                        ยังไม่มีข้อมูลยอดขายล่าสุด<br/>
                        <span className="text-xs font-normal mt-2">กรุณาบันทึกเช็คสต๊อก และระบุยอดขายก่อน</span>
                      </div>
                    )}
                  </div>

                  {auth.role === 'owner' && (
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                      <div className="flex justify-between items-center mb-4">
                        <h2 className="font-bold text-gray-700 flex items-center text-lg">
                          <span className="w-2 h-6 bg-purple-500 rounded-full mr-2"></span>สรุปรายเดือน
                        </h2>
                        {Object.keys(dynamicMonthlyStats).length > 0 ? (
                          <select value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="p-1.5 text-xs font-bold bg-gray-100 border border-gray-200 rounded-md text-gray-700 outline-none">
                            {Object.keys(dynamicMonthlyStats).map(key => (<option key={key} value={key}>{dynamicMonthlyStats[key].label}</option>))}
                          </select>
                        ) : (
                          <span className="text-[10px] text-gray-400">ยังไม่มีข้อมูล</span>
                        )}
                      </div>
                      <div className="bg-purple-50 p-3 rounded-lg border border-purple-100 mb-4 flex justify-between items-center">
                        <div>
                          <p className="text-xs text-purple-800 font-bold mb-1">ยอดขายรวม</p>
                          <p className="text-2xl font-bold text-gray-800">{formatMoney(currentMonthData.sales)}</p>
                        </div>
                        <span className="text-xs text-gray-500 font-medium bg-purple-100 px-2 py-1 rounded">บาท</span>
                      </div>
                      <div className="grid grid-cols-2 gap-3 flex-1">
                        <div className="p-3 bg-red-50 rounded-lg border border-red-100 flex flex-col justify-center text-center">
                          <p className="text-[11px] font-semibold text-red-700">ต้นทุนรวม</p>
                          <p className="text-xl font-bold text-red-600 my-1">{formatMoney(monthlyTotalCost)} <span className="text-sm font-normal">฿</span></p>
                          <span className={`text-xs font-bold px-2 py-0.5 rounded-full inline-block mx-auto mb-2 ${monthlyCostPercent <= 40 ? 'bg-green-100 text-green-700' : 'bg-red-200 text-red-800'}`}>
                            {monthlyCostPercent}%
                          </span>
                          <div className="mt-auto pt-2 border-t border-red-200">
                            <p className="text-[9px] text-red-600 font-medium">ใช้ไป {formatMoney(currentMonthData.costUsed)} ฿<br/>เสีย {formatMoney(currentMonthData.costWaste)} ฿</p>
                          </div>
                        </div>
                        <div className="p-3 bg-blue-50 rounded-lg border border-blue-100 flex flex-col justify-center text-center">
                          <p className="text-[11px] font-semibold text-blue-700">กำไรขั้นต้น</p>
                          <p className="text-xl font-bold text-blue-700 my-1">{formatMoney(monthlyProfit)} <span className="text-sm font-normal">฿</span></p>
                          <span className="text-xs font-bold bg-blue-200 text-blue-800 px-2 py-0.5 rounded-full inline-block mx-auto mb-2">
                            {currentMonthData.sales > 0 ? ((monthlyProfit / currentMonthData.sales) * 100).toFixed(1) : 0}%
                          </span>
                          <div className="mt-auto pt-2 border-t border-transparent"></div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                {auth.role === 'owner' && (
                  <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div className="bg-gray-800 px-4 py-3 flex justify-between items-center">
                      <div className="flex items-center gap-2">
                        <h3 className="font-bold text-white text-sm">ภาพรวม 10 รอบล่าสุด</h3>
                        <button onClick={() => triggerPrint({ type: 'dashboard_history', data: dashHistoryItems })} className="text-[10px] bg-blue-600 text-white px-2 py-1 rounded font-bold shadow hover:bg-blue-700">🖨️ พิมพ์</button>
                      </div>
                      <div className="flex items-center space-x-2">
                        <button onClick={() => setDashPage(Math.max(1, dashPage - 1))} className="bg-gray-600 text-white px-2 py-1 rounded text-xs hover:bg-gray-500">&lt;</button>
                        <span className="text-white text-xs font-medium py-1">หน้า {dashPage}</span>
                        <button onClick={() => setDashPage(dashPage + 1)} className="bg-gray-600 text-white px-2 py-1 rounded text-xs hover:bg-gray-500">&gt;</button>
                      </div>
                    </div>
                    <div className="divide-y divide-gray-100">
                      {dashHistoryItems.length > 0 ? dashHistoryItems.map((item) => {
                        const costPercent = item.sales > 0 ? ((item.cost / item.sales) * 100).toFixed(1) : 0;
                        const profit = item.sales - item.cost;
                        const profitPercent = item.sales > 0 ? ((profit / item.sales) * 100).toFixed(1) : 0;
                        
                        return (
                          <div key={item.id} className={`p-3 flex flex-col sm:flex-row justify-between sm:items-center gap-2 ${item.days > 1 ? 'bg-orange-50/30' : 'bg-white hover:bg-gray-50'}`}>
                            <div className="w-full sm:w-1/4 flex justify-between sm:block items-center mb-1 sm:mb-0">
                              <div className="font-bold text-sm text-gray-800">{item.dateLabel}</div>
                              {item.days > 1 ? <span className="inline-block px-1.5 py-0.5 bg-orange-100 text-orange-700 text-[9px] font-bold rounded mt-1">รวบยอด {item.days} วัน</span> : <span className="inline-block text-[10px] text-gray-500 mt-1">รอบปกติ</span>}
                            </div>
                            <div className="flex justify-between items-start text-right w-full sm:w-3/4 gap-2">
                              <div className="flex-1">
                                <div className="text-[10px] text-gray-500">ยอดขาย</div>
                                <div className="text-[12px] font-bold text-gray-800">{formatMoney(item.sales)}</div>
                              </div>
                              <div className="flex-1 border-l border-gray-200 pl-2">
                                <div className="text-[10px] text-gray-500">ทุน <span className={costPercent <= 40 ? 'text-green-600 font-bold' : 'text-red-500 font-bold'}>{costPercent}%</span></div>
                                <div className="text-[12px] font-bold text-red-600">{formatMoney(item.cost)}</div>
                                <div className="text-[8px] text-gray-400 leading-tight mt-0.5">ใช้ {formatMoney(item.costUsed)}<br/>เสีย {formatMoney(item.costWaste)}</div>
                              </div>
                              <div className="flex-1 border-l border-gray-200 pl-2">
                                <div className="text-[10px] text-gray-500">กำไร <span className="text-blue-600 font-bold">{profitPercent}%</span></div>
                                <div className="text-[12px] font-bold text-blue-700">{formatMoney(profit)}</div>
                              </div>
                            </div>
                          </div>
                        );
                      }) : (
                        <div className="p-6 text-center text-gray-400 text-sm font-bold bg-white">ยังไม่มีประวัติการบันทึกยอดขาย</div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* TAB: SETTINGS (ตั้งค่า) */}
            {activeTab === 'settings' && auth.role !== 'staff' && (
              <div className="space-y-4 animate-in fade-in">
                
                {/* 1. Storage Estimator (เฉพาะเจ้าของร้าน) */}
                {auth.role === 'owner' && (
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-blue-200 flex flex-col">
                    <h2 className="font-bold text-blue-800 text-lg flex items-center mb-3">
                      <span className="text-xl mr-2">💾</span> จัดการพื้นที่เก็บข้อมูล (ล้างประวัติเก่า)
                    </h2>
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 text-center mb-4">
                      <div className="bg-blue-50 p-2 rounded border border-blue-100">
                        <p className="text-[10px] text-blue-600 font-bold">ใช้ไปแล้ว</p>
                        <p className="text-base font-black text-gray-800">{storageStats.percentUsed}%</p>
                      </div>
                      <div className="bg-blue-50 p-2 rounded border border-blue-100">
                        <p className="text-[10px] text-blue-600 font-bold">ขนาดไฟล์</p>
                        <p className="text-base font-black text-gray-800">{storageStats.kbLength} KB</p>
                        <p className="text-[9px] text-gray-500 leading-tight">จาก 1,024 KB (1MB)</p>
                      </div>
                      <div className="bg-blue-50 p-2 rounded border border-blue-100">
                        <p className="text-[10px] text-blue-600 font-bold">รอบประวัติที่มี</p>
                        <p className="text-base font-black text-gray-800">{dailyHistory.length} รอบ</p>
                      </div>
                      <div className="bg-blue-50 p-2 rounded border border-blue-100">
                        <p className="text-[10px] text-blue-600 font-bold">ประมาณการใช้งานได้อีก</p>
                        <p className="text-base font-black text-green-600">{storageStats.estDaysLeft} รอบ</p>
                      </div>
                    </div>
                    
                    <div className="border-t border-blue-100 pt-3">
                      <p className="text-[11px] text-gray-600 mb-2 leading-relaxed">
                        หากพื้นที่คลาวด์ใกล้เต็ม (หรือเกิน 80%) แนะนำให้ลบประวัติเดือนเก่าๆ ทิ้งเพื่อคืนพื้นที่ 
                        <strong> การลบนี้จะไม่กระทบยอดสต๊อกปัจจุบัน ชื่อวัตถุดิบ หรือร้านค้า</strong>
                      </p>
                      <div className="flex flex-col sm:flex-row gap-2 items-center">
                        <select id="deleteOldMonthsSelect" className="p-2 border border-gray-300 rounded-lg text-sm w-full sm:w-auto outline-none focus:border-blue-500 font-bold">
                          <option value="">-- เลือกจำนวนเดือนเก่าสุดที่จะลบ --</option>
                          <option value="1">ลบ 1 เดือนที่เก่าที่สุด</option>
                          <option value="2">ลบ 2 เดือนที่เก่าที่สุด</option>
                          <option value="3">ลบ 3 เดือนที่เก่าที่สุด</option>
                          <option value="4">ลบ 4 เดือนที่เก่าที่สุด</option>
                          <option value="5">ลบ 5 เดือนที่เก่าที่สุด</option>
                          <option value="6">ลบ 6 เดือนที่เก่าที่สุด</option>
                        </select>
                        <button onClick={handleDeleteOldHistory} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-sm w-full sm:w-auto transition-colors">
                          ยืนยันลบประวัติ
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {/* 2. การเพิ่มวัตถุดิบยอดยกมา */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                  <div className="flex justify-between items-center mb-3 border-b border-gray-100 pb-3">
                    <h2 className="font-bold text-gray-800 text-lg flex items-center">
                      <span className="text-xl mr-2">⚙️</span> บันทึกยอดยกมาเริ่มต้น
                    </h2>
                    <button onClick={() => openAddItem('settings')} className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow hover:bg-blue-700 transition-colors">
                      + เพิ่มวัตถุดิบแรกเริ่ม
                    </button>
                  </div>
                  <p className="text-[11px] text-gray-500 mb-4 bg-yellow-50 p-2 rounded-lg border border-yellow-200 leading-relaxed">
                    * หน้านี้ใช้สำหรับบันทึกยอดยกมาเริ่มต้น เพื่อใช้เป็นฐานในการเริ่มใช้งานระบบเท่านั้น หากต้องการจัดการสถานะ เพิ่ม/แก้ไข/ลบ วัตถุดิบ ให้ไปที่เมนู <strong>"จัดการวัตถุดิบ"</strong>
                  </p>
                  
                  <div className="space-y-6">
                    {categoryOrder.map(cat => {
                      const catItems = inventory.filter(i => i.category === cat && isItemVisible(i));
                      if (catItems.length === 0) return null;
                      return (
                        <div key={cat} className="border border-gray-200 rounded-xl overflow-hidden bg-white shadow-sm">
                          <h3 className="bg-gray-800 text-white px-3 py-2 text-sm font-bold">{cat}</h3>
                          <div className="p-2 space-y-2 divide-y divide-gray-100">
                            {catItems.map(item => {
                              const totalValue = (Number(item.initialStock) || 0) * (Number(item.initialStockPrice) || 0);
                              const createdAtDate = item.createdAt ? new Date(item.createdAt) : new Date();
                              const daysSinceCreation = Math.floor((new Date() - createdAtDate) / (1000 * 60 * 60 * 24));
                              const isEditable = daysSinceCreation <= 15;

                              return (
                                <div key={item.id} className={`pt-2 first:pt-0 flex flex-col sm:flex-row sm:items-center justify-between text-xs gap-1 ${!isEditable ? 'opacity-70' : ''}`}>
                                  <div className="font-bold text-gray-800 text-sm flex items-center">
                                    {getItemName(item)} {item.vendor ? <span className="text-[10px] text-blue-600 font-medium ml-1">({item.vendor})</span> : ''}
                                    {!isEditable && <span className="ml-2 text-[9px] bg-gray-200 text-gray-500 px-1.5 py-0.5 rounded shadow-inner">🔒 เกิน 15 วัน</span>}
                                  </div>
                                  <div className="flex flex-wrap items-center gap-3 bg-gray-50 p-1.5 rounded border border-gray-200">
                                    <div className="flex items-center gap-1">
                                      <span>ปริมาณ:</span>
                                      <input type="number" disabled={!isEditable} value={item.initialStock === '' ? '' : item.initialStock} onChange={(e) => {
                                        const val = e.target.value === '' ? '' : Number(e.target.value);
                                        setInventory(inventory.map(i => i.id === item.id ? {...i, initialStock: val, currentStock: val} : i));
                                      }} className="w-16 p-1 border border-blue-300 rounded text-center font-bold text-sm text-blue-700 focus:border-blue-600 outline-none bg-white disabled:bg-gray-100 disabled:border-gray-200" placeholder="0" />
                                      <span className="font-bold text-blue-700">{item.initialStockType === 'base' ? item.unit : item.purchaseUnit}</span>
                                    </div>
                                    <div className="flex items-center gap-1">
                                      <span>ราคา:</span>
                                      <span className="font-bold text-gray-700">{item.initialStockPrice || 0}</span>
                                      <span>บ.</span>
                                    </div>
                                    <div className="bg-green-50 text-green-800 px-1.5 rounded border border-green-200 font-bold whitespace-nowrap">มูลค่า: {formatMoney(totalValue)} บ.</div>
                                    {isEditable && (
                                      <button onClick={() => handleDeleteItem(item.id)} className="text-[10px] bg-red-50 text-red-600 border border-red-200 px-2 py-1 rounded font-bold hover:bg-red-100 transition-colors ml-auto sm:ml-0">ลบ</button>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )
                    })}
                    {inventory.length === 0 && <div className="text-center text-gray-400 py-10 font-bold border-2 border-dashed border-gray-200 rounded-xl">ยังไม่มีวัตถุดิบในระบบ</div>}
                  </div>
                </div>

                {auth.role === 'owner' && (
                  <div className="bg-red-50 p-4 rounded-xl shadow-sm border border-red-200 mt-6">
                    <h2 className="font-bold text-red-800 text-lg flex items-center mb-3">
                      ⚠️ โซนอันตราย (Danger Zone)
                    </h2>
                    <div className="space-y-3">
                      <button onClick={handleSoftReset} className="w-full bg-orange-500 text-white px-4 py-3 rounded-lg font-bold shadow hover:bg-orange-600 transition-colors">
                        🔄 ล้างเฉพาะยอดสต๊อกและประวัติ (เซ็ตเป็น 0)
                      </button>
                      <p className="text-[10px] text-orange-700 leading-tight">* เหมาะสำหรับเคลียร์ข้อมูลทดลองใช้ แต่ยังต้องการเก็บรายชื่อวัตถุดิบ หมวดหมู่ และร้านค้าเอาไว้</p>
                      
                      <button onClick={handleHardReset} className="w-full bg-red-600 text-white px-4 py-3 rounded-lg font-bold shadow hover:bg-red-700 transition-colors mt-2">
                        🗑️ ล้างข้อมูลทั้งหมด (เริ่มใหม่ 100%)
                      </button>
                      <p className="text-[10px] text-red-700 leading-tight">* ข้อมูลทุกอย่างจะหายไปเหมือนเพิ่งเปิดระบบครั้งแรก (ต้องสร้างหมวดหมู่ และวัตถุดิบใหม่ทั้งหมด)</p>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* TAB: MANAGE ITEMS (จัดเรียง/แก้ไขชื่อ) */}
            {activeTab === 'manageItems' && auth.role !== 'staff' && (
              <div className="space-y-4 animate-in fade-in">
                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                  <div className="flex justify-between items-center mb-4">
                    <div className="flex items-center gap-2">
                      <h2 className="font-bold text-gray-800">📦 จัดเรียงตำแหน่งวัตถุดิบ</h2>
                      <button onClick={() => triggerPrint({ type: 'master_data', data: inventory })} className="text-[10px] bg-blue-600 text-white px-2 py-1 rounded font-bold shadow hover:bg-blue-700">🖨️ พิมพ์รายการ</button>
                    </div>
                  </div>
                  <p className="text-[11px] text-gray-500 mb-4 bg-gray-50 p-2 rounded-lg border border-gray-200">
                    * กดปุ่มลูกศร ขึ้น-ลง เพื่อจัดเรียงลำดับวัตถุดิบในแต่ละหมวดหมู่ (มีผลกับหน้าเช็คสต๊อก)
                  </p>
                  
                  {categoryOrder.map(cat => {
                    const catItems = inventory.filter(i => i.category === cat);
                    if (catItems.length === 0) return null;
                    return (
                      <div key={cat} className="mb-6">
                        <div className="bg-gray-800 text-white px-3 py-1.5 rounded-t-lg font-bold text-sm flex items-center">
                          <span className="w-2 h-2 bg-blue-400 rounded-full mr-2"></span> {cat}
                        </div>
                        <div className="border border-gray-200 border-t-0 rounded-b-lg bg-gray-50/50 p-2 space-y-2">
                          {catItems.map((item, index) => (
                            <div key={item.id} className="flex items-center gap-2 bg-white p-2 rounded-lg border border-gray-200 shadow-sm">
                              <div className="flex flex-col shrink-0">
                                <button onClick={() => moveItemUp(item.id)} disabled={index === 0} className="p-1 text-gray-400 hover:text-blue-600 disabled:opacity-20 leading-none">▲</button>
                                <button onClick={() => moveItemDown(item.id)} disabled={index === catItems.length - 1} className="p-1 text-gray-400 hover:text-blue-600 disabled:opacity-20 leading-none">▼</button>
                              </div>
                              
                              <div className="flex-1 min-w-0">
                                <input type="text" value={item.name} onChange={(e) => setInventory(inventory.map(i => i.id === item.id ? { ...i, name: e.target.value } : i))} className="w-full p-1 text-sm font-bold bg-transparent focus:bg-gray-100 border border-transparent focus:border-gray-300 rounded outline-none truncate" />
                                <div className="text-[10px] text-gray-500 pl-1 mt-0.5">เปลี่ยนหมวด: 
                                  <select value={item.category} onChange={(e) => setInventory(inventory.map(i => i.id === item.id ? { ...i, category: e.target.value } : i))} className="ml-1 bg-transparent border-b outline-none font-bold text-blue-600">
                                    {categoryOrder.map(c => <option key={c} value={c}>{c}</option>)}
                                  </select>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )
                  })}
                </div>
              </div>
            )}

            {/* TAB: SMART PURCHASE (สั่งของ) */}
            {activeTab === 'purchase' && auth.role !== 'staff' && (
              <div className="space-y-4 animate-in fade-in">
                <div className="bg-white p-3 rounded-xl shadow-sm border border-gray-200">
                  <div className="grid grid-cols-1 gap-3">
                    <div className="bg-gray-50 p-2.5 rounded-lg border border-gray-200">
                      <label className="block text-xs font-bold text-gray-700 mb-1 flex items-center">🗓️ ช่วงเวลาคำนวณ 'ยอดใช้เฉลี่ย/วัน'</label>
                      <div className="flex items-center gap-2 text-xs">
                        <input type="date" value={avgStartDate} onChange={(e)=>setAvgStartDate(e.target.value)} className="border rounded px-1.5 py-1 text-blue-700 font-bold w-full outline-none" />
                        <span className="text-gray-500">ถึง</span>
                        <input type="date" value={avgEndDate} onChange={(e)=>setAvgEndDate(e.target.value)} className="border rounded px-1.5 py-1 text-blue-700 font-bold w-full outline-none" />
                      </div>
                      
                      <div className="flex gap-2 overflow-x-auto hide-scrollbar py-2 mt-2 border-t border-gray-200">
                        {(() => {
                          const start = new Date(avgStartDate);
                          const end = new Date(avgEndDate);
                          const days = [];
                          let cur = new Date(start);
                          while(cur <= end) {
                            days.push(new Date(cur));
                            cur.setDate(cur.getDate() + 1);
                          }
                          return days.map(d => {
                            const dStr = formatDDMMYYYY(d);
                            const rec = dailyHistory.find(h => h.date === dStr || h.endDate === dStr);
                            const isChecked = rec && rec.type === 'checked';
                            return (
                              <div key={dStr} className={`flex items-center gap-1 shrink-0 px-2 py-1 rounded-full text-[10px] font-bold border ${isChecked ? 'bg-green-50 border-green-200 text-green-700' : 'bg-orange-50 border-orange-200 text-orange-700'}`}>
                                <span className={`w-2 h-2 rounded-full ${isChecked ? 'bg-green-500' : 'bg-orange-400'}`}></span>
                                {d.getDate()}/{d.getMonth()+1}
                              </div>
                            );
                          });
                        })()}
                      </div>
                      <p className="text-[9px] text-gray-500 mt-1 pl-1">* 🟢 นับสต๊อกแล้ว | 🟠 ไม่ได้นับสต๊อก (ระบบจะรวบน้ำหนักการใช้ให้วันถัดไปอัตโนมัติ)</p>
                    </div>
                    <div className="bg-blue-50 p-2.5 rounded-lg border border-blue-200 flex justify-between items-center">
                      <label className="text-xs font-bold text-blue-800">ต้องการสั่งเผื่อขายกี่วัน?</label>
                      <div className="flex items-center">
                        <input type="number" min="1" value={targetDays} onChange={(e) => setTargetDays(Number(e.target.value) || 1)} className="w-12 p-1 text-center font-bold text-sm border border-blue-300 rounded outline-none" />
                        <span className="ml-1 text-xs text-blue-800 font-bold">วัน</span>
                      </div>
                    </div>
                  </div>
                </div>

                {Object.keys(filteredOrders).length > 0 ? (
                  <div className="flex justify-between items-center px-1">
                    <h3 className="font-bold text-gray-800 text-sm">รายการสั่ง (แยกตามร้าน)</h3>
                    <button onClick={() => triggerPrint({ type: 'all', data: filteredOrders })} className="text-[11px] bg-blue-600 text-white px-3 py-1.5 rounded-lg font-bold shadow hover:bg-blue-700">🖨️ พิมพ์รวมทั้งหมด</button>
                  </div>
                ) : (
                  <div className="bg-white p-6 rounded-xl border border-gray-200 text-center shadow-sm">
                    <p className="text-gray-500 text-sm font-bold">ไม่มีรายการที่ต้องสั่งซื้อในขณะนี้</p>
                    <p className="text-[10px] text-gray-400 mt-1">สต๊อกยังมีเพียงพอ หรือยังไม่ได้บันทึกการใช้งานวัตถุดิบ</p>
                  </div>
                )}

                {Object.keys(filteredOrders).sort((a, b) => {
                  if (a === 'ไม่ระบุร้านค้า') return 1;
                  if (b === 'ไม่ระบุร้านค้า') return -1;
                  return a.localeCompare(b, 'th');
                }).map((vendor) => (
                  <div key={vendor} className="bg-white rounded-xl shadow-sm border border-gray-300 overflow-hidden mb-3">
                    <div className="bg-gray-800 px-3 py-2 flex justify-between items-center">
                      <h3 className="font-bold text-white text-xs uppercase tracking-wide">📍 {vendor}</h3>
                      <button onClick={() => triggerPrint({ type: 'vendor', vendor: vendor, items: filteredOrders[vendor] })} className="text-[10px] bg-white text-gray-800 px-2 py-1 rounded font-bold shadow-sm">🖨️ พิมพ์ร้านนี้</button>
                    </div>
                    
                    <div className="overflow-x-auto hide-scrollbar">
                      <table className="w-full text-[10px] text-left border-collapse min-w-[500px]">
                        <thead className="bg-gray-100 text-gray-600 border-b border-gray-300 font-bold">
                          <tr>
                            <th className="px-2 py-1.5 border-r border-gray-200 leading-tight">รายการ<br/><span className="text-[8px] font-normal text-gray-400">สั่งจาก</span></th>
                            <th className="px-1 py-1.5 text-center border-r border-gray-200">เหลือ<br/>(วัน)</th>
                            <th className="px-1 py-1.5 text-center border-r border-gray-200">ใช้/<br/>วัน</th>
                            <th className="px-1 py-1.5 text-center border-r border-gray-200">เหลือ<br/>(มี)</th>
                            <th className="px-1 py-1.5 text-center border-r border-gray-200 text-blue-700">สั่งซื้อ<br/><span className="text-[8px] font-normal">(รวมหน่วย)</span></th>
                            <th className="px-1 py-1.5 text-center text-gray-500">ราคา<br/>ล่าสุด</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-200 bg-white">
                          {filteredOrders[vendor].map((item) => {
                            const purchaseQty = item.toOrder / (item.conversionRate || 1);
                            return (
                              <tr key={item.id} className="hover:bg-gray-50">
                                <td className="px-2 py-2 border-r border-gray-100 whitespace-nowrap overflow-hidden text-ellipsis max-w-[120px]">
                                  <div className="font-bold text-[11px] text-gray-800 truncate" title={getItemName(item)}>{getItemName(item)}</div>
                                  {item.dynamicVendorHistory && item.dynamicVendorHistory.length > 1 ? (
                                    <select 
                                      value={item.currentTargetVendor} 
                                      onChange={(e) => setOrderVendors({...orderVendors, [item.id]: e.target.value})} 
                                      className="text-[9px] text-blue-600 bg-blue-50 border border-blue-200 rounded px-1 py-0.5 outline-none max-w-full truncate cursor-pointer mt-0.5"
                                    >
                                      {item.dynamicVendorHistory.map(v => <option key={v} value={v}>{v}</option>)}
                                    </select>
                                  ) : (
                                    <div className="text-[9px] text-blue-600 truncate mt-0.5">{item.currentTargetVendor}</div>
                                  )}
                                </td>
                                <td className={`px-1 py-2 text-center border-r border-gray-100 font-bold ${item.remainingDays <= 3 ? 'text-red-500' : 'text-gray-600'}`}>
                                  {formatNumber(item.remainingDays)}
                                </td>
                                <td className="px-1 py-2 text-center border-r border-gray-100 font-medium text-gray-700">
                                  {formatNumber(item.avgUsagePerDay)} <span className="text-[8px] text-gray-400 block -mt-1">{item.unit}</span>
                                </td>
                                <td className="px-1 py-2 text-center border-r border-gray-100 font-bold text-gray-800">
                                  {formatNumber(item.currentStock)} <span className="text-[8px] text-gray-400 block -mt-1">{item.unit}</span>
                                </td>
                                <td className={`px-1 py-2 text-center border-r border-gray-100 ${item.toOrder > 0 ? 'bg-blue-50/50' : ''}`}>
                                  <div className={`font-bold ${item.toOrder > 0 ? 'text-blue-700 text-[12px]' : 'text-gray-300'}`}>
                                    {item.toOrder > 0 ? (
                                      <div className="flex flex-col items-center">
                                        <span>{formatNumber(item.toOrder)} <span className="text-[8px] font-normal text-gray-500">{item.unit}</span></span>
                                        {item.purchaseUnit && item.purchaseUnit !== item.unit && (
                                          <span className="text-[9px] text-green-700 bg-green-100 px-1 rounded-sm mt-0.5 leading-tight whitespace-nowrap border border-green-200">
                                            ({formatNumber(purchaseQty)} {item.purchaseUnit})
                                          </span>
                                        )}
                                      </div>
                                    ) : '-'}
                                  </div>
                                </td>
                                <td className="px-1 py-2 text-center text-[10px] text-gray-600 font-medium">
                                  {formatNumber(item.lastPrice)}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* TAB: RECORD PURCHASE (รับของ) */}
            {activeTab === 'recordPurchase' && auth.role !== 'staff' && (
              <div className="space-y-4 animate-in fade-in">
                <div className="flex bg-gray-200 rounded-lg p-1">
                  <button onClick={() => setReceiptMode('record')} className={`flex-1 py-2 text-sm font-bold rounded-md transition-colors ${receiptMode === 'record' ? 'bg-white shadow text-blue-700' : 'text-gray-500 hover:text-gray-700'}`}>📥 บันทึกรับของ</button>
                  <button onClick={() => setReceiptMode('history')} className={`flex-1 py-2 text-sm font-bold rounded-md transition-colors ${receiptMode === 'history' ? 'bg-white shadow text-blue-700' : 'text-gray-500 hover:text-gray-700'}`}>📜 ประวัติรับของ</button>
                </div>

                {receiptMode === 'record' ? (
                  <>
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                      <div className="space-y-4">
                        <div className="relative z-[50]">
                          <label className="block text-xs font-bold text-gray-600 mb-1">1. บิลจากร้านค้า</label>
                          <SearchableDropdown items={vendors} selectedItem={selectedVendor} onSelect={setSelectedVendor} onAdd={handleAddVendor} onEdit={promptEditVendor} onDelete={handleDeleteVendor} placeholder="เลือกร้านค้า" isVendor={true} />
                        </div>
                        <div className="relative z-[40]">
                          <label className="block text-xs font-bold text-gray-600 mb-1">2. ค้นหาสินค้า / วัตถุดิบ</label>
                          <SearchableDropdown items={inventory.filter(isItemVisible)} selectedItem={selectedItem} onSelect={(id) => { setSelectedItem(id); setPurchasePrice(inventory.find(i=>i.id===id)?.lastPrice||''); }} onAdd={(searchName) => openAddItem('recordPurchase', searchName)} onEdit={(item) => openEditItem(item, 'recordPurchase')} onDelete={handleDeleteItem} placeholder="เลือกวัตถุดิบ" isVendor={false} />
                        </div>

                        <div className={`transition-all duration-300 ${selectedItem ? 'opacity-100 max-h-96' : 'opacity-40 max-h-0 overflow-hidden'}`}>
                          <div className="grid grid-cols-2 gap-3 mt-4">
                            <div>
                              <label className="block text-xs font-bold text-gray-600 mb-1">3. ปริมาณที่ซื้อเข้า</label>
                              <div className="relative">
                                <input type="number" value={purchaseQty} onChange={(e)=>setPurchaseQty(e.target.value)} placeholder="0" className="w-full p-2 bg-gray-50 border border-gray-300 rounded-lg text-base font-bold outline-none focus:border-blue-500" />
                                <span className="absolute right-3 top-2.5 text-[10px] text-gray-500">{activePurchaseItem?.purchaseUnit || activePurchaseItem?.unit || '-'}</span>
                              </div>
                            </div>
                            <div>
                              <label className="block text-xs font-bold text-gray-600 mb-1">4. ราคาต่อหน่วย (บ.)</label>
                              <div className="relative">
                                <input type="number" value={purchasePrice} onChange={(e)=>setPurchasePrice(e.target.value)} placeholder="0" className="w-full p-2 bg-gray-50 border border-gray-300 rounded-lg text-base font-bold outline-none focus:border-blue-500" />
                              </div>
                              {activePurchaseItem && purchasePrice && (
                                (() => {
                                  const oldPrice = activePurchaseItem.lastPrice;
                                  const newPrice = Number(purchasePrice);
                                  if (!oldPrice || oldPrice === 0) return <div className="text-[10px] text-gray-500 mt-1">ราคาใหม่บันทึกครั้งแรก</div>;
                                  const diff = newPrice - oldPrice;
                                  const pct = ((diff / oldPrice) * 100).toFixed(1);
                                  if (diff > 0) return <div className="text-[10px] font-bold mt-1 px-1.5 py-0.5 rounded inline-block bg-red-100 text-red-700 border border-red-200">แพงขึ้น {diff} บ. (+{pct}%)</div>;
